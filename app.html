class AppErrorBoundary extends React.Component {
  constructor(p){ super(p); this.state={err:null}; }
  static getDerivedStateFromError(err){ return {err}; }
  componentDidCatch(err, info){ try{ console.error("NakNak crash:", err, info); }catch(e){} }
  render(){
    if(!this.state.err) return this.props.children;
    const msg = String(this.state.err?.message || this.state.err).slice(0,220);
    return (
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:18,padding:"32px 24px",textAlign:"center",background:"linear-gradient(160deg,#7A1008 0%,#150703 100%)",fontFamily:"'Nunito',sans-serif"}}>

          <div style={{color:"#FFB4A8",fontSize:11,fontWeight:600,wordBreak:"break-word"}}>{msg}</div>
        </div>
        <button onClick={()=>window.location.reload()} style={{width:"100%",maxWidth:320,height:56,borderRadius:28,background:"#fff",border:"none",fontSize:17,fontWeight:900,color:"#7A1008",cursor:"pointer"}}>I-reload ang App</button>

// ═══════════════════════════════════════════════════════════════════════════
//  CLOUD SYNC (Supabase, secured) — pairs this device to a Family Space.
//  This phone never signs in and never sees a Supabase session. Pairing
//  redeems a one-time code for a private device_secret (via pair_device),
//  and every read/write after that goes through security-definer RPCs that
//  check that secret — the phone has no direct table access at all.
//  Fully offline-first: everything works with no config / no connection.
// ═══════════════════════════════════════════════════════════════════════════
const SYNC_CONFIG = {
  url:     "https://louqshzgqutxydfqgnyz.supabase.co",
  anonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvdXFzaHpncXV0eHlkZnFnbnl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMjgzMTUsImV4cCI6MjA5ODYwNDMxNX0.tvgCedmaK9OxRqeW1piNNRr4KXT0XFFF5EuJ3692vgU",
};
const SYNC_KEY = "naknak_sync_v1";
const SYNC_POLL_MS = 12000; // no realtime here by design — see DEPLOY.md §7
const NAKSYNC = (() => {
  let client=null, pollTimer=null, pushTimer=null, lastRev=0, applying=false;
  const listeners=new Set();
  const ready = () => !!(SYNC_CONFIG.url && SYNC_CONFIG.anonKey && typeof supabase!=="undefined");
  const getClient = () => { if(!client&&ready()) client = supabase.createClient(SYNC_CONFIG.url, SYNC_CONFIG.anonKey); return client; };
  const load = () => { try{return JSON.parse(localStorage.getItem(SYNC_KEY))||null;}catch(e){return null;} };
  const save = (v) => { try{ v?localStorage.setItem(SYNC_KEY,JSON.stringify(v)):localStorage.removeItem(SYNC_KEY);}catch(e){} };
  const status = () => ({ configured:ready(), paired:!!load(), code:null });
  const notify = () => listeners.forEach(f=>{try{f(status());}catch(e){}});

  async function pair(code){
    const c=getClient(); if(!c) return {ok:false,err:"Hindi pa naka-configure ang sync"};
    const { data, error } = await c.rpc("pair_device", { p_code:(code||"").trim().toUpperCase(), p_label:"NakNak Phone" });
    if(error) return {ok:false, err:error.message||"Hindi mahanap ang code na iyan"};
    const row = Array.isArray(data) ? data[0] : data;
    save({ householdId: row.household_id, deviceSecret: row.device_secret });
    startPolling(); await pull(); notify();
    return {ok:true};
  }
  function unpair(){ stopPolling(); save(null); notify(); }

  async function pull(){
    const s=load(), c=getClient(); if(!s||!c) return;
    const { data, error } = await c.rpc("device_get_state", { p_secret: s.deviceSecret });
    if(error) return; // device revoked or offline — silently retry next poll
    const row = Array.isArray(data) ? data[0] : data;
    if(row && row.rev>lastRev){ lastRev=row.rev; apply(row.state); }
  }
  function apply(remote){
    if(!remote||!remote.seniors) return;
    applying=true;
    try{
      const st=STORE._raw();
      st.seniors=remote.seniors; st.plan=remote.plan||st.plan;
      st.activeSeniorId=remote.activeSeniorId||st.activeSeniorId;
      if(remote.alerts) st.alerts=remote.alerts;
      STORE._pub();
    } finally{ applying=false; }
  }
  function pushSoon(){
    const s=load(); if(!s||!ready()||applying) return;
    clearTimeout(pushTimer);
    pushTimer=setTimeout(async()=>{
      const c=getClient(); if(!c) return;
      const st=STORE._raw(); lastRev=Date.now();
      const payload={seniors:st.seniors,plan:st.plan,activeSeniorId:st.activeSeniorId,alerts:st.alerts};
      await c.rpc("device_push_state", { p_secret:s.deviceSecret, p_state:payload, p_rev:lastRev });
    },800);
  }
  function startPolling(){ stopPolling(); pollTimer=setInterval(pull, SYNC_POLL_MS); }
  function stopPolling(){ if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } }
  function boot(){ if(load()&&ready()){ startPolling(); pull(); } }
  return { status, pair, unpair, pushSoon, boot, onChange:(f)=>{listeners.add(f);return()=>listeners.delete(f);} };
})();

function tNow() {
 const n = new Date();
 return`${n.getHours()}:${String(n.getMinutes()).padStart(2,"0")}:${String(n.getSeconds()).padStart(2,"0")}`;
}
function fmt24to12(t24) {
 if (!t24) return"";
 const [hStr, mStr] = t24.split(":");
 const h = parseInt(hStr), m = mStr ||"00";
 const suffix = h >= 12 ?"PM" :"AM";
 const h12 = h % 12 || 12;
 return`${h12}:${m} ${suffix}`;
}
function normalizePhone(n) { return n.replace(/[\s\-\(\)\+]/g,""); }
function isDuplicatePhone(contacts, num, excludeId = null) {
 const norm = normalizePhone(num);
 return contacts.some(c =>c.id !== excludeId && normalizePhone(c.num) === norm && norm.length > 5);
}
function isFullName(name) { return name.trim().split(/\s+/).length >= 2; }
function haptic(pattern = [100,50,150]) {
 if (navigator.vibrate) navigator.vibrate(pattern);
}
function freqToSlots(freq) {
 const map = {"1x":["08:00"],"2x":["08:00","20:00"],"3x":["08:00","14:00","20:00"],"4x":["08:00","12:00","16:00","20:00"] };
 return map[freq] || ["08:00"];
}
function groupMedsByTime(meds, lang) {
 const i = I18N[lang||"tl"] || I18N.tl;
 const g = { morning:{label:i.medMorning,items:[]}, afternoon:{label:i.medAfternoon,items:[]}, evening:{label:i.medEvening,items:[]} };
 meds.forEach(m =>{
  const slots = m.schedule || [m.time ||"08:00"];
  const earliest = slots[0] ||"08:00";
  const h = parseInt(earliest.split(":")[0]);
  if (h < 12) g.morning.items.push(m);
  else if (h < 17) g.afternoon.items.push(m);
  else g.evening.items.push(m);
 });
 return g;
}

function getLocation() {
 return new Promise((resolve, reject) =>{
  if (!navigator.geolocation) { reject('Walang GPS'); return; }
  navigator.geolocation.getCurrentPosition(
   pos =>resolve({ lat: pos.coords.latitude.toFixed(6), lng: pos.coords.longitude.toFixed(6), acc: Math.round(pos.coords.accuracy) }),
   err =>reject(err.message),
   { timeout: 8000, maximumAge: 30000, enableHighAccuracy: true }
  );
 });
}

  const adj = (d) => {
    const next = Math.round(Math.min(MAX, Math.max(MIN, scale + d)) * 10) / 10;
    if (next !== scale) { haptic([40]); saveTextScale(next); setScale(next); }
  };

    <div style={{margin:"0 16px 10px",padding:"10px 14px",borderRadius:16,background:t.card,border:`1px solid ${t.cardBorder}`,display:"flex",alignItems:"center",gap:12}}>

  addVaultDoc(sid="s1", doc) {

// ─── EMERGENCY CALL OVERLAY ───────────────────────────────────────────────────
function EmergencyCallOverlay({ contact, onCancel, onComplete, t, gps }) {
 const [phase, setPhase] = useState("delay"); // delay → calling → done
 const [canCancel, setCanCancel] = useState(true);
 const [countdown, setCountdown] = useState(3);

 useEffect(() =>{
  haptic([200, 100, 200, 100, 400]);
  // 600ms delay then initiate
  const delayTimer = setTimeout(() =>{
   setPhase("calling");
   window.location.href =`tel:${contact.num.replace(/[\s\-]/g,"")}`;
  }, 600);
  // Cancel window: 3s
  const countInterval = setInterval(() =>setCountdown(c =>c - 1), 1000);
  const cancelTimer = setTimeout(() =>{
   setCanCancel(false);
   clearInterval(countInterval);
  }, 3000);
  const doneTimer = setTimeout(() =>{ setPhase("done"); if(onComplete) onComplete(); }, 8000);
  return () =>{ clearTimeout(delayTimer); clearTimeout(cancelTimer); clearTimeout(doneTimer); clearInterval(countInterval); };
 }, []);

 return (
  <div style={{position:"absolute",inset:0,zIndex:100,background:"linear-gradient(160deg,#8A0A04 0%,#200202 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:28,padding:32,textAlign:"center"}}>

    {[0,1,2].map(i=>(
     <div key={i} style={{position:"absolute",width:160,height:160,borderRadius:"50%",border:"2px solid rgba(255,255,255,0.3)",animation:`callRing 2s ease-out ${i*0.65}s infinite`}}/>
    ))}
    <div style={{width:90,height:90,borderRadius:"50%",background:"rgba(255,255,255,0.14)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:42,border:"2px solid rgba(255,255,255,0.25)"}}>
     
    </div>
   </div>

   <div>
    <div style={{color:"rgba(255,255,255,0.65)",fontSize:13,fontWeight:700,letterSpacing:1.5,marginBottom:6}}>
     {phase==="delay"?"NAGKO-KONEKTA…":"TUMATAWAG…"}
    </div>
    <div style={{color:"#fff",fontSize:28,fontWeight:900,lineHeight:1.2}}>{contact.name}</div>
    <div style={{color:"rgba(255,255,255,0.6)",fontSize:14,fontWeight:600,marginTop:4}}>{contact.rel} · {contact.num}</div>
   </div>

   <div style={{background:"rgba(255,255,255,0.1)",borderRadius:18,padding:"14px 20px",width:"100%"}}>
    <div style={{fontSize:13,fontWeight:700,color:"rgba(255,255,255,0.8)"}}>
     Awtomatikong SMS:<br/>
     <span style={{fontStyle:"italic",opacity:0.75}}>"Emergency! Kailangan ng tulong. Tignan agad."</span>
     {gps&&<><br/><span style={{fontSize:12,color:"rgba(200,255,200,0.9)"}}>{gps.lat}, {gps.lng} (±{gps.acc}m)</span></>}
     {!gps&&<><br/><span style={{fontSize:11,color:"rgba(255,255,255,0.45)"}}>Walang GPS na-attach</span></>}
    </div>
   </div>

   {canCancel && (
    <button onClick={onCancel} style={{background:"rgba(255,255,255,0.15)",border:"2px solid rgba(255,255,255,0.4)",borderRadius:30,padding:"12px 36px",color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer"}}>
     Kanselahin ({countdown}s)
    </button>
   )}
   {!canCancel && (
    <div style={{color:"rgba(255,255,255,0.5)",fontSize:13,fontWeight:600}}>Nagpapadala ng tulong…</div>
   )}

  </div>
 );
}

// ─── MEDICATION ALARM ENGINE ──────────────────────────────────────────────────
function MedAlarmEngine({ seniorId, meds, plan }) {
 const notifiedRef = useRef({});
 useEffect(() =>{
  if (!canUse(plan, 'medications')) return;
  const dayKey = todayKey();
  const check = () =>{
   const cur = nowMins();
   meds.forEach(med =>{
    if (med.status === 'done' || med.taken) return;
    const slots = med.schedule || [med.time || '08:00'];
    slots.forEach(slot =>{
     const slotMins = parseTimeMins(slot);
     const key =`${dayKey}-${med.id}-${slot}`;
     const diff = cur - slotMins; // positive = overdue
     if (diff >= 0 && diff <= 2 && !notifiedRef.current[key]) {
      notifiedRef.current[key] = true;
      haptic([300,100,300,100,300]);
      showLocalNotif(
       `Oras na ng gamot!`,
       `${med.name} ${med.dose} — ${fmt24to12(slot)}`,
       `med-${med.id}`, true
      );
      STORE.logEvent(seniorId, 'notif',`Medication reminder: ${med.name}`, fmt24to12(slot));
     }
     // Mark as missed if > 60 min overdue and not taken
     if (diff > 60 && !notifiedRef.current[key+'-missed']) {
      notifiedRef.current[key+'-missed'] = true;
      STORE.missedMed(seniorId, med.id);
      showLocalNotif(`Nalaktawan ang gamot!`,`${med.name} ${med.dose} ay hindi nainom.`,`missed-${med.id}`, true);
     }
    });
   });
  };
  check();
  const iv = setInterval(check, 30000);
  return () =>clearInterval(iv);
 }, [seniorId, plan, JSON.stringify(meds.map(m=>({id:m.id,status:m.status,schedule:m.schedule})))]);
 return null;
}

 );
}

function QRCodeCareReal({ goTo, t }) {
 const store = useStore();
 const s = store?.seniors?.find(x=>x.id===(store?.activeSeniorId||"s1")) || store?.seniors?.[0];
 const qrRef = useRef(null);
 const qrInstance = useRef(null);
 const [qrFailed, setQrFailed] = useState(false);
 const p = s?.medicalProfile || {};
 const qrData = JSON.stringify({
  name: s?.name, blood: p.bloodType,
  allergies: p.allergies?.join(","),
  conditions: p.conditions?.join(","),
  doctor: p.doctorName, doctorNum: p.doctorNum,
  emergency: s?.contacts?.slice(0,2).map(c=>`${c.name} ${c.num}`).join(" |"),
  meds: s?.medications?.map(m=>`${m.name} ${m.dose}`).join(","),
  gps: s?.gpsLocation ?`${s.gpsLocation.lat},${s.gpsLocation.lng}`:"",
  tag:"NakNak Emergency Info"
 });
 useEffect(() =>{
  if (!qrRef.current) return;
  if (qrInstance.current) { qrInstance.current.clear(); qrInstance.current.makeCode(qrData); return; }
  try {
   if (typeof QRCode === "undefined") { setQrFailed(true); return; }
   qrInstance.current = new QRCode(qrRef.current, {
    text: qrData, width: 200, height: 200,
    colorDark: t.isDark ?"#FFFFFF" :"#1E0A02",
    colorLight: t.isDark ?"#1C1008" :"#FFFFFF",
    correctLevel: QRCode.CorrectLevel.M
   });
  } catch(e) { console.warn("QR:", e); }
 }, [qrData, t.isDark]);
 return (
  <div style={{flex:1,display:"flex",flexDirection:"column",background:t.bg,overflow:"hidden"}}>
   <Hdr t={t} title="QR Code" sub={`Para kay ${s?.name}`} back={()=>goTo('dash')}/>

    <div ref={qrRef} style={{width:200,height:200,background:t.card,borderRadius:20,padding:10,border:`2px solid ${t.red}44`,boxShadow:`0 8px 32px ${t.shadow}`,overflow:"hidden"}}/>

// ─── VITALS LOG ───────────────────────────────────────────────────────────────
function VitalsLogCare({ goTo, t, plan }) {
 const store = useStore();
 const s = store?.seniors?.find(x=>x.id===(store.activeSeniorId||"s1")) || store?.seniors?.[0];
 const [tab, setTab] = useState("bp");
 const [form, setForm] = useState({ sys:"", dia:"", sugar:"", pulse:"", weight:"", oxygen:"", note:"" });
 const [saved, setSaved] = useState(false);
 const vitals = (s?.vitals||[]).filter(v=>v.type===tab);
 const tabs = [{id:"bp",label:"Blood Pressure",icon:"heart_pulse",unit:"mmHg"},{id:"sugar",label:"Blood Sugar",icon:"droplet",unit:"mg/dL"},{id:"pulse",label:"Pulse",icon:"activity",unit:"bpm"},{id:"weight",label:"Timbang",icon:"activity",unit:"kg"},{id:"oxygen",label:"Oxygen",icon:"heart_pulse",unit:"%"}];

 const bpColor = (val) =>{
  const [sys] = (val||"").split("/").map(Number);
  if (!sys) return t.text3;
  if (sys >= 140) return t.red;
  if (sys >= 130) return t.warn;
  return t.green;
 };
 const sugarColor = (val) =>{
  const n = Number(val);
  if (!n) return t.text3;
  if (n > 180) return t.red;
  if (n > 130) return t.warn;
  return t.green;
 };
 const pulseColor = (val) =>{
  const n = Number(val);
  if (!n) return t.text3;
  if (n > 100 || n < 50) return t.red;
  if (n > 90 || n < 60) return t.warn;
  return t.green;
 };
 const oxygenColor = (val) =>{
  const n = Number(val);
  if (!n) return t.text3;
  if (n < 90) return t.red;
  if (n < 95) return t.warn;
  return t.green;
 };
 const getColor = (v) =>v.type==="bp"?bpColor(v.value):v.type==="sugar"?sugarColor(v.value):v.type==="oxygen"?oxygenColor(v.value):v.type==="pulse"?pulseColor(v.value):t.text3;

 const save = () =>{
  if (!canUse(plan,"vitals")) return;
  let value="", valid=false;
  if (tab==="bp") { value=`${form.sys}/${form.dia}`; valid=form.sys&&form.dia; }
  if (tab==="sugar") { value=form.sugar; valid=!!form.sugar; }
  if (tab==="pulse") { value=form.pulse; valid=!!form.pulse; }
  if (tab==="weight") { value=form.weight; valid=!!form.weight; }
  if (tab==="oxygen") { value=form.oxygen; valid=!!form.oxygen; }
  if (!valid) return;
  const unit = tabs.find(x=>x.id===tab)?.unit||"";
  STORE.addVital(s?.id||"s1", { type:tab, value, unit, note:form.note });
  setForm({sys:"",dia:"",sugar:"",pulse:"",weight:"",oxygen:"",note:""});
  setSaved(true); setTimeout(()=>setSaved(false),1500);
 };

 const inp = {height:48,borderRadius:14,border:`1.5px solid ${t.cardBorder}`,padding:"0 14px",fontSize:15,fontWeight:700,background:t.bg,color:t.text,outline:"none",width:"100%"};

   {/* Tabs */}
   <div style={{display:"flex",gap:0,background:t.bg2,borderBottom:`1px solid ${t.cardBorder}`,flexShrink:0}}>
    {tabs.map(tb=>(
     <button key={tb.id} onClick={()=>setTab(tb.id)} style={{flex:1,height:44,background:"none",border:"none",borderBottom:tab===tb.id?`2.5px solid ${t.red}`:"2.5px solid transparent",cursor:"pointer",fontSize:11,fontWeight:900,color:tab===tb.id?t.red:t.text3,transition:"all 0.15s"}}>
      <span style={{display:"inline-flex",alignItems:"center",gap:5,justifyContent:"center"}}><Icon name={tb.icon} size={13} color={tab===tb.id?t.red:t.text3}/>{tb.label.split(" ")[0]}</span>
     </button>
    ))}
   </div>
   <div style={{flex:1,overflow:"auto",padding:"14px 16px"}}>
    {/* Add new reading */}
    {!canUse(plan,"vitals") ? (
     <div style={{background:t.warnBg,border:`1.5px solid ${t.warnBorder}`,borderRadius:18,padding:"14px 16px",marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:800,color:t.warn}}>Vitals Log — Essential Plan</div>

      <div style={{fontSize:12,fontWeight:800,color:t.text3,letterSpacing:1,marginBottom:10}}>BAGONG READING</div>

       {saved?" Na-save!":"+ I-save ang Reading"}

    {vitals.map(v=>(
     <div key={v.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:t.card,borderRadius:16,border:`1px solid ${t.cardBorder}`,marginBottom:8}}>
      <div style={{width:48,height:48,borderRadius:14,background:getColor(v)===t.red?t.redBg:getColor(v)===t.green?t.greenBg:getColor(v)===t.text3?t.bg2:t.warnBg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}>

    ))}

 );

// ─── MED ADHERENCE REPORT ─────────────────────────────────────────────────────
function MedAdherenceReport({ goTo, t, plan }) {
 const store = useStore();
 const s = store?.seniors?.find(x=>x.id===(store.activeSeniorId||"s1")) || store?.seniors?.[0];
 const meds = s?.medications || [];
 // Simulate weekly adherence data per med (seeded for demo)
 const weekDays = ["Lun","Mar","Miy","Huw","Biy","Sab","Lin"];
 const seedAdherence = (mid) =>{
  const h = mid.charCodeAt(1)||0;
  return weekDays.map((_,i) => ({ taken: (h+i)%5!==0, missed: (h+i)%5===0 }));
 };
 const countTaken = (data) =>data.filter(d=>d.taken).length;

 return (
  <div style={{flex:1,display:"flex",flexDirection:"column",background:t.bg,overflow:"hidden"}}>
   <Hdr t={t} title="Med Report" sub={`Linggu-linggong ulat ni ${s?.name||"Senior"}`} back={()=>goTo('dash')}/>
   <div style={{flex:1,overflow:"auto",padding:"14px 16px"}}>
    {!canUse(plan,"medications") && (
     <div style={{background:t.warnBg,border:`1.5px solid ${t.warnBorder}`,borderRadius:18,padding:"14px",marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:800,color:t.warn}}>Med Report — Essential Plan</div>
      <div style={{fontSize:12,color:t.text2,fontWeight:600,marginTop:4}}>I-upgrade para makita ang medication compliance report.</div>
      <button onClick={()=>goTo('pricing')} style={{marginTop:10,height:36,borderRadius:18,background:t.warn,border:"none",cursor:"pointer",fontSize:12,fontWeight:900,color:"#fff",padding:"0 16px"}}>I-upgrade</button>
     </div>
    )}
    {/* Overall summary */}
    <div style={{background:t.card,borderRadius:20,padding:"16px",border:`1px solid ${t.cardBorder}`,marginBottom:14}}>
     <div style={{fontSize:12,fontWeight:800,color:t.text3,letterSpacing:1,marginBottom:12}}>LINGGUHANG BUOD</div>
     <div style={{display:"flex",gap:10}}>
      {[
       {label:"Gamot",val:meds.length,color:t.text},
       {label:"Nainom",val:meds.filter(m=>m.taken).length,color:t.green},
       {label:"Nalaktawan",val:meds.filter(m=>m.status==="missed").length,color:t.red},
      ].map(item=>(
       <div key={item.label} style={{flex:1,background:t.bg2,borderRadius:14,padding:"10px 8px",textAlign:"center"}}>
        <div style={{fontSize:22,fontWeight:900,color:item.color}}>{item.val}</div>
        <div style={{fontSize:10,color:t.text3,fontWeight:700}}>{item.label}</div>
       </div>
      ))}
     </div>
    </div>
    {/* Per-med chart */}
    {meds.length===0 && <div style={{textAlign:"center",padding:"32px 0",color:t.text3,fontSize:13,fontWeight:700}}>Wala pang gamot.<br/>Magdagdag muna ng gamot.</div>}
    {meds.map(med=>{
     const data = seedAdherence(med.id);
     const pct = Math.round((countTaken(data)/7)*100);
     return (

// ─── SAFE ZONE ────────────────────────────────────────────────────────────────
function SafeZoneCare({ goTo, t, plan }) {
 const store = useStore();
 const s = store?.seniors?.find(x=>x.id===(store.activeSeniorId||"s1")) || store?.seniors?.[0];
 const gps = s?.gpsLocation;
 const zone = s?.safeZone;
 const [label, setLabel] = useState(zone?.label||"Bahay");
 const [radius, setRadius] = useState(zone?.radiusKm||0.5);
 const [saved, setSaved] = useState(false);

 const dist = (gps&&zone) ? haversineKm(Number(gps.lat),Number(gps.lng),zone.lat,zone.lng) : null;
 const inZone = dist!==null ? dist <= zone.radiusKm : null;

 const setZoneFromGPS = () =>{
  if (!gps) return;
  STORE.setSafeZone(s?.id||"s1", { lat:Number(gps.lat), lng:Number(gps.lng), radiusKm:Number(radius), label });
  setSaved(true); setTimeout(()=>setSaved(false),1500);
 };
 const clearZone = () =>{ STORE.setSafeZone(s?.id||"s1", null); };

 const inp = {height:48,borderRadius:14,border:`1.5px solid ${t.cardBorder}`,padding:"0 14px",fontSize:14,fontWeight:700,background:t.bg,color:t.text,outline:"none",width:"100%"};
 return (
  <div style={{flex:1,display:"flex",flexDirection:"column",background:t.bg,overflow:"hidden"}}>
   <Hdr t={t} title="Safe Zone" sub={`Para kay ${s?.name||"Senior"}`} back={()=>goTo('dash')}/>
   <div style={{flex:1,overflow:"auto",padding:"14px 16px"}}>
    {!canUse(plan,"safeZone") ? (
     <div style={{background:t.warnBg,border:`1.5px solid ${t.warnBorder}`,borderRadius:18,padding:"14px"}}>
      <div style={{fontSize:13,fontWeight:800,color:t.warn}}>Safe Zone — Family Plan</div>
      <div style={{fontSize:12,color:t.text2,fontWeight:600,marginTop:4}}>I-upgrade sa Family Plan para ma-set ang safe zone ng Senior.</div>
      <button onClick={()=>goTo('pricing')} style={{marginTop:10,height:36,borderRadius:18,background:t.warn,border:"none",cursor:"pointer",fontSize:12,fontWeight:900,color:"#fff",padding:"0 16px"}}>I-upgrade</button>
     </div>
    ) : (
     <>
      {/* Current GPS status */}
      <div style={{background:t.card,borderRadius:20,padding:"16px",border:`1px solid ${t.cardBorder}`,marginBottom:14}}>
       <div style={{fontSize:12,fontWeight:800,color:t.text3,letterSpacing:1,marginBottom:10}}>KASALUKUYANG LOKASYON</div>
       {gps ? (
        <div>
         <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:t.greenBg,borderRadius:14,border:`1px solid ${t.greenBorder}`,marginBottom:8}}>
          <Icon name="map_pin" size={16} color={t.green}/>
          <div>
           <div style={{fontSize:13,fontWeight:800,color:t.green}}>GPS Available</div>
           <div style={{fontSize:11,color:t.text3,fontWeight:600}}>{gps.lat}, {gps.lng} · ±{gps.acc}m</div>
          </div>
         </div>
         {zone && dist!==null && (
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:inZone?t.greenBg:t.redBg,borderRadius:14,border:`1px solid ${inZone?t.greenBorder:t.redBorder}`}}>
           <Icon name={inZone?"checkmark":"alert_tri"} size={20} color={inZone?t.green:t.red}/>
           <div>
            <div style={{fontSize:13,fontWeight:900,color:inZone?t.green:t.red}}>{inZone?"Nasa loob ng safe zone":"Labas ng safe zone!"}</div>
            <div style={{fontSize:11,color:t.text3,fontWeight:600}}>{dist.toFixed(2)} km mula kay {zone.label||"center"} · Radius: {zone.radiusKm} km</div>
           </div>
          </div>
         )}
        </div>
       ) : (
        <div style={{padding:"12px",background:t.warnBg,borderRadius:14,border:`1px solid ${t.warnBorder}`,fontSize:13,color:t.warn,fontWeight:700}}>
         Wala pang GPS. Pindutin ang SOS button para makuha ang lokasyon.
        </div>
       )}
      </div>
      {/* Set safe zone */}
      <div style={{background:t.card,borderRadius:20,padding:"16px",border:`1px solid ${t.cardBorder}`,marginBottom:14}}>
       <div style={{fontSize:12,fontWeight:800,color:t.text3,letterSpacing:1,marginBottom:12}}>I-SET ANG SAFE ZONE</div>
       <div style={{marginBottom:8}}>
        <div style={{fontSize:11,color:t.text3,fontWeight:700,marginBottom:4}}>PANGALAN NG LUGAR</div>
        <input value={label} onChange={e=>setLabel(e.target.value)} placeholder="hal. Bahay, Ospital" style={inp}/>
       </div>
       <div style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
         <span style={{fontSize:11,color:t.text3,fontWeight:700}}>RADIUS</span>
         <span style={{fontSize:12,fontWeight:900,color:t.red}}>{radius} km</span>
        </div>
        <input type="range" min="0.1" max="5" step="0.1" value={radius} onChange={e=>setRadius(Number(e.target.value))} style={{width:"100%",accentColor:t.red}}/>

         <span>0.1 km</span><span>5 km</span>

       </div>
       <button onClick={setZoneFromGPS} disabled={!gps} style={{width:"100%",height:48,borderRadius:24,background:gps?(saved?t.green:t.redGrad):"#ccc",border:"none",cursor:gps?"pointer":"default",fontSize:14,fontWeight:900,color:"#fff",marginBottom:8,transition:"all 0.3s"}}>
        {saved?" Safe Zone na-set!":gps?" I-set ang Current Location bilang Safe Zone":"Kailangan ng GPS muna"}
       </button>
       {zone && <button onClick={clearZone} style={{width:"100%",height:40,borderRadius:20,background:"none",border:`1.5px solid ${t.redBorder}`,cursor:"pointer",fontSize:13,fontWeight:800,color:t.red}}>I-clear ang Safe Zone</button>}
      </div>
      {/* Zone info */}
      {zone && (
       <div style={{background:t.greenBg,borderRadius:18,padding:"14px 16px",border:`1px solid ${t.greenBorder}`}}>
        <div style={{fontSize:13,fontWeight:800,color:t.green}}>Safe Zone Active</div>
        <div style={{fontSize:12,color:t.text2,fontWeight:600,marginTop:4}}>{zone.label||"Safe Zone"} · {zone.lat?.toFixed(4)}, {zone.lng?.toFixed(4)}</div>
        <div style={{fontSize:12,color:t.text2,fontWeight:600}}>Radius: {zone.radiusKm} km</div>
       </div>
      )}
     </>
    )}
   </div>
  </div>
 );
}

// ─── HAVERSINE (shared) ───────────────────────────────────────────────────────
function haversineKm(lat1,lon1,lat2,lon2) {
 const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
 const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
 return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function VaultSenior({ senior, goTo, t, a11y, onViewDoc, lang }) {
 const fileRef = useRef(null);
 const [pendingType, setPendingType] = useState(null);
 const docs = senior?.vault || [];
 const DOC_TYPES = [
  { id:"senior_id", label:"Senior Citizen ID", icon:"id_card" },
  { id:"pwd_id",  label:"PWD ID",      icon:"accessible" },
  { id:"philhealth",label:"PhilHealth",    icon:"first_aid" },
  { id:"other",   label:"Iba pang dokumento",icon:"file_text" },
 ];
 const startUpload = (type) =>{ setPendingType(type); fileRef.current?.click(); };
 const onFile = (e) =>{
  const file = e.target.files?.[0];
  if (!file || !pendingType) return;
  const reader = new FileReader();
  reader.onload = () =>{
   const dt = DOC_TYPES.find(d=>d.id===pendingType);
   STORE.addVaultDoc(senior?.id||"s1", { docType:pendingType, label:dt?.label||"Dokumento", image:reader.result });
   haptic([150,60,150]);
  };
  reader.readAsDataURL(file);
  e.target.value ="";
  setPendingType(null);
 };
 return (
  <div style={{flex:1,display:"flex",flexDirection:"column",background:t.bg,overflow:"hidden"}}>
   <Hdr t={t} title="Vault" sub="Mga dokumento mo, ligtas at offline."/>
   <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={onFile}/>
   <div style={{flex:1,overflow:"auto",padding:18,display:"flex",flexDirection:"column",gap:14}}>
    <div style={{background:t.greenBg,border:`1px solid ${t.greenBorder}`,borderRadius:14,padding:"10px 14px",fontSize:12,fontWeight:700,color:t.text2,lineHeight:1.5}}>
     Naka-save lokal sa device mo lang — hindi umaalis sa offline mode.
    </div>
    {docs.length>0 && (
     <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {docs.map(d => (
       <Card key={d.id} t={t} onClick={()=>onViewDoc(d)} style={{display:"flex",alignItems:"center",gap:14,padding:"12px 14px"}}>

        <div style={{flex:1,minWidth:0}}>
         <div style={{fontSize:15,fontWeight:800,color:t.text}}>{d.label}</div>
         <div style={{fontSize:11.5,color:t.text3,fontWeight:600,marginTop:1}}>Idinagdag {new Date(d.addedAt).toLocaleDateString()}</div>
        </div>
        <div style={{fontSize:18,color:t.text3}}>›</div>
       </Card>
      ))}
     </div>
    )}
    <div style={{marginTop:docs.length?2:0,fontSize:13,fontWeight:900,color:t.text2,letterSpacing:0.3}}>Magdagdag ng dokumento</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
     {DOC_TYPES.map(dt => (
      <button key={dt.id} onClick={()=>startUpload(dt.id)} style={{height:a11y.btnH,borderRadius:18,background:t.card,border:`1.5px solid ${t.cardBorder}`,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,padding:8}}>
       <Icon name={dt.icon} size={26} color={t.red}/>

         </div>

function SeniorApp({ onSwitchRole, t, plan, a11y, userName, lang }) {
 const store = useStore();
 const [screen, setScreen] = useState(SR.HOME);
 const [callTarget, setCallTarget] = useState(null);
 const [viewDoc, setViewDoc] = useState(null);
 const goTo = s =>setScreen(s);
 const i = I18N[lang] || I18N.tl;
 // User-adjustable text scale — persisted, vision profile defaults larger
 const [textScale, setTextScale] = useState(() => loadTextScale(a11y.vision));

 // ── BACKGROUND GPS REFRESH (Safe Zone needs this to be genuinely live) ─────
 // Only runs when Safe Zone is a paid feature the household actually uses,
 // and only while the app is open — this is not a silent always-on tracker.
 useEffect(() => {
  if (!canUse(plan, "safeZone")) return;
  const senior = store?.seniors?.find(x=>x.id===(store?.activeSeniorId||"s1")) || store?.seniors?.[0];
  if (!senior) return;
  const ping = async () => { try{ const g = await getLocation(); STORE.setGPS(senior.id, g); }catch(e){} };
  ping(); // once on open
  const id = setInterval(ping, 5 * 60 * 1000); // then every 5 minutes
  return () => clearInterval(id);
 }, [plan, store?.activeSeniorId]);

 // ── A11y PROFILE BINDING (vision, hearing, mobility, cognitive) ────────────
 // Vision: inject root font-size override
 useEffect(() =>{
  const root = document.documentElement;
  if (a11y.vision) {
   root.style.fontSize ="20px";
  } else {
   root.style.fontSize ="";
  }
  return () =>{ root.style.fontSize =""; };
 }, [a11y.vision]);

 // Hearing: no audio alarms — haptic + visual flash only (SBar flash handled via prop)
 // Mobility: SOS hitbox size controlled via a11y.bigBtn (already wired to SOSButton sz)
 // Cognitive: time-bucket labels in Filipino already enforced via medMorning/medAfternoon/medEvening
 // All profiles: Web Speech API voice prompt on SOS trigger (vision a11y specifically)
 const voiceAnnounce = (msg) =>{
  if (!a11y.vision) return;
  if (!('speechSynthesis' in window)) return;
  try {
   const utt = new SpeechSynthesisUtterance(msg);
   utt.lang = lang ==="en" ?"en-US" :"fil-PH";
   utt.rate = 0.85;
   window.speechSynthesis.cancel();
   window.speechSynthesis.speak(utt);
  } catch(e) {}
 };

 if (!store) return null;
 // Mirror the caregiver's active senior selection (Family plan multi-member)
 const senior = store.seniors.find(x=>x.id===(store.activeSeniorId||"s1")) || store.seniors[0];
 const name = userName || senior?.nickname ||"Nanay";
 const handleSOS = async () =>{
  // Hearing profile: enhanced haptic sequence per spec
  if (a11y.hearing) {
   haptic([300,100,300,100,300,100,300]);
  } else {
   haptic([400,100,400]);
  }
  // Vision profile: voice announcement
  voiceAnnounce(i.sosActive +"." + i.sosSubtitle);
  // Try to get GPS before triggering SOS
  try {
   const gps = await Promise.race([
    getLocation(),
    new Promise((_,rej) =>setTimeout(()=>rej('timeout'), 4000))
   ]);
   STORE.setGPS(senior?.id||"s1", gps);
   showLocalNotif("SOS Triggered!",`GPS: ${gps.lat}, ${gps.lng} — Nagpapadala sa mga contact.`,"sos", true);
  } catch(e) {
   showLocalNotif("SOS Triggered!","Nagpapadala ng alerto sa mga contact.","sos", true);
  }
  STORE.triggerSOS(senior?.id||"s1");
  goTo(SR.SOS_ACTIVE);
 };
 return (
  <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>
   <MedAlarmEngine seniorId={senior?.id||"s1"} meds={senior?.medications||[]} plan={plan}/>
   <SBar t={t} battery={senior?.battery||76} flash={a11y.hearing && screen===SR.SOS_ACTIVE}/>
   <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",zoom:textScale}}>
    {screen===SR.HOME   && <SeniorHome name={name} goTo={s=>s===SR.SOS_ACTIVE?handleSOS():goTo(s)} t={t} plan={plan} senior={senior} a11y={a11y} lang={lang} textScale={textScale} setTextScale={setTextScale}/>}
    {screen===SR.SOS_ACTIVE && <SOSActiveSenior name={name} onCancel={()=>goTo(SR.HOME)} t={t} a11y={a11y} lang={lang}/>}
    {screen===SR.SOS_SENT && <SOSSentSenior name={name} contacts={senior?.contacts} onBack={()=>goTo(SR.HOME)} t={t} lang={lang}/>}
    {screen===SR.FALL   && <FallDetectSenior name={name} onAyos={()=>goTo(SR.HOME)} onAuto={()=>{STORE.triggerSOS(senior?.id||"s1","fall");goTo(SR.SOS_ACTIVE);}} t={t} lang={lang}/>}
    {screen===SR.CHECKIN  && <CheckInSenior name={name} onOo={()=>{STORE.checkIn(senior?.id||"s1");goTo(SR.CHECKIN_OK);}} onHindi={handleSOS} t={t} a11y={a11y} lang={lang}/>}
    {screen===SR.CHECKIN_OK && (
     <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20,textAlign:"center",padding:32,background:"linear-gradient(160deg,#1E9653 0%,#0A3D20 100%)"}}>
      <div style={{display:"flex"}}><Icon name="smile" size={68} color="#fff" strokeWidth={1.5}/></div>
      <div style={{color:"#fff",fontSize:28,fontWeight:900}}>{i.checkinThanks(name)}</div>
      <div style={{color:"rgba(255,255,255,0.88)",fontSize:16,fontWeight:600,lineHeight:1.6}}>
       {i.checkinOkSub.split("\n").map((l,idx)=><span key={idx}>{l}{idx===0&&<br/>}</span>)}
      </div>
      <button onClick={()=>goTo(SR.HOME)} style={{background:"#fff",border:"none",borderRadius:30,padding:"14px 38px",fontSize:17,fontWeight:800,color:"#1E9653",cursor:"pointer"}}>{i.backHome}</button>
     </div>
    )}
    {screen===SR.MED    && <MedReminderSenior senior={senior} goTo={goTo} t={t} plan={plan} a11y={a11y} lang={lang}/>}
    {screen===SR.CONTACTS && <ContactsListSenior senior={senior} goTo={goTo} t={t} plan={plan} a11y={a11y} onEmergencyCall={c=>setCallTarget(c)} lang={lang}/>}
    {screen===SR.QUICK_ID && <MedicalIDSenior senior={senior} t={t} goTo={goTo} a11y={a11y} lang={lang}/>}
    {screen===SR.RESCUE  && <RescueBridge goTo={goTo} t={t} a11y={a11y} lang={lang}/>}
    {screen===SR.VAULT   && <VaultSenior senior={senior} goTo={goTo} t={t} a11y={a11y} onViewDoc={d=>{setViewDoc(d);goTo(SR.VAULT_VIEW);}} lang={lang}/>}
    {screen===SR.VAULT_VIEW && <VaultDocViewer doc={viewDoc} t={t} seniorId={senior?.id} onBack={()=>{setViewDoc(null);goTo(SR.VAULT);}}/>}
    {screen===SR.PREP   && <PrepGoBagSenior senior={senior} goTo={goTo} t={t} a11y={a11y} lang={lang}/>}
    {screen===SR.UPDATES  && <CaregiverUpdatesSenior senior={senior} goTo={goTo} t={t} plan={plan} a11y={a11y} lang={lang}/>}
   </div>
   {callTarget&&<EmergencyCallOverlay contact={callTarget} t={t} onCancel={()=>setCallTarget(null)} onComplete={()=>setCallTarget(null)} gps={senior?.gpsLocation}/>}
  </div>
 );
}

 medication: { label:"Gamot",      color:"#C07010" },
 appointment:{ label:"Appointment",color:"#6B35C4" },
 other:      { label:"Iba pa",     color:"#6B3A1F" },
};
const RECURRENCE_OPTS = [
 ["none","Isang beses lang"], ["daily","Araw-araw"], ["weekdays","Weekdays lang"],
 ["weekends","Weekends lang"], ["weekly","Piling araw kada linggo"],
 ["monthly","Buwanan"], ["quarterly","Bawat 3 buwan"], ["yearly","Taun-taon"],
];
const DOW_SHORT_TL = ["Lin","Lun","Mar","Miy","Huw","Biy","Sab"];
function calYmd(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function calSameDay(a,b){ return calYmd(a)===calYmd(b); }
function calAddDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function calStartOfWeek(d){ const x=new Date(d); x.setDate(x.getDate()-x.getDay()); x.setHours(0,0,0,0); return x; }
function calMonthGrid(year,month){ const start=calStartOfWeek(new Date(year,month,1)); return Array.from({length:42},(_,i)=>calAddDays(start,i)); }
function expandOccurrences(ev, rangeStart, rangeEnd){
 const out=[]; const base=new Date(ev.date+"T00:00:00");
 if(base>rangeEnd) return out;
 if(ev.recurrence==="none"||!ev.recurrence){ if(base>=rangeStart&&base<=rangeEnd) out.push(base); return out; }
 const weeklyDays=(ev.daysOfWeek&&ev.daysOfWeek.length)?ev.daysOfWeek:[base.getDay()];
 let cursor=new Date(Math.max(base.getTime(),rangeStart.getTime())); cursor.setHours(0,0,0,0);
 let n=0;
 while(cursor<=rangeEnd && n<800){
  n++;
  const dow=cursor.getDay(); let matches=false;
  if(ev.recurrence==="daily") matches=true;
  else if(ev.recurrence==="weekdays") matches=dow>=1&&dow<=5;
  else if(ev.recurrence==="weekends") matches=dow===0||dow===6;
  else if(ev.recurrence==="weekly") matches=weeklyDays.includes(dow);
  else if(ev.recurrence==="monthly") matches=cursor.getDate()===base.getDate();
  else if(ev.recurrence==="quarterly") matches=cursor.getDate()===base.getDate() && ((cursor.getFullYear()*12+cursor.getMonth())-(base.getFullYear()*12+base.getMonth()))%3===0;
  else if(ev.recurrence==="yearly") matches=cursor.getDate()===base.getDate()&&cursor.getMonth()===base.getMonth();
  if(matches&&cursor>=base) out.push(new Date(cursor));
  cursor=calAddDays(cursor,1);
 }
 return out;
}
function occurrencesInRange(senior, rangeStart, rangeEnd){
 const out=[];
 (senior.events||[]).forEach(ev=>{ expandOccurrences(ev,rangeStart,rangeEnd).forEach(date=>out.push({date,event:ev})); });
 (senior.medications||[]).forEach(m=>{
  let cursor=new Date(rangeStart); cursor.setHours(0,0,0,0);
  while(cursor<=rangeEnd){
   const dow=cursor.getDay(); const allowed=(m.daysOfWeek&&m.daysOfWeek.length)?m.daysOfWeek:null;
   if(!allowed||allowed.includes(dow)) out.push({date:new Date(cursor),event:{id:"med_"+m.id,title:`${m.name} ${m.dose}`,type:"medication",isMed:true}});
   cursor=calAddDays(cursor,1);
  }
 });
 return out.sort((a,b)=>a.date-b.date);
}

function CalendarCare({ goTo, t }) {
 const store = useStore();
 const s = store?.seniors?.find(x=>x.id===(store?.activeSeniorId||"s1")) || store?.seniors?.[0];
 const [cursor, setCursor] = useState(new Date());
 const [modal, setModal] = useState(null);
 const today = new Date(); today.setHours(0,0,0,0); // start of today, so today's own events aren't excluded once the clock moves past midnight
 const days = calMonthGrid(cursor.getFullYear(), cursor.getMonth());
 const rangeStart = days[0], rangeEnd = calAddDays(days[41],1);
 const occ = s ? occurrencesInRange(s, rangeStart, rangeEnd) : [];
 const byDay = {};
 occ.forEach(o=>{ const k=calYmd(o.date); (byDay[k]=byDay[k]||[]).push(o.event); });
 const upcoming = s ? occurrencesInRange(s, today, calAddDays(today,14)).filter(o=>!o.event.isMed).slice(0,8) : [];

 const nav = (dir) => { const d=new Date(cursor); d.setMonth(d.getMonth()+dir); setCursor(d); };
 const saveEvent = (data) => {
  if(!s) return;
  if(data.id) STORE.updateEvent(s.id, data.id, data);
  else STORE.addEvent(s.id, data);
  setModal(null);
 };
 const deleteEvent = (id) => { if(s) STORE.deleteEvent(s.id, id); setModal(null); };

 return (
  <div style={{flex:1,display:"flex",flexDirection:"column",background:t.bg,overflow:"hidden"}}>
   <Hdr t={t} title="Calendar" sub={`Para kay ${s?.name||"Senior"}`} back={()=>goTo(CR.DASH)} right={
    <button onClick={()=>setModal({date:calYmd(today)})} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:14,padding:"6px 12px",cursor:"pointer",color:"#fff",fontSize:12,fontWeight:800}}>+ Event</button>
   }/>
   <div style={{flex:1,overflow:"auto",padding:"14px 16px"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
     <button onClick={()=>nav(-1)} style={{width:32,height:32,borderRadius:9,background:t.bg2,border:`1px solid ${t.cardBorder}`,color:t.text2}}>‹</button>
     <div style={{fontSize:15,fontWeight:900,color:t.text}}>{cursor.toLocaleDateString('en-PH',{month:'long',year:'numeric'})}</div>
     <button onClick={()=>nav(1)} style={{width:32,height:32,borderRadius:9,background:t.bg2,border:`1px solid ${t.cardBorder}`,color:t.text2}}>›</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:18}}>
     {DOW_SHORT_TL.map(d=><div key={d} style={{textAlign:"center",fontSize:9.5,fontWeight:800,color:t.text3,padding:"4px 0"}}>{d}</div>)}
     {days.map((d,i)=>{
      const inMonth=d.getMonth()===cursor.getMonth(); const isToday=calSameDay(d,today);
      const evs=byDay[calYmd(d)]||[];
      return (
       <div key={i} onClick={()=>setModal({date:calYmd(d)})} style={{aspectRatio:"1",borderRadius:8,background:isToday?t.redBg:t.bg2,border:isToday?`1.5px solid ${t.red}`:"1px solid transparent",opacity:inMonth?1:0.3,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",position:"relative"}}>
        <span style={{fontSize:11,fontWeight:800,color:isToday?t.red:t.text2}}>{d.getDate()}</span>
        {evs.length>0 && <span style={{width:4,height:4,borderRadius:2,background:EVENT_TYPES[evs[0].type]?.color||t.gold,marginTop:2}}></span>}
       </div>
      );
     })}
    </div>
    <div style={{fontSize:11,fontWeight:800,color:t.text3,letterSpacing:1,marginBottom:10}}>PAPARATING (14 ARAW)</div>
    {upcoming.length===0 ? (
     <div style={{textAlign:"center",padding:"24px 0",color:t.text3,fontSize:13,fontWeight:700}}>Walang naka-schedule.</div>

      <Icon name="upload" size={20} color={prescUploaded?t.green:t.text2}/><span style={{fontSize:13,fontWeight:800,color:prescUploaded?t.green:t.text2}}>{prescUploaded?"Na-upload ✓":"Upload Reseta"}</span>

function AddMedCare({ goTo, t, plan }) {
 const store = useStore();

 const FREQ_OPTS = ["1x","2x","3x","4x","custom"];
 const MED_ROUTES = { oral:"Oral", topical:"Topical", injection:"Injection", inhaler:"Inhaler", drops:"Drops", patch:"Patch", other:"Iba pa" };
 const DOW_TL_SHORT = ["Lin","Lun","Mar","Miy","Huw","Biy","Sab"];
 const [med, setMed] = useState({ name:"", dose:"", freq:"1x", schedule:["08:00"], route:"oral", prn:false, daysOfWeek:[], startDate:"", endDate:"", instructions:"", prescribedBy:"", refillCount:"", refillThreshold:"" });
 const [customTime, setCustomTime] = useState("");
 const inp=(k,v)=>setMed(m=>({...m,[k]:v}));
 const setFreq=(f)=>{
  const slots = f==="custom" ? med.schedule : freqToSlots(f);
  setMed(m=>({...m,freq:f,schedule:slots}));
 };
 const addSlot=()=>{ if(customTime&&!med.schedule.includes(customTime)) { setMed(m=>({...m,schedule:[...m.schedule,customTime].sort()})); setCustomTime(""); } };
 const removeSlot=(tm)=>setMed(m=>({...m,schedule:m.schedule.filter(s=>s!==tm)}));
 const toggleDay=(d)=>setMed(m=>({...m,daysOfWeek:m.daysOfWeek.includes(d)?m.daysOfWeek.filter(v=>v!==d):[...m.daysOfWeek,d].sort()}));
 const inputStyle={width:"100%",height:52,borderRadius:16,border:`1.5px solid ${t.cardBorder}`,padding:"0 16px",fontSize:15,fontWeight:700,background:t.bg2,color:t.text,outline:"none",fontFamily:"'Nunito',sans-serif",boxSizing:"border-box"};
 if (!canUse(plan,"medications")) return (

 );
 return (

        </div>
       )}

      <div>
       <div style={{fontSize:11,fontWeight:800,color:t.text3,marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>Mga araw (blangko = araw-araw)</div>

        <div style={{fontSize:11,fontWeight:800,color:t.text3,marginBottom:6,textTransform:"uppercase",letterSpacing:0.8}}>Alertuhan kapag</div>
        <input type="number" value={med.refillThreshold} onChange={e=>inp("refillThreshold",e.target.value)} placeholder="5" style={{...inputStyle,height:46,fontSize:13}}/>
       </div>
      </div>

      {/* Instructions + prescriber */}
      <div>
       <div style={{fontSize:11,fontWeight:800,color:t.text3,marginBottom:6,textTransform:"uppercase",letterSpacing:0.8}}>Mga tagubilin</div>
       <input value={med.instructions} onChange={e=>inp("instructions",e.target.value)} placeholder="hal. Inumin kasabay ng pagkain" style={inputStyle}/>

      <div>
       <div style={{fontSize:11,fontWeight:800,color:t.text3,marginBottom:6,textTransform:"uppercase",letterSpacing:0.8}}>Inireseta ni</div>

      </div>
     </div>
    </Card>
    <button onClick={()=>{
      if(!med.name||!med.dose) return;
      if(!med.prn && !med.schedule.length) return;
      STORE.addMed(activeSid,{
        name:med.name, dose:med.dose, freq:med.freq, schedule:med.prn?[]:med.schedule,

     I-save ang Gamot

   </div>
  </div>
 );
}

function ContactsCare({ goTo, t, plan }) {
 const store = useStore();
 const [adding, setAdding] = useState(false);
 const [callTarget, setCallTarget] = useState(null);
 const [newC, setNewC] = useState({ name:"", rel:"Anak", num:"" });
 const [errors, setErrors] = useState({});
 const activeSid = store?.activeSeniorId ||"s1";
 const contacts = (store?.seniors?.find(x=>x.id===activeSid) || store?.seniors?.[0])?.contacts || [];
 const maxContacts = PLANS[plan]?.maxContacts ?? 1;
 const atLimit = contacts.length >= maxContacts;
 const validateAndSave = () =>{
  if (atLimit) return;
  const errs = {};
  if (!newC.name.trim()) errs.name ="Kailangan ang pangalan.";
  else if (!isFullName(newC.name)) errs.name ="Ilagay ang buong pangalan (una at apelyido).";
  if (!newC.num.trim()) errs.num ="Kailangan ang numero.";
  else if (normalizePhone(newC.num).length < 7) errs.num ="Hindi valid ang numero.";
  else if (isDuplicatePhone(contacts, newC.num)) errs.num ="Ginagamit na ang numerong ito. Gamitin ang ibang numero.";
  setErrors(errs);
  if (Object.keys(errs).length) return;
  STORE.addContact(activeSid, newC);
  setAdding(false);
  setNewC({ name:"", rel:"Anak", num:"" });
  setErrors({});
 };
 const inputStyle = { width:"100%", height:48, borderRadius:14, border:`1.5px solid ${t.cardBorder}`, padding:"0 14px", fontSize:14, fontWeight:700, background:t.bg2, color:t.text, outline:"none", fontFamily:"'Nunito',sans-serif", boxSizing:"border-box" };
 return (
  <div style={{flex:1,display:"flex",flexDirection:"column",background:t.bg,overflow:"hidden",position:"relative"}}>
   <Hdr t={t} title="Emergency Contacts" sub={`${contacts.length}/${maxContacts} na-gamit sa ${PLANS[plan]?.name||plan} plan`} right={
    <button onClick={()=>atLimit?goTo(CR.PRICING):setAdding(a=>!a)} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:14,padding:"6px 12px",cursor:"pointer",color:"#fff",fontSize:12,fontWeight:700}}>
     {adding?"✕ Isara":atLimit?"🔒 Dagdag":"+ Dagdag"}
    </button>
   }/>
   <div style={{flex:1,overflow:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:12}}>
    {atLimit && !adding && (
     <div onClick={()=>goTo(CR.PRICING)} style={{background:t.isDark?"rgba(240,160,48,0.1)":"#FFFBF0",border:`1.5px solid ${t.warnBorder}`,borderRadius:16,padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
      <span style={{fontSize:22}}>🔒</span>
      <div style={{flex:1}}>
       <div style={{fontSize:13,fontWeight:800,color:t.text}}>Umabot na sa limitasyon ng {PLANS[plan]?.name}</div>
       <div style={{fontSize:11.5,color:t.text3,fontWeight:600,marginTop:2}}>I-upgrade para magdagdag pa ng emergency contact →</div>
      </div>
     </div>

    {adding&&(
     <Card t={t}>
      <div style={{fontSize:13,fontWeight:800,color:t.text2,marginBottom:12}}>BAGONG CONTACT</div>
      <div style={{background:t.isDark?"rgba(240,160,48,0.08)":"#FFFBF0",border:`1px solid ${t.warnBorder}`,borderRadius:12,padding:"10px 12px",marginBottom:12,fontSize:12,fontWeight:600,color:t.text2,lineHeight:1.5}}>
       Kailangan ng buong pangalan (una at apelyido) at natatanging numero. Hindi puwedeng gumamit ng numero na nasa listahan na.

      {/* Name */}

       <div style={{fontSize:11,color:t.text3,fontWeight:700,marginBottom:5}}>Buong Pangalan *</div>
       <input value={newC.name} onChange={e=>setNewC(c=>({...c,name:e.target.value}))} placeholder="hal. Juan dela Cruz" style={{...inputStyle,border:`1.5px solid ${errors.name?t.red:t.cardBorder}`}}/>
       {errors.name&&<div style={{fontSize:11,color:t.red,fontWeight:700,marginTop:4}}>{errors.name}</div>}
      </div>

      <div style={{marginBottom:10}}>

function CloudSyncCard({ t }) {
 const [st, setSt] = useState(NAKSYNC.status());
 const [code, setCode] = useState("");
 const [busy, setBusy] = useState(false);
 const [err, setErr] = useState("");
 useEffect(()=>NAKSYNC.onChange(setSt),[]);
 const doPair = async () => {
  setBusy(true); setErr("");
  const r = await NAKSYNC.pair(code);
  setBusy(false);
  if(!r.ok) setErr(r.err||"Hindi nakakonekta");
 };
 return (
  <Card t={t}>
   <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
    <Icon name="refresh" size={16} color={t.text3}/>
    <div style={{fontSize:13,fontWeight:800,color:t.text2}}>CLOUD SYNC</div>
    <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6}}>
     <div style={{width:8,height:8,borderRadius:4,background:st.paired?t.green:st.configured?t.warn:t.text3}}/>
     <span style={{fontSize:10,fontWeight:800,color:t.text3}}>{st.paired?"KONEKTADO":st.configured?"HANDA":"OFF"}</span>
    </div>
   </div>
   {!st.configured && (
    <div style={{fontSize:12,color:t.text3,fontWeight:600,lineHeight:1.6}}>
     Hindi pa naka-set ang Supabase credentials sa file na ito. Buksan ang app.html at ilagay ang SYNC_CONFIG url at anonKey — makikita sa DEPLOY guide.
    </div>
   )}
   {st.configured && !st.paired && (
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
     <div style={{fontSize:12,color:t.text3,fontWeight:600,lineHeight:1.6}}>
      Ilagay ang 6-character Family Code mula sa NakNak web dashboard para i-sync ang device na ito.
     </div>
     <div style={{display:"flex",gap:8}}>
      <input value={code} onChange={e=>setCode(e.target.value.toUpperCase())} maxLength={6} placeholder="A1B2C3"
       style={{flex:1,height:48,borderRadius:14,border:`1.5px solid ${t.cardBorder}`,background:t.bg2,color:t.text,padding:"0 14px",fontSize:18,fontWeight:900,letterSpacing:4,textAlign:"center",outline:"none",fontFamily:"'Nunito',sans-serif"}}/>
      <button onClick={doPair} disabled={busy||code.length<6}
       style={{padding:"0 18px",height:48,borderRadius:14,background:code.length>=6?t.red:t.bg2,border:"none",cursor:code.length>=6?"pointer":"default",fontSize:13,fontWeight:900,color:code.length>=6?"#fff":t.text3}}>
       {busy?"…":"I-connect"}
      </button>
     </div>
     {err&&<div style={{fontSize:11,color:t.red,fontWeight:700}}>{err}</div>}
    </div>
   )}
   {st.paired && (
    <div style={{display:"flex",alignItems:"center",gap:12}}>
     <div style={{flex:1}}>
      <div style={{fontSize:13,fontWeight:800,color:t.green}}>Naka-sync sa Family Space</div>
      <div style={{fontSize:11,color:t.text3,fontWeight:700,marginTop:2}}>Ang device na ito ay naka-pair na at awtomatikong nag-aa-update</div>
     </div>
     <button onClick={()=>NAKSYNC.unpair()} style={{padding:"8px 14px",borderRadius:12,background:"none",border:`1.5px solid ${t.redBorder}`,cursor:"pointer",fontSize:11,fontWeight:800,color:t.red}}>I-disconnect</button>
    </div>
   )}
  </Card>
 );
}

  [CR.CALENDAR]: <CalendarCare goTo={goTo} t={t}/>,
  [CR.CONTACTS]: <ContactsCare goTo={goTo} t={t} plan={plan}/>,
  [CR.PRICING]: <PricingCare goTo={goTo} t={t} plan={plan} onUpgrade={id=>{onUpgradePlan(id);goTo(CR.SETTINGS);}}/>,
  [CR.SETTINGS]: <CareSettings goTo={goTo} t={t} displayMode={displayMode} setDisplayMode={setDisplayMode} onSwitchRole={onSwitchRole} plan={plan} lang={lang} setLang={setLang}/>,
 };
 return (
  <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
   <SBar t={t} battery={76}/>
   <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>{screens[screen]||screens[CR.DASH]}</div>
  </div>
 );
}

// ═══════════════════════════════════════════════════════════════════════════════
// ROOT — Onboarding State Machine
// ═══════════════════════════════════════════════════════════════════════════════
function NakNak() {
 // Onboarding state
 const [lang, setLang] = useState(loadLang);
 // expose lang globally for SOSButton (which can't receive prop easily)
 useEffect(()=>{ window._nakNakLang = lang; }, [lang]);
 const [step, setStep] = useState(0); // 0=role, 1=name, 2=a11y(senior only), 3=done
 const [role, setRole] = useState(null);     //"senior_pwd" |"caregiver"
 const [userName, setUserName] = useState("");
 const [a11yProfile, setA11yProfile] = useState(() =>loadA11yProfile() || { vision:false, hearing:false, mobility:false, cognitive:false, general:false });
 const [onboardDone, setOnboardDone] = useState(false);
 // App state
 const [displayMode, setDisplayMode] = useState("light");
 const [plan, setPlan] = useState("free");
 const t = buildTheme(displayMode);
 const a11y = getA11y(a11yProfile);
 const handleUpgrade=(p)=>{ STORE.setPlan(p); setPlan(p); };
 const handleSwitchRole=()=>{ setRole(null); setStep(0); setOnboardDone(false); setUserName(""); setA11yProfile({vision:false,hearing:false,mobility:false,cognitive:false,general:false}); };

 // Onboarding flow
 const handleSelectRole=(r)=>{ setRole(r); setStep(1); };
 const handleSetName=(n)=>{ setUserName(n); setStep(r=>{ return role==="senior_pwd"?2:3; }); };
 const handleA11y=(sel)=>{
  const profile={vision:false,hearing:false,mobility:false,cognitive:false,general:false};
  sel.forEach(id=>{ if(profile.hasOwnProperty(id)) profile[id]=true; });
  setA11yProfile(profile); setStep(3);
 };
 const handleOnboardDone=()=>{ saveA11yProfile(a11yProfile); setOnboardDone(true); };

 // Resolve the correct step after setRole
 const resolvedStep = !role ? 0 : step;

 const renderPhone = () =>{
  if (!onboardDone) {
   if (resolvedStep===0) return <RoleSelection onSelect={handleSelectRole} lang={lang} setLang={setLang}/>;
   if (resolvedStep===1) return <SetupName role={role} lang={lang} onNext={name=>{ setUserName(name); setStep(role==="senior_pwd"?2:3); }}/>;
   if (resolvedStep===2) return <AccessibilitySetup name={userName} onNext={handleA11y} lang={lang}/>;
   if (resolvedStep===3) return <OnboardingDone name={userName} role={role} a11y={a11yProfile} onDone={handleOnboardDone}/>;
  }
  if (role==="senior_pwd") return <SeniorApp onSwitchRole={handleSwitchRole} t={t} plan={plan} a11y={a11y} userName={userName} lang={lang}/>;
  if (role==="caregiver") return <CaregiverApp onSwitchRole={handleSwitchRole} t={t} plan={plan} onUpgradePlan={handleUpgrade} displayMode={displayMode} setDisplayMode={setDisplayMode} userName={userName} lang={lang} setLang={setLang}/>;
  return <RoleSelection onSelect={handleSelectRole}/>;
 };

 return (
  <div style={{minHeight:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-start",padding:"16px 16px 32px",gap:14}}>
   {/* Header label */}
   <div style={{textAlign:"center",animation:"fadeUp 0.5s ease"}}>
    <div style={{color:"#FF6B5B",fontSize:22,fontWeight:900,letterSpacing:-0.5,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><Icon name="heart" size={20} color="#FF6B5B"/>NakNak</div>
    <div style={{color:"rgba(255,255,255,0.3)",fontSize:10,fontWeight:600,marginTop:2}}>
     {!role&&"Piliin ang iyong papel"}
     {role==="senior_pwd"&&onboardDone&&`Senior/PWD Mode · ${a11y.bigBtn?"Accessible":""}`}
     {role==="caregiver"&&onboardDone&&`Caregiver Mode · ${PLANS[plan]?.name}`}
    </div>
   </div>

   {/* Phone frame */}
   <div style={{width:390,height:792,background:role&&onboardDone?t.bg:"#100906",borderRadius:46,overflow:"hidden",boxShadow:"0 50px 100px rgba(0,0,0,0.65),0 0 0 9px #111,0 0 0 11px #262626",display:"flex",flexDirection:"column",fontFamily:"'Nunito',sans-serif",transition:"background 0.4s ease",animation:"fadeUp 0.6s ease 0.1s both",position:"relative"}}>
    {renderPhone()}
   </div>

   {/* External controls */}
   <div style={{display:"flex",flexWrap:"wrap",gap:7,justifyContent:"center",maxWidth:430,animation:"fadeUp 0.5s ease 0.2s both"}}>
    <button onClick={handleSwitchRole} style={{padding:"7px 14px",background:"rgba(255,107,91,0.2)",border:"1px solid rgba(255,107,91,0.4)",borderRadius:20,color:"#FF6B5B",fontSize:11.5,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>Role Selection</button>
    {[["Light",()=>setDisplayMode("light")],["Dark",()=>setDisplayMode("dark")],["Auto",()=>setDisplayMode("auto")]].map(([l,fn])=>(
     <button key={l} onClick={fn} style={{padding:"7px 13px",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.14)",borderRadius:20,color:"rgba(255,255,255,0.78)",fontSize:11.5,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>{l}</button>
    ))}
    {["free","essential","family"].map(p=>(
     <button key={p} onClick={()=>handleUpgrade(p)} style={{padding:"7px 13px",background:plan===p?"rgba(196,48,30,0.3)":"rgba(255,255,255,0.06)",border:`1px solid ${plan===p?"rgba(196,48,30,0.6)":"rgba(255,255,255,0.12)"}`,borderRadius:20,color:plan===p?"#FF6B5B":"rgba(255,255,255,0.65)",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>{PLANS[p].name}</button>
    ))}
   </div>
   <div style={{color:"rgba(255,255,255,0.18)",fontSize:10.5,fontWeight:600,textAlign:"center"}}>
    LIGTAS · SIMPLE · PANG-PAMILYA · NakNak dahil mahal ka namin 
   </div>
  </div>
 );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AppErrorBoundary><NakNak/></AppErrorBoundary>);
</script>
</body>
</html>
