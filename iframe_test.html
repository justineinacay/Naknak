function dragCard(e, id){
  e.dataTransfer.setData('text/plain', id);
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(()=>{ const el=e.target.closest('.pipe-card'); if(el) el.classList.add('dragging'); }, 0);
}
function dragCardEnd(e){
  const el = e.target.closest('.pipe-card');
  if(el) el.classList.remove('dragging');
  document.querySelectorAll('.pipe-col.drag-over').forEach(c=>c.classList.remove('drag-over'));
}
function dropOnStage(e, stage){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const id = e.dataTransfer.getData('text/plain');
  const c = (APP.data.clients||[]).find(x=>x.id===id);
  if(!c || c.status===stage) return;
  c.status = stage;
  lsSave('clients', APP.data.clients);
  logActivity('','Moved to '+stage,'client',c.name,'teal');
  renderCurrentPage();
  toast(c.name+' → '+stage,'success');
}

function postPlatforms(c){ return Array.isArray(c.platforms)&&c.platforms.length ? c.platforms : (c.platform ? [c.platform] : ['Various']); }

function drivePreviewUrl(url){
  if(!url) return null;
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w400`;
  const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if(m2) return `https://drive.google.com/thumbnail?id=${m2[1]}&sz=w400`;
  if(/\.(jpg|jpeg|png|gif|webp|svg)/i.test(url)) return url;
  return null;
}

function renderSPCalendar(posts){
  const now = new Date();
  const ref = APP.spCalMonth ? new Date(APP.spCalMonth) : now;
  const y = ref.getFullYear(), m = ref.getMonth();
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const monthLabel = ref.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const todayStr = now.toISOString().split('T')[0];
  const prevM = new Date(y, m-1, 1).toISOString().split('T')[0];
  const nextM = new Date(y, m+1, 1).toISOString().split('T')[0];

  const byDate = {};
  posts.forEach(p => {
    const d = p.scheduleDate || '';
    if(d && d.slice(0,7) === `${y}-${String(m+1).padStart(2,'0')}`) {
      (byDate[d] = byDate[d]||[]).push(p);
    }
  });

  let cells = '';
  for(let i=0;i<firstDay;i++) cells += `<div class="sp-cal-day other-month"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayPosts = byDate[ds]||[];
    cells += `<div class="sp-cal-day">
      <div class="sp-cal-num${ds===todayStr?' today':''}">${d}</div>
      ${dayPosts.map(p=>`<div class="sp-cal-pill ${p.status}" onclick="openPostDetail('${p.id}')" title="${p.title}">${platIcon(postPlatforms(p)[0])} ${p.title.slice(0,18)}</div>`).join('')}
    </div>`;
  }
  const rem = (firstDay+daysInMonth)%7;
  if(rem>0) for(let i=rem;i<7;i++) cells += `<div class="sp-cal-day other-month"></div>`;

  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <button class="btn btn-sm btn-secondary" onclick="APP.spCalMonth='${prevM}';renderCurrentPage()">← Prev</button>
    <div style="font-size:13px;font-weight:600">${monthLabel}</div>
    <button class="btn btn-sm btn-secondary" onclick="APP.spCalMonth='${nextM}';renderCurrentPage()">Next →</button>
  </div>
  <div class="sp-cal-wrap">
    <div class="sp-cal">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="sp-cal-hdr">${d}</div>`).join('')}${cells}</div>
  </div>`;
}

function renderSPInsights(allContent){
  if(!allContent.length) return '';
  const platforms = Object.keys(PLAT_META);
  const cards = platforms.map(p=>{
    const posts = allContent.filter(c=>postPlatforms(c).includes(p));
    if(!posts.length) return '';
    const approved = posts.filter(x=>x.status==='approved').length;
    const pending  = posts.filter(x=>x.status==='pending').length;
    const revision = posts.filter(x=>x.status==='revision').length;
    return `<div class="insight-card">
      <div class="insight-icon">${platIcon(p)}</div>
      <div class="insight-name">${p}</div>
      <div class="insight-stat">${posts.length}</div>
      <div class="insight-sub">total posts</div>
      <div class="insight-pills">
        ${approved?`<span class="tag t-green" style="font-size:9px">${approved} done</span>`:''}
        ${pending?`<span class="tag t-red" style="font-size:9px">${pending} pending</span>`:''}
        ${revision?`<span class="tag t-amber" style="font-size:9px">${revision} revision</span>`:''}
      </div>
    </div>`;
  }).filter(Boolean).join('');
  if(!cards) return '';
  return `
  <div class="sec-head" style="margin-top:24px"><div class="sec-title">Platform Insights</div></div>
  <div class="insights-grid">${cards}</div>`;
}

async function markOnboardingStep(clientId, newStep){
  const done = newStep >= OB_STEPS.length;
  await updateDoc('clients', clientId, { onboardingStep:newStep, onboardingDone:done, status:done?'Active':undefined, _actAction:'updated onboarding step', _actIcon:'', _actColor:'teal', _actRecord:APP.data.clients.find(c=>c.id===clientId)?.name || clientId });

}

/* VA: profile photo upload */
function uploadVAPhoto(vaId){
  const input = document.createElement('input');
  input.type='file'; input.accept='image/*';
  input.onchange=function(e){
    const file=e.target.files[0]; if(!file) return;
    if(file.size>2*1024*1024){ toast('Image must be under 2MB.','error'); return; }
    const r=new FileReader();
    r.onload=function(ev){ localStorage.setItem('tjc-photo-'+vaId,ev.target.result); renderCurrentPage(); toast('Profile photo updated! ','success'); };
    r.readAsDataURL(file);
  };
  input.click();
}

function saveVAPIN(vaId){
  const va = APP.data.team.find(v=>v.id===vaId);
  const oldVal = document.getElementById('va-old-pin').value;
  const newVal = document.getElementById('va-new-pin').value;
  const confirmVal = document.getElementById('va-confirm-pin').value;
  if(oldVal !== (va.pin||'1234')){ toast('Current PIN is incorrect.','error'); return; }
  if(!/^\d{4}$/.test(newVal)){ toast('New PIN must be exactly 6 digits.','error'); return; }
  if(newVal !== confirmVal){ toast('PINs do not match.','error'); return; }
  va.pin = newVal;
  lsSave('team', APP.data.team);
  document.getElementById('va-old-pin').value='';
  document.getElementById('va-new-pin').value='';
  document.getElementById('va-confirm-pin').value='';
  toast('PIN updated successfully! ','success');
}

function sendVAMessage(vaId, thread){
  const input = document.getElementById('va-msg-input');
  if(!input||!input.value.trim()){ toast('Please type a message.','error'); return; }
  const text = input.value.trim();
  const convId = thread==='management' ? 'va-'+vaId : thread;
  const convType = thread==='management' ? 'management' : 'client-partner';
  const conv = getOrCreateClientConv(convId, convType);
  const time = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  conv.messages = conv.messages||[];
  conv.messages.push({from:'va', text, time, date:'Today'});
  conv.preview=text; conv.date='Today'; conv.unread=(conv.unread||0)+1;
  lsSave('conversations', APP.data.conversations);
  APP.va.msgThread=thread;
  setVATab('messages');
  setTimeout(()=>{const el=document.getElementById('va-chat-area'); if(el) el.scrollTop=el.scrollHeight;},50);
  toast('Message sent!','success');
}

    +'</div>'

    +'onclick="stopTaskTimer(' + JSON.stringify(vaId) + ',false)">&#9209; Stop &amp; Log</button>'
    +'</div></div>';
}
function renderVATabTasksWithTimer(va, myTasks, td){
  var f = APP.va.taskFilter || 'open';
  var filters = {
    all: myTasks,
    open: myTasks.filter(function(t){ return !t.done; }),
    done: myTasks.filter(function(t){ return t.done; }),
    overdue: myTasks.filter(function(t){ return !t.done&&t.dueDate&&t.dueDate<td; }),
    oos: myTasks.filter(function(t){ return t.isOos; })
  };
  var shown = filters[f] || myTasks;
  var timer = APP.va.taskTimer;

  var filterTabs = '';
  ['all','open','done','overdue','oos'].forEach(function(k){
    filterTabs += '<div class="ftab'+(f===k?' on':'')+'" onclick="APP.va.taskFilter=\''+k+'\';setVATab(\'tasks\')">'
      +(k.charAt(0).toUpperCase()+k.slice(1))+' ('+filters[k].length+')</div>';
  });

  var rows = '';
  shown.forEach(function(t){
    var late = !!(t.dueDate&&t.dueDate<td&&!t.done);
    var isActive = !!(timer&&timer.taskId===t.id);
    var bg = late ? 'var(--overdue-row-bg)' : isActive ? 'var(--teal-pale)' : '';
    var oos = t.isOos ? '<span class="oos-badge">OOS</span> ' : '';
    var dueColor = late ? 'var(--red)' : 'var(--text3)';
    var dueText  = late ? '&#9888; Overdue' : (t.dueDate||'&#8212;');
    var fw = t.done ? 400 : 500;
    var tc = t.done ? 'task-name done' : '';
    var titleSafe = (t.title||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');

    var timerCell;
    if(t.done){
      timerCell = '<span style="font-size:11px;color:var(--text3)">&#8212;</span>';
    } else if(isActive){
      timerCell = '<button class="btn btn-xs" style="background:var(--red);color:#fff;border:none;font-size:10px"'
        +' onclick="stopTaskTimer('+JSON.stringify(va.id)+',false)">&#9209; Stop</button>';
    } else {
      timerCell = '<button class="btn btn-xs btn-secondary" style="font-size:10px"'
        +' onclick="startTaskTimer('+JSON.stringify(t.id)+','+JSON.stringify(t.title)+','+JSON.stringify(va.id)+')">&#9203; Start</button>';
    }

    rows += '<tr style="background:'+bg+';cursor:pointer" onclick="toggleTask('+JSON.stringify(t.id)+')">'
      +'<td><div class="chk'+(t.done?' done':'')+'"></div></td>'
      +'<td style="font-weight:'+fw+'" class="'+tc+'">'+oos+titleSafe+'</td>'
      +'<td>'+tagHtml(t.priority)+'</td>'
      +'<td style="font-size:11px;color:'+dueColor+'">'+dueText+'</td>'
      +'<td>'+SLA.badge(t)+'</td>'
      +'<td onclick="event.stopPropagation()" style="text-align:center">'+timerCell+'</td>'
      +'<td onclick="event.stopPropagation()">'
      +'<button class="btn-icon" style="opacity:0" onmouseenter="this.style.opacity=1" onmouseleave="this.style.opacity=0"'
      +' onclick="archiveDoc(\'tasks\','+JSON.stringify(t.id)+','+JSON.stringify(t.title.slice(0,30))+')">&#128451;</button>'
      +'</td>'
      +'</tr>';
  });

  var summary = 'Summary: '+myTasks.filter(function(t){return !t.done;}).length+' open &middot; '
    +myTasks.filter(function(t){return t.done;}).length+' done &middot; '
    +myTasks.filter(function(t){return !t.done&&t.dueDate&&t.dueDate<td;}).length+' overdue &middot; '
    +myTasks.filter(function(t){return t.isOos;}).length+' OOS';

  var emptyMsg = shown.length===0 ? emptyState('No tasks in this view.') : '';

  return buildTimerCard(timer, va.id)
    +'<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px">'
    +'<div class="ftabs">'+filterTabs+'</div>'
    +'<button class="btn btn-xs btn-primary" onclick="openAddVATask('+JSON.stringify(va.id)+')">+ Add Task</button>'
    +'</div>'
    +'<div class="card">'
    +'<table class="data-table"><thead><tr>'
    +'<th style="width:28px"></th><th>Task</th><th>Priority</th>'
    +'<th>Due</th><th>SLA</th><th style="width:80px;text-align:center">Timer</th>'
    +'<th style="width:24px"></th></tr></thead>'
    +'<tbody>'+rows+'</tbody></table>'
    +emptyMsg+'</div>'
    +'<div style="margin-top:10px;padding:8px 12px;background:var(--navy-pale);border-radius:var(--r);font-size:11px;color:var(--text)">'+summary+'</div>';
}
function renderVATabTasks(va, myTasks, td){ return renderVATabTasksWithTimer(va, myTasks, td); }



function getWeekStart(){ const d=new Date(); d.setDate(d.getDate()-d.getDay()); return d.toISOString().split('T')[0]; }

function renderVATabTimelog(va, myTasks, myLogs, td, todayMins){
  const taskChecklist = renderTimelogTaskList(va, myTasks, td);
  const elapsed = APP.timer.elapsed;
  const weekMins = myLogs.filter(l=>l.date>=getWeekStart()).reduce((a,l)=>a+(l.minutes||0),0);
  const onBreak = !!(APP.timer.running && APP.timer.breakUntil && Date.now() < APP.timer.breakUntil);
  const breakRemaining = onBreak ? Math.max(0, Math.floor((APP.timer.breakUntil - Date.now())/1000)) : 0;
  const bm = String(Math.floor(breakRemaining/60)).padStart(2,'0');
  const bs = String(breakRemaining%60).padStart(2,'0');

  // Build timer buttons cleanly
  let timerBtns = '';
  if(!APP.timer.running){
    timerBtns = `<button class="timer-btn-start" onclick="startTimer()">▶ Start Timer</button>`;
  } else if(onBreak){
    timerBtns = `<button class="timer-btn-start" onclick="endBreakEarly()">▶ Resume</button><button class="timer-btn-stop" onclick="stopTimer()">⏹ Stop</button>`;
  } else {
    timerBtns = `<button class="timer-btn-stop" onclick="stopTimer()">⏹ Stop &amp; Log</button><button style="background:var(--amber-pale);color:var(--amber);border:1px solid rgba(99,56,6,.2);padding:9px 18px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font)" onclick="startBreak()"> 1h Break</button>`;
  }

  return `${renderDayRatingWidget(va.id)}
  ${taskChecklist}
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px;text-align:center">
      <div style="font-size:18px;font-weight:700;color:var(--teal)">${fmtDurationFromSecs(myLogs.filter(l=>l.date===td).reduce((a,l)=>a+(l.minutes||0)*60+(l.seconds||0),0))}</div>
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;margin-top:3px">Today</div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px;text-align:center">
      <div style="font-size:18px;font-weight:700;color:var(--text)">${fmtDurationFromSecs(myLogs.filter(l=>l.date>=getWeekStart()).reduce((a,l)=>a+(l.minutes||0)*60+(l.seconds||0),0))}</div>
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;margin-top:3px">This Week</div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px;text-align:center">
      <div style="font-size:18px;font-weight:700;color:var(--gold-dark)">${myLogs.length}</div>
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;margin-top:3px">Total Entries</div>
    </div>
  </div>
  ${onBreak?`<div class="break-banner" id="break-banner"><div class="break-banner-text"> On break — resumes in <span id="break-countdown">${bm}:${bs}</span></div><button class="break-timer-btn" onclick="endBreakEarly()">End Break Early</button></div>`:''}
  <div class="card card-pad" style="margin-bottom:14px">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px">⏱ Live Timer</div>
    <div class="timer-display" id="timer-display">${fmtElapsed(elapsed)}</div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:14px">${timerBtns}</div>
    <div class="form-group"><label class="form-label">What are you working on? *</label><input class="form-control" id="timer-desc" placeholder="e.g. Scheduled BrandX Week 18 posts"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Client / Project</label><select class="form-control" id="timer-project"><option value="">— Select —</option>${APP.data.clients.filter(c=>c.assignedVaUid===va.id&&c.status==='Active').map(c=>`<option value="${c.id}|${c.name}">${c.name}</option>`).join('')}<option value="">Internal</option><option value="">Admin</option></select></div>
      <div class="form-group"><label class="form-label">Manual entry</label>
        <div style="display:flex;gap:6px;align-items:center">
          <input type="number" class="form-control" id="timer-manual" placeholder="0" min="0" style="text-align:center">
          <span style="font-size:12px;color:var(--text3);flex-shrink:0">min</span>
          <input type="number" class="form-control" id="timer-secs" placeholder="0" min="0" max="59" style="text-align:center">
          <span style="font-size:12px;color:var(--text3);flex-shrink:0">sec</span>
        </div>
      </div>
    </div>
    <button class="btn btn-primary w-full" onclick="logTime('${va.id}')"> Log Time Entry</button>

    <table class="data-table"><thead><tr><th>Date</th><th>Description</th><th>Project</th><th style="text-align:right">Duration</th><th style="width:24px"></th></tr></thead>
    <tbody>${myLogs.slice().reverse().map(l=>`<tr>

    </tr>`).join('')}</tbody>
    </table>${myLogs.length===0?emptyState('No time entries yet.'):''}
  </div>`;
}

function toggleVACredentials(id){
  const el = document.getElementById(id);
  const arr = document.getElementById(id+'-arr');
  if(!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  if(arr) arr.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
}
