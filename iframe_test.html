<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TJC Business OS — The Jobs Collective</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,500&display=swap" rel="stylesheet">
<script src="https://apis.google.com/js/api.js" async defer></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#131DBF;--navy2:#566AE7;--navy-pale:#EEEFFE;--navy-mid:#C5CAF0;
  --gold:#F59E0B;--gold-pale:#FEF3C7;--gold-dark:#B45309;
  --teal:#14D3C4;--teal-pale:#E0FFFD;--teal-dark:#0D9B8E;
  --red:#A32D2D;--red-pale:#FCEBEB;
  --green:#1a7a45;--green-pale:#EAF3DE;
  --amber:#633806;--amber-pale:#FAEEDA;
  --purple:#5340B7;--purple-pale:#F0EEFE;
  --bg:#F1F5F9;--surface:#FFFFFF;--border:#E2E6F2;--border2:#CBD5E1;
  --text:#0A0F3C;--text2:#44496E;--text3:#7B83A8;
  --shadow:0 1px 3px rgba(27,42,74,0.08),0 4px 12px rgba(27,42,74,0.05);
  --shadow2:0 2px 8px rgba(27,42,74,0.12),0 8px 24px rgba(27,42,74,0.08);
  --r:8px;--r2:12px;--r3:16px;
  --font:'Space Grotesk',system-ui,sans-serif;
  --sb:204px;
  --overdue-row-bg:#FFF8F8;--client-row-bg:#FFFDF0;--hover-row-bg:#FAFBFE;
}
/* ── DARK MODE TOKENS ── */
[data-theme="dark"]{
  --bg:#06082E;--surface:#0C1050;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);
  --text:#e8edf5;--text2:#8faabb;--text3:#526a80;
  --navy-pale:#141870;--navy-mid:#1D24A0;
  --gold-pale:#2A1800;--gold-dark:#F59E0B;
  --teal-pale:#051A18;--teal-dark:#14D3C4;
  --red-pale:#211010;--red:#c44040;
  --green-pale:#0d1d11;--green:#2a9a58;
  --amber-pale:#1e1408;--amber:#8a6020;
  --purple-pale:#16102a;--purple:#7060cc;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.2);
  --shadow2:0 2px 8px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.3);
}
/* ══════════════════════════════════════════
   DARK MODE — comprehensive overrides
   Fixes all elements using hardcoded navy/light colors
══════════════════════════════════════════ */
[data-theme="dark"] .sidebar{background:#131DBF}
[data-theme="dark"] .topbar{background:#080C3A;border-color:rgba(255,255,255,.08)}
[data-theme="dark"] .bottom-nav{background:#080C3A;border-color:rgba(255,255,255,.08)}

/* Auth */
[data-theme="dark"] .auth-role-btn{background:#141870;border-color:rgba(255,255,255,.1)}
[data-theme="dark"] .auth-role-btn:hover{background:var(--teal-pale);border-color:var(--teal)}
[data-theme="dark"] .auth-role-label{color:var(--text2)}
[data-theme="dark"] .auth-role-sub{color:var(--text3)}
[data-theme="dark"] .auth-card{background:#0C1050}
[data-theme="dark"] .auth-title{color:#e8edf5}
[data-theme="dark"] .auth-sub{color:var(--text3)}
[data-theme="dark"] .pin-key{background:#141870;border-color:rgba(255,255,255,.1);color:#e8edf5}
[data-theme="dark"] .pin-key:hover{background:#1D24A0}
[data-theme="dark"] .va-sel-btn{background:#141870;border-color:rgba(255,255,255,.1)}
[data-theme="dark"] .va-sel-btn:hover{background:#1D24A0}

/* Cards & surfaces */
[data-theme="dark"] .card{background:var(--surface);border-color:var(--border)}
[data-theme="dark"] .kpi-card{background:var(--surface);border-color:var(--border)}
[data-theme="dark"] .modal-head{background:var(--surface);border-color:var(--border)}
[data-theme="dark"] .modal-foot{background:var(--surface);border-color:var(--border)}
[data-theme="dark"] .fin-box{background:var(--surface);border-color:var(--border)}
[data-theme="dark"] .score-card{background:var(--surface);border-color:var(--border)}

/* Text that uses --navy directly (invisible on dark bg) */
[data-theme="dark"] .an-stat-val{color:var(--text)}
[data-theme="dark"] .sec-title{color:var(--text)}
[data-theme="dark"] .page-title{color:var(--text)}
[data-theme="dark"] .insight-stat{color:var(--text)}
[data-theme="dark"] .rmet-val{color:var(--text)}
[data-theme="dark"] .timer-display{color:var(--text)}
[data-theme="dark"] .currency-php{color:var(--text2)}
[data-theme="dark"] .modal-title{color:var(--text)}
[data-theme="dark"] .kpi-val{color:var(--text)}
[data-theme="dark"] .score-name{color:var(--text)}
[data-theme="dark"] .conv-thread-name{color:var(--text)}
[data-theme="dark"] .task-name{color:var(--text)}

/* Tags using navy */
[data-theme="dark"] .t-navy{background:#0D1166;color:#a8c0e0;border-color:rgba(255,255,255,.1)}
[data-theme="dark"] .av-navy{background:#0D1166;color:#a8c0e0}

/* Table headers */
[data-theme="dark"] .data-table th{background:#141870;color:var(--text2);border-color:var(--border)}
[data-theme="dark"] .data-table td{border-color:var(--border);color:var(--text)}
[data-theme="dark"] .data-table tbody tr:hover td{background:#141870}
[data-theme="dark"] .data-table tbody tr:nth-child(even) td{background:#0C1255}

/* Task rows */
[data-theme="dark"] .task-row:hover{background:#141870}
[data-theme="dark"] .task-row.overdue-row{background:rgba(163,45,45,.12)}

/* Buttons */
[data-theme="dark"] .btn-secondary{background:var(--surface);border-color:var(--border2);color:var(--text)}
[data-theme="dark"] .btn-secondary:hover{background:#141870;color:var(--text)}
[data-theme="dark"] .ftab.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3)}
[data-theme="dark"] .ptab.on{color:var(--text);border-bottom-color:var(--text)}
[data-theme="dark"] .bn-item.on{color:var(--text)}
[data-theme="dark"] .bn-item.on .bn-icon{background:#141870}
[data-theme="dark"] .sp-view-btn.on{background:var(--surface);color:var(--text)}

/* Forms */
[data-theme="dark"] .form-control{background:#141870;border-color:var(--border2);color:var(--text)}
[data-theme="dark"] .form-hint{background:#141870;color:var(--text2)}

/* Misc elements */
[data-theme="dark"] .conv-thread:hover{background:#141870}
[data-theme="dark"] .conv-thread.on{background:#141870;border-left-color:var(--teal)}
[data-theme="dark"] .conv-list-head{background:var(--bg)}
[data-theme="dark"] .sp-content-row:hover{background:#141870}
[data-theme="dark"] .tier-waypoint{background:#141870;color:var(--text2);border-color:var(--border2)}
[data-theme="dark"] .pin-dot.filled{background:var(--teal);border-color:var(--teal)}
[data-theme="dark"] .welcome-banner{background:linear-gradient(135deg,#131DBF 0%,#0D16A0 50%,#0A0F3C 100%)}


/* ── CALENDAR ── */
.cal-wrap{max-width:900px;margin:0 auto}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.cal-grid-head{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:2px}
.cal-day-name{font-size:10px;font-weight:700;color:var(--text3);text-align:center;padding:4px 0;text-transform:uppercase;letter-spacing:.04em}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.cal-cell{background:var(--surface);min-height:88px;padding:5px 6px;cursor:pointer;transition:background .12s;position:relative}
.cal-cell:hover{background:var(--navy-pale)}
.cal-cell-blank{background:var(--bg);cursor:default}
.cal-today{background:rgba(42,127,127,.07)!important}
.cal-sel{background:var(--teal-pale)!important;outline:2px solid var(--teal)}
.cal-day-num{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:3px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cal-today-num{background:var(--teal);color:#fff!important}
.cal-dots{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:3px}
.cal-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cal-dot-more{font-size:9px;color:var(--text3);font-weight:600}
.cal-ev-chip{font-size:10px;font-weight:500;padding:1px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5}
.cal-day-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-top:14px}
.cal-day-panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.cal-ev-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.cal-ev-row:last-child{border-bottom:none}
.cal-ev-color-bar{width:3px;border-radius:2px;align-self:stretch;flex-shrink:0;min-height:36px}
.cal-empty-day{font-size:12px;color:var(--text3);text-align:center;padding:24px 0}
.cal-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
@media(max-width:600px){.cal-cell{min-height:52px}.cal-ev-chip{display:none}}

/* ── NOTIFICATION BADGE ── */
.notif-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:10px;padding:0 5px;min-width:16px;height:16px;margin-left:4px;line-height:1}

/* ── ACCOUNTS TAB ── */
.acc-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.acc-row:last-child{border-bottom:none}

.theme-toggle-btn{
  width:34px;height:34px;border-radius:var(--r);border:1px solid var(--border2);
  background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .18s;color:var(--text2);flex-shrink:0;
}
.theme-toggle-btn:hover{background:var(--navy-pale);color:var(--text);transform:scale(1.05)}
.theme-toggle-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.theme-toggle-btn .icon-sun{display:none}
.theme-toggle-btn .icon-moon{display:block}
[data-theme="dark"] .theme-toggle-btn .icon-sun{display:block}
[data-theme="dark"] .theme-toggle-btn .icon-moon{display:none}

/* ── AUTH BACK TO WEBSITE LINK ── */
.auth-back-web{
  display:inline-flex;align-items:center;gap:5px;
  margin-top:18px;font-size:11px;color:rgba(255,255,255,.45);
  text-decoration:none;transition:color .15s;letter-spacing:.02em;
}
.auth-back-web:hover{color:rgba(255,255,255,.8)}

html,body{height:100%;font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;overflow:auto;transition:background .25s,color .25s}
.hidden{display:none!important}
#app-shell{display:flex;height:100vh;overflow:hidden}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199}
.sb-overlay.show{display:block}
.sidebar{width:var(--sb);flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;z-index:200;transition:transform .3s}
.sb-brand{padding:14px 12px 10px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo-row{display:flex;align-items:center;gap:8px}
.sb-icon{width:28px;height:28px;border-radius:7px;background:rgba(255,255,255,.1);border:1px solid rgba(201,168,76,.4);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-icon svg{width:14px;height:14px}
.sb-name{font-size:12.5px;font-weight:600;color:#fff;line-height:1.2}
.sb-role{font-size:10px;color:rgba(255,255,255,.45)}
.sb-nav{flex:1;padding:8px 0}
.sb-sect{font-size:9px;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.08em;padding:9px 12px 3px}
.sb-item{display:flex;align-items:center;gap:7px;padding:6px 12px;cursor:pointer;color:rgba(255,255,255,.6);font-size:12px;font-weight:400;transition:all .15s;position:relative;white-space:nowrap;overflow:hidden}
.sb-item:hover{color:#fff;background:rgba(255,255,255,.07)}
.sb-item.on{color:#fff;background:rgba(201,168,76,.18);font-weight:500}
.sb-item.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);border-radius:0 2px 2px 0}
.sb-item svg{width:13px;height:13px;flex-shrink:0;opacity:.7}
.sb-item.on svg,.sb-item:hover svg{opacity:1}
.sb-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:10px;padding:1px 5px;min-width:16px;text-align:center}
.sb-badge.warn{background:var(--gold)}
.sb-footer{flex-shrink:0;padding:10px 12px;border-top:1px solid rgba(255,255,255,.1)}
.sb-fx{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:var(--r);padding:8px 10px;margin-bottom:8px}
.sb-fx-label{font-size:9px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.sb-fx-row{display:flex;align-items:center;gap:4px}
.sb-fx-val{font-size:13px;font-weight:700;color:#fff}
.sb-fx-sub{font-size:10px;color:rgba(255,255,255,.45);flex:1}
.sb-fx-edit{width:22px;height:22px;border:1px solid rgba(255,255,255,.2);border-radius:5px;background:transparent;color:rgba(255,255,255,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s}
.sb-fx-edit:hover{background:rgba(255,255,255,.1);color:#fff}
.sb-verse{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.18);border-radius:var(--r);padding:7px 9px;margin-bottom:8px}
.sb-verse-ref{font-size:9px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.sb-verse-text{font-size:10px;color:rgba(255,255,255,.6);font-style:italic;line-height:1.5}
.sb-user{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--r);cursor:pointer;transition:background .15s}
.sb-user:hover{background:rgba(255,255,255,.07)}
.sb-user-info{flex:1;min-width:0}
.sb-user-name{font-size:12px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-role{font-size:10px;color:rgba(255,255,255,.45)}
.main-area{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.hamburger{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:4px}
.hamburger span{width:18px;height:2px;background:var(--text2);border-radius:2px;display:block}
.page-title{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap}
.rt-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--text3)}
.rt-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-right{display:flex;align-items:center;gap:7px}
.content-area{flex:1;overflow-y:auto;padding:18px}
.bottom-nav{display:none;flex-shrink:0;background:var(--surface);border-top:1px solid var(--border)}
.bn-inner{display:flex;justify-content:space-around;padding:6px 0 max(6px,env(safe-area-inset-bottom))}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;cursor:pointer;color:var(--text3);font-size:10px;min-width:48px;border-radius:var(--r);position:relative}
.bn-item.on{color:var(--text)}
.bn-item.on .bn-icon{background:var(--navy-pale)}
.bn-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.bn-icon svg{width:16px;height:16px}
.bn-dot{position:absolute;top:2px;right:8px;width:7px;height:7px;background:var(--red);border-radius:50%;border:1.5px solid var(--surface)}
.av{border-radius:50%;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:.02em}
.av-xs{width:16px;height:16px;font-size:8px}
.av-sm{width:22px;height:22px;font-size:9px}
.av-md{width:30px;height:30px;font-size:11px}
.av-lg{width:40px;height:40px;font-size:14px}
.av-xl{width:52px;height:52px;font-size:18px}
.av-navy{background:var(--navy-pale);color:var(--text)}
.av-teal{background:var(--teal-pale);color:var(--teal-dark)}
.av-gold{background:var(--gold-pale);color:var(--gold-dark)}
.av-red{background:var(--red-pale);color:var(--red)}
.av-green{background:var(--green-pale);color:var(--green)}
.av-purple{background:var(--purple-pale);color:var(--purple)}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600;white-space:nowrap;letter-spacing:.02em}
.t-navy{background:var(--navy-pale);color:var(--text)}
.t-gold{background:var(--gold-pale);color:var(--gold-dark)}
.t-teal{background:var(--teal-pale);color:var(--teal-dark)}
.t-green{background:var(--green-pale);color:var(--green)}
.t-red{background:var(--red-pale);color:var(--red)}
.t-amber{background:var(--amber-pale);color:var(--amber)}
.t-gray{background:#F1F3F7;color:var(--text2)}
.t-purple{background:var(--purple-pale);color:var(--purple)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.card-pad{padding:14px 16px}
.card-hover{transition:all .18s;cursor:pointer}
.card-hover:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:20px;align-items:stretch}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;border-left:3px solid var(--border2);transition:all .2s;cursor:pointer;display:flex;flex-direction:column;height:100%}
.kpi-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.kpi-label{font-size:11px;font-weight:500;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.kpi-val{font-size:24px;font-weight:700;line-height:1;margin-bottom:3px}
.kpi-sub{font-size:11px;color:var(--text3)}
.kpi-sub2{font-size:10px;color:var(--text3);margin-top:2px}
.kpi-up{color:var(--green)}
.kpi-dn{color:var(--red)}
.kpi-warn{color:var(--amber)}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:5px}
.sec-action{font-size:11px;color:var(--teal);cursor:pointer;font-weight:500}
.sec-action:hover{text-decoration:underline}
.pipeline{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;margin-bottom:20px}
.pipe-col{min-width:174px;flex:1}
.pipe-col-head{display:flex;align-items:center;justify-content:space-between;padding:0 4px 7px;font-size:11px;font-weight:600;color:var(--text2)}
.pipe-count{width:18px;height:18px;border-radius:50%;font-size:9px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
.pipe-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 10px 8px;margin-bottom:6px;cursor:grab;position:relative;transition:box-shadow .15s,border-color .15s,transform .15s;min-height:104px;display:flex;flex-direction:column}
.pipe-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);border-color:var(--border2)}
.pipe-card:active{cursor:grabbing}
.pipe-card.dragging{opacity:.4;transform:none;box-shadow:none}
.pipe-col.drag-over{background:var(--teal-pale);border-radius:var(--r2);outline:2px dashed var(--teal);outline-offset:-2px}
.pipe-card-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.pipe-card-name{font-size:12px;font-weight:600;padding-left:9px;margin-bottom:3px;line-height:1.3}
.pipe-card-meta{font-size:11px;color:var(--text3);padding-left:9px;margin-bottom:3px}

.dual-currency{display:flex;flex-direction:column}

.oos-badge{background:var(--purple-pale);color:var(--purple);border:1px solid rgba(83,64,183,.25);font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px}
.ob-step{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}

.ob-step-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700}

.form-group{margin-bottom:13px}

.gcal-connect-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--r);border:2px solid var(--border2);background:var(--surface);cursor:pointer;font-size:13px;font-weight:600;color:var(--text);transition:all .15s;font-family:var(--font)}

.gcal-badge{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:1px 6px;border-radius:3px;background:rgba(26,115,232,.12);color:#1a73e8}

.w-full{width:100%;justify-content:center}

.ftab.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08);font-weight:600}
.modal-overlay{position:fixed;inset:0;background:rgba(27,42,74,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s}

.modal{background:var(--surface);border-radius:var(--r2);width:100%;max-width:480px;box-shadow:var(--shadow2);transform:translateY(10px);transition:transform .25s;max-height:90vh;overflow-y:auto}

.portal-topbar{background:var(--navy);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.portal-tabs{display:flex;flex-direction:column;width:168px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;padding:10px 0;scrollbar-width:none;-ms-overflow-style:none}

.ptab{padding:9px 16px;font-size:12.5px;font-weight:500;cursor:pointer;color:var(--text3);border-left:3px solid transparent;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:6px}

.portal-body{flex:1;overflow-y:auto;padding:16px 18px}

.info-val{font-size:13px;font-weight:600}
.cp-hero{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:var(--r2);padding:22px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}

.timer-btn-stop{background:var(--red);color:#fff;border:none;padding:9px 20px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s}

  .form-row,.form-row-3{grid-template-columns:1fr}
  .pipeline{flex-direction:column}
  .pipe-col{min-width:unset}
  .content-area{padding:12px}
  .bottom-nav{display:block}
  .data-table th:nth-child(n+4),.data-table td:nth-child(n+4){display:none}

}
@media(min-width:681px){.bottom-nav{display:none!important}}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .22s ease forwards}
/* Welcome banner */
.welcome-banner{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 60%,#1a4a4a 100%);border-radius:var(--r3);padding:22px 24px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:space-between}
.welcome-banner::before{content:'';position:absolute;right:-30px;top:-30px;width:180px;height:180px;border-radius:50%;background:rgba(201,168,76,.10)}
.welcome-banner::after{content:'';position:absolute;right:60px;bottom:-40px;width:100px;height:100px;border-radius:50%;background:rgba(42,127,127,.15)}
.wb-left{position:relative}
.wb-greeting{font-size:22px;font-weight:700;margin-bottom:4px;letter-spacing:-.02em}
.wb-emoji{font-size:22px;margin-left:6px}
.wb-tip{font-size:12.5px;color:rgba(255,255,255,.75);line-height:1.5;max-width:480px}
.wb-tip strong{color:#fff}
.wb-mascot{font-size:52px;position:relative;flex-shrink:0;line-height:1;filter:drop-shadow(0 4px 12px rgba(0,0,0,.2))}
/* Colored KPI cards */
.kpi-card-colored{border-radius:var(--r2);padding:18px 20px;cursor:pointer;transition:all .2s;color:#fff;position:relative;overflow:hidden}
.kpi-card-colored:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.18)}
.kpi-card-colored::after{content:'';position:absolute;right:-15px;bottom:-15px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.08)}
.kpi-cc-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.75);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.kpi-cc-val{font-size:32px;font-weight:800;line-height:1;margin-bottom:5px}
.kpi-cc-sub{font-size:11px;color:rgba(255,255,255,.7)}
.kpi-cc-icon{position:absolute;right:16px;top:14px;font-size:22px;opacity:.4}
/* Analytics row */
.analytics-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px 18px;margin-bottom:20px}
.analytics-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.analytics-stats{display:flex;gap:24px;flex-wrap:wrap}
.an-stat{text-align:center}
.an-stat-val{font-size:16px;font-weight:700;color:var(--text)}
.an-stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-top:1px}
/* Charts */
.chart-widget{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;overflow:hidden}
.chart-widget canvas{max-height:200px}
/* Appointment status */
.appt-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border)}
.appt-item:last-child{border-bottom:none}
.appt-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.appt-info{flex:1;min-width:0}
.appt-name{font-size:12px;font-weight:600}
.appt-meta{font-size:10px;color:var(--text3)}
/* Social Planner */
.sp-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.sp-platform-filter{display:flex;gap:6px}
.sp-platform-btn{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;border:1.5px solid var(--border2);font-size:11px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--text2);transition:all .15s}
.sp-platform-btn.on{border-color:var(--teal);background:var(--teal-pale);color:var(--teal-dark)}
.sp-platform-btn:hover{border-color:var(--teal);color:var(--teal)}
.sp-view-toggle{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:2px}
.sp-view-btn{padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;color:var(--text3);transition:all .15s}
.sp-view-btn.on{background:var(--surface);color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.sp-date-range{font-size:11px;color:var(--text2);background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:5px 10px}
.sp-content-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.sp-content-row:hover{background:#FAFBFE}
.sp-content-row:last-child{border-bottom:none}
.sp-platform-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sp-thumb{width:44px;height:44px;border-radius:6px;object-fit:cover;background:var(--border);flex-shrink:0;display:block}
.sp-thumb-placeholder{width:44px;height:44px;border-radius:6px;background:var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px}
/* Platform checkbox grid */
.plat-check-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.plat-check{display:flex;align-items:center;gap:5px;padding:6px 8px;border:1.5px solid var(--border2);border-radius:7px;cursor:pointer;font-size:11px;transition:all .12s;user-select:none}
.plat-check:hover{border-color:var(--teal);background:var(--teal-pale)}
.plat-check.on{border-color:var(--teal);background:var(--teal-pale);color:var(--teal-dark);font-weight:600}
.plat-check input[type=checkbox]{width:12px;height:12px;accent-color:var(--teal);cursor:pointer}
/* Post preview card (in compose form) */
.sp-preview-card{border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;background:var(--surface);margin-top:12px}
.sp-preview-card-head{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--bg);font-size:12px;font-weight:600}
.sp-preview-img{width:100%;max-height:180px;object-fit:cover;background:var(--border);display:block}
.sp-preview-img-ph{height:120px;background:linear-gradient(135deg,var(--border),var(--bg));display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:24px}
.sp-preview-body{padding:12px;font-size:12px;line-height:1.6;color:var(--text);min-height:40px;white-space:pre-wrap}
.sp-preview-plats{padding:8px 12px;border-top:1px solid var(--border);display:flex;gap:4px;flex-wrap:wrap}
/* Calendar view */
.sp-cal-wrap{border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;background:var(--surface)}
.sp-cal{display:grid;grid-template-columns:repeat(7,1fr)}
.sp-cal-hdr{padding:7px 4px;text-align:center;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;background:var(--bg);border-bottom:1px solid var(--border)}
.sp-cal-day{min-height:80px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:5px;background:var(--surface)}
.sp-cal-day:nth-child(7n){border-right:none}
.sp-cal-day.other-month{background:var(--bg);opacity:.6}
.sp-cal-num{font-size:11px;font-weight:600;color:var(--text2);width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:3px}
.sp-cal-num.today{background:var(--teal);color:#fff}
.sp-cal-pill{font-size:9px;padding:2px 5px;border-radius:3px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;line-height:1.4}
.sp-cal-pill.pending{background:var(--red-pale);color:var(--red)}
.sp-cal-pill.approved{background:var(--green-pale);color:var(--green)}
.sp-cal-pill.revision{background:var(--amber-pale);color:var(--amber)}
/* Insights board */
.insights-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-top:20px}
.insight-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px;text-align:center}
.insight-icon{font-size:22px;margin-bottom:5px}
.insight-name{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px}
.insight-stat{font-size:24px;font-weight:700;color:var(--text);line-height:1}
.insight-sub{font-size:10px;color:var(--text3);margin-top:3px}
.insight-pills{display:flex;justify-content:center;gap:4px;margin-top:8px;flex-wrap:wrap}
/* Conversations */
/* Conversations — Email style */
.conv-layout{display:flex;height:calc(100vh - 110px);gap:0;border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;background:var(--surface)}
.conv-list{width:300px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column}
.conv-list-head{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;background:var(--bg)}
.conv-thread{display:flex;align-items:flex-start;gap:9px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;position:relative}
.conv-thread:hover{background:#f8f9fd}
.conv-thread.on{background:var(--navy-pale);border-left:3px solid var(--navy)}
.conv-thread-info{flex:1;min-width:0}
.conv-thread-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.conv-thread-subject{font-size:12px;font-weight:500;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.conv-thread-preview{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.conv-thread-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.conv-thread-date{font-size:10px;color:var(--text3)}
.conv-unread{background:var(--navy);color:#fff;font-size:9px;font-weight:700;border-radius:10px;padding:1px 5px;min-width:16px;text-align:center}
.conv-main{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--bg)}
.conv-main-head{padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface)}
.conv-main-subject{font-size:17px;font-weight:700;color:var(--text);margin-bottom:4px}
.conv-main-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.conv-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
/* Email card style per message */
.email-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.email-card-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;background:var(--bg)}
.email-card-from{flex:1;min-width:0}
.email-card-name{font-size:13px;font-weight:600}
.email-card-addr{font-size:11px;color:var(--text3)}
.email-card-body{padding:16px;font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap}
.email-card-foot{padding:8px 16px;border-top:1px solid var(--border);display:flex;gap:6px}
/* Compose pane */
.conv-compose{border-top:1px solid var(--border);background:var(--surface);padding:0}
.compose-head{padding:10px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text2);background:var(--bg);display:flex;align-items:center;justify-content:space-between}
.compose-field{display:flex;align-items:center;border-bottom:1px solid var(--border);padding:7px 16px;gap:8px}
.compose-field-label,.compose-field label{font-size:11px;font-weight:600;color:var(--text3);min-width:48px;text-transform:uppercase;letter-spacing:.04em}
.compose-field input,.compose-field textarea{flex:1;border:none;outline:none;font-size:13px;font-family:var(--font);color:var(--text);background:transparent;resize:none}
.compose-body{padding:12px 16px}
.compose-body textarea{width:100%;border:none;outline:none;font-size:13px;font-family:var(--font);color:var(--text);background:transparent;resize:none;min-height:80px;line-height:1.7}
.compose-actions{padding:10px 16px;display:flex;gap:8px;align-items:center}
.conv-sidebar{width:210px;flex-shrink:0;border-left:1px solid var(--border);padding:14px;overflow-y:auto;background:var(--surface)}
.conv-sidebar-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;margin-top:12px}
.conv-sidebar-title:first-child{margin-top:0}
.conv-detail-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}
.conv-detail-label{color:var(--text3)}
.conv-detail-val{font-weight:500;color:var(--text);text-align:right}
@media(max-width:680px){.conv-sidebar{display:none}.conv-list{width:100%}.conv-main{display:none}.conv-list.hide{display:none}.conv-main.show{display:flex}}

/* ── UNIFORMITY + COLOR POLISH ─────────────────────────────────────── */

/* Typography scale — floor is 11px, nothing below except badge micro-text */
:root{
  --fs-xs:10px; --fs-sm:11px; --fs-base:13px; --fs-md:14px; --fs-lg:15px;
  --bg:#F1F5F9;
  --border:#DDE1EE;
  --border2:#C8CEDF;
  --shadow:0 1px 4px rgba(27,42,74,.09),0 4px 14px rgba(27,42,74,.06);
  --shadow2:0 2px 10px rgba(27,42,74,.14),0 8px 28px rgba(27,42,74,.09);
}
/* Dark mode must re-declare these AFTER the second :root or it loses the cascade */
[data-theme="dark"]{
  --bg:#06082E;
  --surface:#0C1050;
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.13);
  --shadow:0 1px 4px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.2);
  --shadow2:0 2px 8px rgba(0,0,0,.4),0 8px 28px rgba(0,0,0,.3);
  --overdue-row-bg:rgba(163,45,45,.14);--client-row-bg:rgba(201,168,76,.08);--hover-row-bg:rgba(255,255,255,.04);
}

/* Base body size */
html,body{font-size:13px}

/* Section titles — navy with gold left-accent bar */
.sec-title{font-size:12px;font-weight:700;color:var(--text);border-left:3px solid var(--gold);padding-left:9px;line-height:1.3;text-transform:uppercase;letter-spacing:.04em}

/* Cards — consistent 16px padding everywhere, slightly richer shadow */
.card{box-shadow:0 1px 3px rgba(27,42,74,.06)}
.card-pad{padding:16px}

/* KPI cards — stronger left border, consistent height */
.kpi-card{border-left:4px solid var(--teal);min-height:100px}
.kpi-label{font-size:var(--fs-sm);font-weight:600;color:var(--text2);margin-bottom:8px}
.kpi-val{font-size:26px;font-weight:700}
.kpi-sub{font-size:var(--fs-sm);color:var(--text3)}
.kpi-sub2{font-size:var(--fs-sm);color:var(--text3);margin-top:2px}

/* Tags — 11px floor, slightly more padding, more visible */
.tag{font-size:var(--fs-sm);padding:3px 9px;border-radius:6px;font-weight:600}
.t-navy{background:var(--navy-pale);color:var(--text);border:1px solid var(--navy-mid)}
.t-teal{background:var(--teal-pale);color:var(--teal-dark);border:1px solid rgba(42,127,127,.2)}
.t-green{background:#E6F5EC;color:#147a38;border:1px solid rgba(26,122,69,.2)}
.t-red{background:var(--red-pale);color:var(--red);border:1px solid rgba(163,45,45,.18)}
.t-amber{background:var(--amber-pale);color:var(--amber);border:1px solid rgba(99,56,6,.18)}
.t-gold{background:var(--gold-pale);color:var(--gold-dark);border:1px solid rgba(201,168,76,.3)}
.t-purple{background:var(--purple-pale);color:var(--purple);border:1px solid rgba(83,64,183,.2)}

/* Data tables — colored headers, consistent row height */
.data-table{font-size:var(--fs-base)}
.data-table th{background:var(--navy-pale);color:var(--text2);font-size:var(--fs-xs);padding:9px 12px;border-bottom:2px solid var(--border2)}
.data-table td{padding:10px 12px;font-size:var(--fs-base)}
.data-table tbody tr:hover td{background:var(--navy-pale)}

/* Progress bars — taller, more visible */
.prog{height:6px;border-radius:4px}
.prog-lg{height:10px;border-radius:5px}
.prog-fill{border-radius:4px}

/* Topbar — thin gold accent line on top */
.topbar{border-top:2px solid var(--gold);border-bottom:1px solid var(--border)}
.page-title{font-size:var(--fs-md);font-weight:700;color:var(--text)}

/* Form labels — 11px, more readable */
.form-label{font-size:var(--fs-sm);letter-spacing:.03em}
.form-control{font-size:var(--fs-base);padding:9px 12px}
.form-note{font-size:var(--fs-sm)}

/* Buttons — font size uniformity */
.btn{font-size:var(--fs-base);padding:8px 16px}
.btn-sm{font-size:var(--fs-sm);padding:6px 12px}
.btn-xs{font-size:var(--fs-xs);padding:3px 9px}

/* Pipeline cards — 13px name, consistent padding */
.pipe-card-name{font-size:var(--fs-base);font-weight:600}
.pipe-card-meta{font-size:var(--fs-sm);color:var(--text3)}
.pipe-card-rate{font-size:var(--fs-sm);font-weight:700}
.pipe-card-margin{font-size:var(--fs-sm);font-weight:600}
.pipe-col-head{font-size:var(--fs-sm);font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;padding:0 4px 9px}

/* Badges — 11px floor */
.sla-badge{font-size:var(--fs-sm);padding:2px 7px;border-radius:5px}
.oos-badge{font-size:var(--fs-sm);padding:2px 7px;border-radius:5px}
.margin-badge{font-size:var(--fs-sm);padding:2px 7px;border-radius:5px}

/* Activity feed */
.activity-action{font-size:var(--fs-base);font-weight:500}
.activity-meta{font-size:var(--fs-sm);color:var(--text3);margin-top:3px}
.activity-icon{background:var(--navy-pale)}

/* Partner roster */
.va-cap-name{font-size:var(--fs-base);font-weight:600}
.va-cap-role{font-size:var(--fs-sm);color:var(--text3)}
.va-cap-pct{font-size:var(--fs-base);font-weight:700}

/* Score cards */
.score-name{font-size:var(--fs-base);font-weight:600}
.score-role{font-size:var(--fs-sm);color:var(--text3);margin-bottom:6px}
.score-metric-val{font-size:var(--fs-base);font-weight:700}
.score-metric-lbl{font-size:var(--fs-xs);color:var(--text3)}

/* Dual currency — uniform sizing */
.dc-primary{font-size:var(--fs-md);font-weight:700}
.dc-secondary{font-size:var(--fs-sm);color:var(--text3)}

/* Modal — more consistent */
.modal-title{font-size:var(--fs-lg);font-weight:700;color:var(--text)}
.modal-head{padding:16px 20px 13px}
.modal-body{padding:16px 20px}
.modal-foot{padding:13px 20px}

/* Insight cards — consistent */
.insight-card{padding:16px}
.insight-stat{font-size:26px}
.insight-name{font-size:var(--fs-sm)}
.insight-sub{font-size:var(--fs-sm)}

/* Conv sidebar */
.conv-sidebar-title{font-size:var(--fs-xs);font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.conv-detail-row{font-size:var(--fs-sm)}

/* Fin boxes */
.fin-box-label{font-size:var(--fs-xs)!important;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.fin-box-note{font-size:var(--fs-sm)!important}

/* SP content rows — uniform height */
.sp-content-row{padding:11px 14px;min-height:52px}

/* Section head spacing */
.sec-head{margin-bottom:12px}

/* Subtle stripe on alternating table rows */
.data-table tbody tr:nth-child(even) td{background:#FAFBFD}
.data-table tbody tr:nth-child(even):hover td{background:var(--navy-pale)}
/* ── AUTH / PORTAL MODES ──────────────────────────────────────────── */
#app-shell.auth-mode .sidebar,
#app-shell.auth-mode .topbar,
#app-shell.auth-mode .bottom-nav{display:none!important}
#app-shell.auth-mode .content-area{padding:0;overflow-y:auto}
#app-shell.auth-mode .main-area{overflow:auto;height:100vh}
#app-shell.client-mode .sidebar,
#app-shell.client-mode .topbar,
#app-shell.client-mode .bottom-nav{display:none!important}
#app-shell.client-mode .content-area{padding:0}
#app-shell.client-mode .main-area{overflow:auto;height:100vh}

/* Partner gets their own fullscreen mode — no owner sidebar/topbar */
#app-shell.partner-mode .sidebar,
#app-shell.partner-mode .topbar,
#app-shell.partner-mode .bottom-nav{display:none!important}
#app-shell.partner-mode .content-area{padding:0}
#app-shell.partner-mode .main-area{overflow:auto;height:100vh}

/* Partner portal topbar */
.va-portal-topbar{background:var(--navy);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:2px solid var(--gold)}
.va-portal-avatar{position:relative;cursor:pointer}
.va-portal-avatar img{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.3)}
.va-portal-avatar-upload{position:absolute;bottom:-2px;right:-2px;width:16px;height:16px;background:var(--teal);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer;border:1px solid var(--navy)}

.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy) 0%,#1B3A5C 50%,#1a4a4a 100%);padding:24px}
.auth-card{background:var(--surface);border-radius:var(--r3);padding:36px 32px;width:100%;max-width:420px;box-shadow:var(--shadow2);text-align:center}
.auth-logo{width:52px;height:52px;border-radius:14px;background:var(--navy);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.auth-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px}
.auth-sub{font-size:13px;color:var(--text3);margin-bottom:28px}
.auth-role-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.auth-role-btn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:18px 10px;border-radius:var(--r2);border:2px solid var(--border2);cursor:pointer;transition:all .15s;background:var(--bg)}
.auth-role-btn:hover{border-color:var(--teal);background:var(--teal-pale);transform:translateY(-2px);box-shadow:var(--shadow)}
.auth-role-icon{font-size:26px}
.auth-role-label{font-size:12px;font-weight:600;color:var(--text2)}
.auth-role-sub{font-size:10px;color:var(--text3);text-align:center}
/* Client portal */
.cp-topbar{background:var(--navy);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cp-portal-tabs{display:flex;flex-direction:column;width:168px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;padding:10px 0;scrollbar-width:none}
.cp-portal-body{overflow-y:auto;padding:20px;flex:1}
.cp-welcome{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:var(--r2);padding:24px 28px;margin-bottom:20px;color:#fff;position:relative;overflow:hidden}
.cp-welcome::after{content:'TJC';position:absolute;right:-10px;bottom:-20px;font-size:100px;font-weight:900;color:rgba(255,255,255,.04);pointer-events:none}
.cp-stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px;align-items:stretch}
.cp-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;text-align:center}
.cp-stat-val{font-size:26px;font-weight:700;color:var(--text);line-height:1}
.cp-stat-lbl{font-size:11px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.04em}
/* ── END POLISH ───────────────────────────────────────────────────── */

/* ── CHAT BUBBLE LAYOUT ───────────────────────────────────────────── */
.chat-area{display:flex;flex-direction:column;gap:10px;padding:14px;max-height:340px;overflow-y:auto;background:var(--bg);border-radius:var(--r)}
.chat-bubble-wrap{display:flex;align-items:flex-end;gap:8px}
.chat-bubble-wrap.right{flex-direction:row-reverse}
.chat-bubble{max-width:72%;padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.6;position:relative}
.chat-bubble-wrap.left .chat-bubble{background:var(--surface);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:3px}
.chat-bubble-wrap.right .chat-bubble{background:var(--navy);color:#fff;border-bottom-right-radius:3px}
.chat-bubble-time{font-size:10px;color:var(--text3);margin-top:3px;text-align:right}
.chat-bubble-wrap.left .chat-bubble-time{text-align:left;color:var(--text3)}
.chat-compose-row{display:flex;gap:8px;margin-top:10px}
.chat-compose-input{flex:1;border:1px solid var(--border2);border-radius:var(--r);padding:8px 12px;font-size:13px;font-family:var(--font);outline:none;transition:border .15s;resize:none;min-height:38px}
.chat-compose-input:focus{border-color:var(--teal)}
.chat-thread-selector{display:flex;gap:8px;margin-bottom:14px}
.chat-thread-btn{flex:1;padding:10px 14px;border-radius:var(--r2);border:1.5px solid var(--border2);background:var(--surface);cursor:pointer;text-align:center;transition:all .15s}
.chat-thread-btn:hover{border-color:var(--teal);background:var(--teal-pale)}
.chat-thread-btn.on{border-color:var(--navy);background:var(--navy-pale)}
.chat-thread-btn-title{font-size:12px;font-weight:600;color:var(--text)}
.chat-thread-btn-sub{font-size:10px;color:var(--text3);margin-top:2px}

/* ── FLOATING TIMER PILL ─────────────────────────────────────────── */
#floating-timer{position:fixed;bottom:24px;right:24px;z-index:9998;background:var(--navy);color:#fff;border-radius:50px;padding:10px 20px;box-shadow:0 4px 20px rgba(0,0,0,.25);display:flex;align-items:center;gap:12px;font-family:var(--font)}
#floating-timer-display{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.04em}
#floating-timer-back{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);transition:background .15s}
#floating-timer-back:hover{background:rgba(255,255,255,.25)}

/* ── BREAK BANNER ────────────────────────────────────────────────── */
.break-banner{background:var(--amber-pale);border:1px solid rgba(99,56,6,.2);border-radius:var(--r2);padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.break-banner-text{font-size:13px;font-weight:600;color:var(--amber)}
.break-timer-btn{background:var(--amber);color:#fff;border:none;border-radius:var(--r);padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)}

/* ── MARKETING REPORT CARDS ──────────────────────────────────────── */
.mkt-stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px;align-items:stretch}
.mkt-stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px;text-align:center}
.mkt-stat-val{font-size:22px;font-weight:700;color:var(--text);line-height:1;margin-bottom:4px}
.mkt-stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
/* ═══════════════════════════════════════════════════════════════
   SOFT UI REDESIGN — Glassmorphism · Cohesive · Refined
   Matches the premium dark portal aesthetic from brand mockup
   All features preserved — visual layer only
═══════════════════════════════════════════════════════════════ */

/* ── Border radius scale — softer, more rounded ── */
:root {
  --r: 12px;
  --r2: 16px;
  --r3: 22px;
  --r-pill: 100px;
}

/* ── Deep soft background in dark mode ── */
[data-theme="dark"] html,
[data-theme="dark"] body {
  background: #07091C !important;
}
[data-theme="dark"] .content-area,
[data-theme="dark"] .main-area {
  background: transparent;
}
[data-theme="dark"] #app-shell {
  background: radial-gradient(ellipse 90% 70% at 20% 10%, rgba(19,29,191,.18) 0%, transparent 60%),
              radial-gradient(ellipse 60% 50% at 80% 90%, rgba(20,211,196,.07) 0%, transparent 50%),
              #07091C;
}

/* ── Cards — glassmorphism ── */
[data-theme="dark"] .card {
  background: rgba(255,255,255,.045) !important;
  border: 1px solid rgba(255,255,255,.09) !important;
  border-radius: var(--r2) !important;
  backdrop-filter: blur(16px) !important;
  -webkit-backdrop-filter: blur(16px) !important;
  box-shadow: 0 1px 0 rgba(255,255,255,.06) inset,
              0 4px 24px rgba(0,0,0,.25) !important;
}
[data-theme="dark"] .kpi-card {
  background: rgba(255,255,255,.04) !important;
  border: 1px solid rgba(255,255,255,.09) !important;
  border-radius: var(--r2) !important;
  backdrop-filter: blur(16px) !important;
  box-shadow: 0 1px 0 rgba(255,255,255,.06) inset, 0 4px 24px rgba(0,0,0,.25) !important;
}
[data-theme="dark"] .modal-wrap .card,
[data-theme="dark"] .modal-body {
  background: rgba(12,16,80,.95) !important;
  border: 1px solid rgba(255,255,255,.12) !important;
  backdrop-filter: blur(24px) !important;
}

/* ── Sidebar — softer, with glassy active state ── */
[data-theme="dark"] .sidebar {
  background: rgba(10,13,40,.85) !important;
  border-right: 1px solid rgba(255,255,255,.07) !important;
  backdrop-filter: blur(20px) !important;
}
[data-theme="dark"] .bn-item.on {
  background: rgba(19,29,191,.65) !important;
  border-radius: 10px !important;
  box-shadow: 0 2px 12px rgba(19,29,191,.4), 0 1px 0 rgba(255,255,255,.08) inset !important;
}
[data-theme="dark"] .bn-item {
  border-radius: 10px !important;
  margin: 1px 6px !important;
  transition: background .15s !important;
}
[data-theme="dark"] .bn-item:hover:not(.on) {
  background: rgba(255,255,255,.06) !important;
}

/* ── Topbar — glassy floating ── */
[data-theme="dark"] .topbar {
  background: rgba(10,13,40,.8) !important;
  border-bottom: 1px solid rgba(255,255,255,.07) !important;
  border-top: 2px solid var(--gold) !important;
  backdrop-filter: blur(20px) !important;
}

/* ── Tags — pill shaped, softer ── */
.tag {
  border-radius: var(--r-pill) !important;
  padding: 3px 10px !important;
  font-size: 10px !important;
  font-weight: 700 !important;
  letter-spacing: .04em !important;
}
[data-theme="dark"] .t-green { background: rgba(26,122,69,.3) !important; color: #4ade80 !important; border: none !important; }
[data-theme="dark"] .t-red   { background: rgba(163,45,45,.3) !important; color: #f87171 !important; border: none !important; }
[data-theme="dark"] .t-teal  { background: rgba(20,211,196,.2) !important; color: #5eead4 !important; border: none !important; }
[data-theme="dark"] .t-gold  { background: rgba(245,158,11,.2) !important; color: #fbbf24 !important; border: none !important; }
[data-theme="dark"] .t-navy  { background: rgba(86,106,231,.25) !important; color: #a5b4fc !important; border: none !important; }
[data-theme="dark"] .t-amber { background: rgba(138,96,32,.3) !important; color: #fcd34d !important; border: none !important; }
[data-theme="dark"] .t-purple{ background: rgba(83,64,183,.3) !important; color: #c4b5fd !important; border: none !important; }

/* ── KPI colored cards — preserve gradients but soften ── */
[data-theme="dark"] .kpi-card[style*="linear-gradient"] {
  border: 1px solid rgba(255,255,255,.12) !important;
  box-shadow: 0 4px 32px rgba(0,0,0,.4), 0 1px 0 rgba(255,255,255,.1) inset !important;
}

/* ── Tables — softer rows ── */
[data-theme="dark"] .data-table th {
  background: rgba(255,255,255,.04) !important;
  border-bottom: 1px solid rgba(255,255,255,.08) !important;
}
[data-theme="dark"] .data-table tbody tr:hover td {
  background: rgba(255,255,255,.05) !important;
}
[data-theme="dark"] .data-table td {
  border-bottom: 1px solid rgba(255,255,255,.05) !important;
}

/* ── Task rows ── */
[data-theme="dark"] .task-row {
  border-bottom: 1px solid rgba(255,255,255,.05) !important;
}
[data-theme="dark"] .task-row:hover {
  background: rgba(255,255,255,.04) !important;
}

/* ── Buttons — softer, more rounded ── */
.btn { border-radius: var(--r-pill) !important; }
.btn-sm { border-radius: var(--r-pill) !important; }
.btn-xs { border-radius: var(--r-pill) !important; }
[data-theme="dark"] .btn-secondary {
  background: rgba(255,255,255,.07) !important;
  border: 1px solid rgba(255,255,255,.1) !important;
  color: rgba(255,255,255,.8) !important;
}
[data-theme="dark"] .btn-secondary:hover {
  background: rgba(255,255,255,.12) !important;
}

/* ── Form controls ── */
[data-theme="dark"] .form-control {
  background: rgba(255,255,255,.06) !important;
  border: 1px solid rgba(255,255,255,.1) !important;
  border-radius: var(--r) !important;
}
[data-theme="dark"] .form-control:focus {
  border-color: var(--teal) !important;
  box-shadow: 0 0 0 3px rgba(20,211,196,.15) !important;
  outline: none !important;
}

/* ── Welcome / greeting banner ── */
[data-theme="dark"] .welcome-banner {
  background: linear-gradient(135deg, rgba(19,29,191,.7) 0%, rgba(13,20,128,.8) 50%, rgba(10,30,50,.6) 100%) !important;
  border: 1px solid rgba(255,255,255,.1) !important;
  border-radius: var(--r2) !important;
  backdrop-filter: blur(16px) !important;
  box-shadow: 0 8px 32px rgba(19,29,191,.25), 0 1px 0 rgba(255,255,255,.1) inset !important;
}

/* ── Auth cards ── */
[data-theme="dark"] .auth-card {
  background: rgba(12,16,80,.85) !important;
  border: 1px solid rgba(255,255,255,.12) !important;
  border-radius: var(--r3) !important;
  backdrop-filter: blur(24px) !important;
  box-shadow: 0 24px 64px rgba(0,0,0,.5), 0 1px 0 rgba(255,255,255,.08) inset !important;
}
[data-theme="dark"] .auth-role-btn {
  background: rgba(255,255,255,.06) !important;
  border: 1px solid rgba(255,255,255,.1) !important;
  border-radius: var(--r2) !important;
  backdrop-filter: blur(8px) !important;
  transition: all .2s !important;
}
[data-theme="dark"] .auth-role-btn:hover {
  background: rgba(19,29,191,.35) !important;
  border-color: rgba(19,29,191,.6) !important;
  transform: translateY(-2px) !important;
  box-shadow: 0 8px 24px rgba(19,29,191,.3) !important;
}

/* ── Portal topbar (partner) ── */
[data-theme="dark"] .portal-topbar {
  background: rgba(10,13,40,.9) !important;
  backdrop-filter: blur(20px) !important;
  border-bottom: 2px solid var(--gold) !important;
}

/* ── Portal tabs ── */
[data-theme="dark"] .ptab {
  border-radius: var(--r-pill) !important;
  margin: 4px 3px !important;
  padding: 6px 14px !important;
}
[data-theme="dark"] .ptab.on {
  background: rgba(19,29,191,.55) !important;
  color: #fff !important;
  border-bottom: none !important;
  box-shadow: 0 2px 8px rgba(19,29,191,.3) !important;
}

/* ── Filter tabs ── */
[data-theme="dark"] .ftab.on {
  background: rgba(19,29,191,.5) !important;
  border-radius: var(--r-pill) !important;
  box-shadow: 0 2px 8px rgba(19,29,191,.3) !important;
}
[data-theme="dark"] .ftab {
  border-radius: var(--r-pill) !important;
}

/* ── Sec-head divider line ── */
.sec-title { border-left-width: 3px; border-radius: 0 0 0 0; }

/* ── Scrollbars — thin & themed ── */
[data-theme="dark"] ::-webkit-scrollbar { width: 4px; height: 4px; }
[data-theme="dark"] ::-webkit-scrollbar-track { background: transparent; }
[data-theme="dark"] ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 10px; }
[data-theme="dark"] ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.25); }

/* ── Smooth transitions for all interactive elements ── */
.card, .btn, .bn-item, .ptab, .ftab, .tag, .task-row, .auth-role-btn {
  transition: all .18s ease !important;
}

/* ── Conv / chat areas ── */
[data-theme="dark"] .conv-list-head { background: transparent !important; }
[data-theme="dark"] .conv-thread { border-radius: var(--r) !important; margin: 2px 4px !important; }
[data-theme="dark"] .conv-thread:hover { background: rgba(255,255,255,.05) !important; }
[data-theme="dark"] .conv-thread.on { background: rgba(19,29,191,.4) !important; border-left-color: var(--teal) !important; }

/* ── Bottom nav (mobile) ── */
[data-theme="dark"] .bottom-nav {
  background: rgba(10,13,40,.9) !important;
  border-top: 1px solid rgba(255,255,255,.08) !important;
  backdrop-filter: blur(20px) !important;
}

/* ── Light mode softer cards too ── */
.card {
  border-radius: var(--r2);
  box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
  transition: box-shadow .2s, transform .2s;
}
.card-hover:hover {
  box-shadow: 0 4px 24px rgba(0,0,0,.12) !important;
  transform: translateY(-2px) !important;
}
.btn { border-radius: var(--r-pill); font-weight: 600; }

/* ── Notif badge refined ── */
.notif-badge {
  border-radius: var(--r-pill) !important;
  font-weight: 800 !important;
  box-shadow: 0 2px 8px rgba(196,64,64,.4) !important;
}

/* ── Modal — glassy ── */
[data-theme="dark"] .modal-overlay {
  background: rgba(4,6,20,.75) !important;
  backdrop-filter: blur(6px) !important;
}
[data-theme="dark"] .modal {
  background: rgba(10,14,52,.95) !important;
  border: 1px solid rgba(255,255,255,.12) !important;
  border-radius: var(--r3) !important;
  box-shadow: 0 32px 80px rgba(0,0,0,.6), 0 1px 0 rgba(255,255,255,.08) inset !important;
  backdrop-filter: blur(24px) !important;
}
[data-theme="dark"] .modal-head {
  background: transparent !important;
  border-bottom: 1px solid rgba(255,255,255,.08) !important;
}
[data-theme="dark"] .modal-foot {
  background: transparent !important;
  border-top: 1px solid rgba(255,255,255,.08) !important;
}

/* ── OOS badge ── */
.oos-badge { border-radius: var(--r-pill) !important; }

/* ── Status dots — pulse on active ── */
.live-dot {
  animation: pulse-dot 2s ease-in-out infinite !important;
}
@keyframes pulse-dot {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: .6; transform: scale(1.3); }
}

/* Subtle TJC pattern on dark mode background */
[data-theme="dark"] #app-shell::before {
  content: '';
  position: fixed;
  top: -10%;
  right: -5%;
  width: 320px;
  height: 320px;
  background: var(--tjc-logo-url) center/contain no-repeat;
  opacity: .03;
  pointer-events: none;
  z-index: 0;
}
[data-theme="dark"] #app-shell::after {
  content: '';
  position: fixed;
  bottom: -8%;
  left: 4%;
  width: 220px;
  height: 220px;
  background: var(--tjc-logo-url) center/contain no-repeat;
  opacity: .025;
  pointer-events: none;
  z-index: 0;
  transform: rotate(180deg);
}

/* ─── Scandinavian Minimalist Portal Aesthetic ───────────────────────────
   Scoped to .portal-body and .cp-portal-body — does not affect main dash.
   Principles: generous whitespace · hairline borders · no heavy shadows ─ */

/* Portal backgrounds — clean neutral */
.portal-body, .cp-portal-body { background: var(--bg); }

/* Cards inside portals — hairline border only, no shadow */
.portal-body .card, .cp-portal-body .card {
  border: 1px solid rgba(0,0,0,.07);
  box-shadow: none;
}
[data-theme="dark"] .portal-body .card,
[data-theme="dark"] .cp-portal-body .card {
  border: 1px solid rgba(255,255,255,.06);
  box-shadow: none;
}

/* KPI cards — thinner accent stripe, no shadow */
.portal-body .kpi-card, .cp-portal-body .kpi-card {
  border-left-width: 2px;
  box-shadow: none;
}

/* Sidebar tabs — clean inactive state, soft active fill */
.ptab { letter-spacing: .01em; }
.ptab.on { background: rgba(19,29,191,.05); }
[data-theme="dark"] .ptab.on { background: rgba(255,255,255,.05); }
.ptab:hover:not(.on) { background: transparent; opacity: .75; }

/* CP stat widget — border-free, bg-only surface */
.cp-stat { border: none; }
.cp-stat-lbl { letter-spacing: .06em; font-size: 10.5px; }

/* Section headings — lighter weight, more air */
.portal-body .sec-title, .cp-portal-body .sec-title {
  font-weight: 500;
  letter-spacing: .03em;
  color: var(--text2);
}
</style>

const lsKey = col => 'tjc_v3_' + col;

function lsLoad(col){
  try{
    const raw = localStorage.getItem(lsKey(col));
    if(raw) return JSON.parse(raw);
  }catch(error){}
  const seed = SEED[col] || [];
  localStorage.setItem(lsKey(col), JSON.stringify(seed));
  return seed;
}

function lsSave(col, data){
  try{ localStorage.setItem(lsKey(col), JSON.stringify(data)); }catch(error){}
}

function loadConfig(){
  try{
    const raw = localStorage.getItem(lsKey('config'));
    if(raw){
      const config = JSON.parse(raw);
      CFG.exchangeRate = config.exchangeRate || CFG.exchangeRate;
    } else {
      lsSave('config', { exchangeRate: CFG.exchangeRate });
    }
  }catch(error){}
}

function nid(col){
  const prefix = {tasks:'t',clients:'c',timelogs:'l',content:'x',invoices:'i',goals:'g',events:'e',team:'u',activities:'a',sops:'sop'}[col] || 'd';

function ts(){ return new Date().toISOString(); }
function today(){ return new Date().toISOString().split('T')[0]; }

async function addDoc(col, data){
  const id = nid(col);
  const rec = { id, ...data, createdAt: ts(), createdBy: APP.user.uid };
  APP.data[col] = [rec, ...(APP.data[col] || [])];
  lsSave(col, APP.data[col]);
  logActivity(data._actIcon || '', data._actAction || 'created', col, data._actRecord || id, data._actColor || 'teal');
  renderCurrentPage();
  updateSbBadges();
  return id;
}

async function updateDoc(col, id, data){
  const idx = APP.data[col].findIndex(x => x.id === id);
  if(idx < 0) return;
  APP.data[col][idx] = { ...APP.data[col][idx], ...data, updatedAt: ts() };
  lsSave(col, APP.data[col]);
  if(data._actAction){
    logActivity(data._actIcon || '️', data._actAction, col, data._actRecord || id, data._actColor || 'navy');
  }
  renderCurrentPage();
  updateSbBadges();
}

async function archiveDoc(col, id, recordName){
  await updateDoc(col, id, { archived:true, _actAction:'archived', _actRecord:recordName, _actIcon:'️', _actColor:'amber' });
  toast(recordName + ' archived. You can restore it from the archive.', 'warning');
}

const FIN = {
  rate(){ return CFG.exchangeRate; },
  toPhp(usd){ return Math.round(usd * this.rate()); },
  toUsd(php){ return (php / this.rate()).toFixed(2); },
  clientMargin(c){
    const revPhp = (c.rateUsd || 0) * this.rate();
    if(!revPhp) return null;
    const margin = ((revPhp - (c.vaCostPhp || 0)) / revPhp) * 100;
    return Math.round(margin);
  },
  marginStatus(pct){
    if(pct === null) return 'none';
    if(pct >= CFG.marginTarget) return 'green';
    if(pct >= CFG.marginWarn) return 'yellow';
    return 'red';
  },
  marginBadge(pct){
    if(pct === null) return '';
    const cls = pct >= CFG.marginTarget ? 'mb-green' : pct >= CFG.marginWarn ? 'mb-yellow' : 'mb-red';
    return '<span class="margin-badge ' + cls + '">' + pct + '% margin</span>';
  },
  totalMrrUsd(){
    return APP.data.clients.filter(c => c.status === 'Active').reduce((a, c) => a + (c.rateUsd || 0), 0);
  },
  totalVaCostPhp(){
    return APP.data.clients.filter(c => c.status === 'Active').reduce((a, c) => a + (c.vaCostPhp || 0), 0);
  },
  netProfitPhp(){
    return this.totalMrrUsd() * this.rate() - this.totalVaCostPhp();
  },
  avgMargin(){
    const active = APP.data.clients.filter(c => c.status === 'Active' && c.rateUsd > 0);
    if(!active.length) return 0;
    const total = active.reduce((a, c) => a + (this.clientMargin(c) || 0), 0);
    return Math.round(total / active.length);
  }
};

const SLA = {
  elapsed(task){
    if(!task?.createdAt) return 0;
    const start = new Date(task.createdAt).getTime();
    const end = task.firstResponseAt ? new Date(task.firstResponseAt).getTime() : Date.now();
    return Math.max(0, (end - start) / 3600000);
  },
  check(task){
    if(!task?.createdAt) return 'ok';
    const hours = this.elapsed(task);
    if(hours > CFG.slaHours) return 'breach';
    if(!task.firstResponseAt && hours >= CFG.slaHours * 0.75) return 'warn';
    return 'ok';
  },
  complianceRate(tasks){
    const tracked = tasks.filter(t => t?.createdAt);
    if(!tracked.length) return 100;
    const compliant = tracked.filter(t => this.check(t) === 'ok').length;
    return Math.round((compliant / tracked.length) * 100);
  },
  vaRate(vaId){
    return this.complianceRate(APP.data.tasks.filter(t => t.assigneeUid === vaId && !t.archived));
  },
  badge(task){
    const status = this.check(task);
    if(status === 'breach') return '<span class="sla-badge sla-breach">Breach</span>';
    if(status === 'warn') return '<span class="sla-badge sla-warn">At Risk</span>';
    return '<span class="sla-badge sla-ok">On Time</span>';
  }
};

const KPI = {
  score(va){
    if(!va || !va.kpi) return 0;
    const { completionRate=0, slaCompliance=0, errorRate=0, satisfaction=0 } = va.kpi;
    return Math.round(
      completionRate * 0.40 +
      slaCompliance * 0.35 +
      (100 - errorRate) * 0.15 +
      (satisfaction / 5) * 100 * 0.10
    );
  },
  tier(score){
    if(score >= 90) return 'Vanguard';
    if(score >= 75) return 'Cornerstone';
    if(score >= 60) return 'Waypoint';
    return 'At Risk';
  },
  tierColor(score){
    if(score >= 90) return 'var(--gold-dark)';
    if(score >= 75) return 'var(--teal-dark)';
    if(score >= 60) return 'var(--navy)';
    return 'var(--red)';
  },
  tierClass(score){
    if(score >= 90) return 'tier-vanguard';
    if(score >= 75) return 'tier-cornerstone';
    if(score >= 60) return 'tier-waypoint';
    return 'tier-risk';
  }
};

const HEALTH = {
  compute(c){
    if(!['Active','Onboarding'].includes(c.status)) return c.healthScore || 0;
    const invoices = APP.data.invoices.filter(i => i.clientId === c.id && !i.archived);
    const hasOverdue = invoices.some(i => i.status === 'Overdue');
    const paymentScore = hasOverdue ? 40 : 100;
    const clientTasks = APP.data.tasks.filter(t => t.clientId === c.id && !t.archived);
    const slaScore = SLA.complianceRate(clientTasks);
    const doneTasks = clientTasks.filter(t => t.done).length;
    const completionScore = clientTasks.length ? Math.round((doneTasks / clientTasks.length) * 100) : 100;
    const daysSinceContact = c.lastContact ? Math.floor((Date.now() - new Date(c.lastContact).getTime()) / 86400000) : 99;
    const recencyScore = daysSinceContact <= 3 ? 100 : daysSinceContact <= 7 ? 80 : daysSinceContact <= 14 ? 60 : 30;
    return Math.round(paymentScore * 0.30 + slaScore * 0.25 + completionScore * 0.25 + recencyScore * 0.20);
  },
  risk(score){
    if(score >= 75) return 'low';
    if(score >= 50) return 'medium';
    return 'high';
  },
  riskTag(score){
    const risk = this.risk(score);
    if(risk === 'low') return '<span class="tag t-green">Low Risk</span>';
    if(risk === 'medium') return '<span class="tag t-amber">Medium Risk</span>';
    return '<span class="tag t-red">High Risk</span>';
  },
  color(score){
    if(score >= 75) return 'var(--green)';
    if(score >= 50) return 'var(--gold)';
    return 'var(--red)';
  },
  ring(score){
    const r = 24;
    const circ = 2 * Math.PI * r;
    const offset = circ - (score / 100) * circ;
    const color = this.color(score);
    return '<div class="health-ring"><svg viewBox="0 0 56 56"><circle class="track" cx="28" cy="28" r="' + r + '"/><circle class="fill" cx="28" cy="28" r="' + r + '" stroke="' + color + '" stroke-dasharray="' + circ + '" stroke-dashoffset="' + offset + '"/></svg><div class="health-val" style="color:' + color + '">' + score + '</div></div>';
  }
};

function navigate(page, el){
  APP.page = page;
  document.getElementById('page-title').textContent = PAGE_TITLES[page] || page;
  document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('on'));
  if(el) el.classList.add('on');
  else {
    document.querySelectorAll('.sb-item').forEach(i => {
      if(i.dataset.page === page) i.classList.add('on');
    });
  }
  document.querySelectorAll('.bn-item').forEach(i => i.classList.toggle('on', i.dataset.page === page));
  renderCurrentPage();
  if(window.innerWidth <= 680) closeSidebar();
}

function setAppShellMode(mode){
  const shell = document.getElementById('app-shell');
  if(shell) shell.className = mode || '';
}

function renderCurrentPage(){
  const ca = document.getElementById('content-area');
  if(!ca) return;
  if(typeof Chart !== 'undefined'){
    Object.values(Chart.instances||{}).forEach(c=>c.destroy());
  }
  // Auth gate
  if(!APP.authMode){
    setAppShellMode('auth-mode');
    ca.innerHTML = renderAuthChooser();
    return;
  }
  if(APP.authMode === 'client'){
    setAppShellMode('client-mode');
    ca.innerHTML = renderClientFacingPortal();
    return;
  }
  if(APP.authMode === 'va'){
    setAppShellMode('partner-mode');
    ca.innerHTML = renderVADashboard();
    return;
  }
  setAppShellMode('');
  const pages = {
    home: renderHome,
    clients: renderClients,
    finance: renderFinance,
    capacity: renderCapacity,
    kpi: renderKPI,
    sla: renderSLA,
    health: renderClientHealth,
    activity: renderActivity,
    tasks: renderTasks,
    content: renderContent,
    invoices: renderInvoices,
    team: renderTeam,
    goals: renderGoals,
    onboarding: renderOnboarding,
    vaportal: renderVAPortal,
    clientportal: renderClientPortal,
    conversations: renderConversations,
    calendar: ()=>renderCalendarView('management','all','All Teams'),
    sops: renderSOPLibrary,
    theme: renderThemeOptions,
  };
  const fn = pages[APP.page];
  ca.innerHTML = fn ? fn() : '<div class="empty"><div class="empty-text">Page not found.</div></div>';
  if(APP.page === 'home') setTimeout(initHomeCharts, 50);
}

function initHomeCharts(){
  if(typeof Chart === 'undefined') return;
  Chart.defaults.font.family = "'Space Grotesk', system-ui, sans-serif";

  const donutEl = document.getElementById('client-donut');
  if(donutEl && !donutEl._chart){
    const statuses = ['Active','Onboarding','Proposal','Lead','Completed'];
    const colors = ['#1a7a45','#14D3C4','#F59E0B','#131DBF','#566AE7'];
    const counts = statuses.map(s => APP.data.clients.filter(c=>c.status===s&&!c.archived).length);
    const total = counts.reduce((a,b)=>a+b,0);
    const legend = document.getElementById('donut-legend');
    if(legend){
      legend.innerHTML = statuses.map((s,i)=>counts[i]>0?`<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:50%;background:${colors[i]};flex-shrink:0"></div><span style="color:#5a6072">${s}</span><strong style="margin-left:auto;padding-left:8px">${counts[i]}</strong></div>`:'').filter(Boolean).join('');
    }
    donutEl._chart = new Chart(donutEl, {
      type: 'doughnut',
      data: { labels: statuses, datasets: [{ data: counts, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] },
      options: { cutout: '65%', plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' ' + ctx.label + ': ' + ctx.parsed + ' (' + Math.round(ctx.parsed/total*100) + '%)' } } }, animation: { duration: 600 } }
    });
  }

  const barEl = document.getElementById('pipeline-bar');
  if(barEl && !barEl._chart){
    const stages = ['Lead','Proposal','Onboarding','Active','Completed'];
    const counts2 = stages.map(s => APP.data.clients.filter(c=>c.status===s&&!c.archived).length);
    const bcolors = ['#131DBF','#F59E0B','#14D3C4','#1a7a45','#566AE7'];
    barEl._chart = new Chart(barEl, {
      type: 'bar',
      data: { labels: stages, datasets: [{ data: counts2, backgroundColor: bcolors, borderRadius: 5, borderSkipped: false }] },
      options: { plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' Count: ' + ctx.parsed.y } } }, scales: { x: { grid: { display: false }, ticks: { font: { size: 10 } } }, y: { grid: { color: '#E2E6F0' }, ticks: { stepSize: 1, font: { size: 10 } }, beginAtZero: true } }, animation: { duration: 500 } }
    });
  }

  const devEl = document.getElementById('device-bar');
  if(devEl && !devEl._chart){
    devEl._chart = new Chart(devEl, {
      type: 'bar',
      data: { labels: ['Mobile','Desktop'], datasets: [{ data: [30, 57], backgroundColor: ['#14D3C4','#131DBF'], borderRadius: 3, borderSkipped: false }] },
      options: { plugins: { legend: { display: false }, tooltip: { enabled: false } }, scales: { x: { grid: { display: false }, ticks: { font: { size: 9 } } }, y: { display: false, beginAtZero: true } }, animation: { duration: 400 }, responsive: false }
    });
  }
}

      ${inv.status!=='Paid'?`<button class="btn btn-xs" style="background:var(--green-pale);color:var(--green);border:1px solid #a7d9bb;flex-shrink:0" onclick="event.stopPropagation();markPaid('${inv.id}')">Mark Paid</button>`:`<span style="font-size:10px;color:var(--green);font-weight:600;flex-shrink:0"> ${inv.paidAt}</span>`}

function renderKPI(){
  const vas = APP.data.team.filter(v=>v.role!=='owner');
  const avgScore = vas.length ? Math.round(vas.reduce((a,v)=>a+KPI.score(v),0)/vas.length) : 0;
  const vanguard = vas.filter(v=>KPI.score(v)>=90);
  const cornerstone = vas.filter(v=>KPI.score(v)>=75&&KPI.score(v)<90);
  const waypoint = vas.filter(v=>KPI.score(v)<75);
  return `
  <div class="kpi-grid">
    <div class="kpi-card" style="border-left-color:var(--gold)"><div class="kpi-label">Avg KPI Score</div><div class="kpi-val" style="color:${KPI.tierColor(avgScore)}">${avgScore}</div><div class="kpi-sub">${KPI.tier(avgScore)} team</div></div>
    <div class="kpi-card" style="border-left-color:var(--gold)"><div class="kpi-label"> Vanguard (90–100)</div><div class="kpi-val" style="color:var(--gold-dark)">${vanguard.length}</div><div class="kpi-sub">${vanguard.map(v=>v.displayName.split(' ')[0]).join(', ')||'—'}</div></div>
    <div class="kpi-card" style="border-left-color:var(--teal)"><div class="kpi-label"> Cornerstone (75–89)</div><div class="kpi-val" style="color:var(--teal-dark)">${cornerstone.length}</div><div class="kpi-sub">${cornerstone.map(v=>v.displayName.split(' ')[0]).join(', ')||'—'}</div></div>
    <div class="kpi-card" style="border-left-color:var(--navy)"><div class="kpi-label"> Waypoint (&lt;75)</div><div class="kpi-val" style="color:var(--text)">${waypoint.length}</div><div class="kpi-sub">${waypoint.map(v=>v.displayName.split(' ')[0]).join(', ')||'—'}</div></div>
  </div>
  <div class="sec-head"><div class="sec-title">Individual Performance</div></div>
  ${vas.map(va=>{
    const score = KPI.score(va);
    const k = va.kpi || {};
    const slaRate = SLA.vaRate(va.id);
    const circumference = 2 * Math.PI * 20;
    const offset = circumference - (score / 100) * circumference;
    const col = KPI.tierColor(score);
    return `<div class="score-card">
      <svg viewBox="0 0 48 48" width="48" height="48" style="flex-shrink:0;transform:rotate(-90deg)">
        <circle cx="24" cy="24" r="20" fill="none" stroke="var(--border)" stroke-width="5"/>

      </svg>
      <div class="av av-md ${avColor(va.avatarColor)}">${va.initials}</div>
      <div class="score-info">
        <div class="score-name">${va.displayName}</div>
        <div class="score-role">${va.role==='va'?'Partner':va.role} · <span style="font-size:13px;font-weight:700;color:${col}">${score}/100</span> · <span class="${KPI.tierClass(score)}">${KPI.tier(score)}</span></div>
        <div class="score-breakdown">
          <div class="score-metric"><div class="score-metric-val" style="color:var(--teal)">${k.completionRate||0}%</div><div class="score-metric-lbl">Completion</div></div>
          <div class="score-metric"><div class="score-metric-val" style="color:${slaRate>=90?'var(--green)':slaRate>=75?'var(--gold-dark)':'var(--red)'}">${slaRate}%</div><div class="score-metric-lbl">SLA Rate</div></div>
          <div class="score-metric"><div class="score-metric-val" style="color:${(k.errorRate||0)<=3?'var(--green)':'var(--red)'}">${k.errorRate||0}%</div><div class="score-metric-lbl">Error Rate</div></div>
          <div class="score-metric"><div class="score-metric-val" style="color:var(--gold-dark)">${k.satisfaction||0}/5 </div><div class="score-metric-lbl">Satisfaction</div></div>
        </div>
      </div>
      <button class="btn btn-sm btn-secondary" onclick="openUpdateKPI('${va.id}')">Update KPI</button>
    </div>`;
  }).join('')}
  <div style="margin-top:20px;padding:14px 16px;background:var(--navy-pale);border-radius:var(--r2);font-size:12px;color:var(--text)">
    <strong>KPI Scoring Formula:</strong> Completion Rate (40%) + SLA Compliance (35%) + Error-free Rate (15%) + Client Satisfaction (10%)<br>
    <span style="color:var(--text3)">Scores are computed automatically. Update raw metrics via the "Update KPI" button on each Partner.</span>
  </div>`;
}

function renderSLA(){
  const tasks = APP.data.tasks.filter(t=>!t.archived&&t.createdAt);
  const breached = tasks.filter(t=>SLA.check(t)==='breach');
  const warned = tasks.filter(t=>SLA.check(t)==='warn');
  const compliant = tasks.filter(t=>SLA.check(t)==='ok');
  const rate = SLA.complianceRate(tasks);
  const vas = APP.data.team.filter(v=>v.role!=='owner');
  return `
  <div class="kpi-grid">
    <div class="kpi-card" style="border-left-color:${rate>=90?'var(--green)':rate>=75?'var(--gold)':'var(--red)'}"><div class="kpi-label">Overall SLA Rate</div><div class="kpi-val" style="color:${rate>=90?'var(--green)':rate>=75?'var(--gold-dark)':'var(--red)'}">${rate}%</div><div class="kpi-sub">Target: 100% within ${CFG.slaHours}h</div></div>
    <div class="kpi-card" style="border-left-color:var(--green)"><div class="kpi-label">Compliant Tasks</div><div class="kpi-val" style="color:var(--green)">${compliant.length}</div><div class="kpi-sub">Within ${CFG.slaHours}h response</div></div>
    <div class="kpi-card" style="border-left-color:var(--gold)"><div class="kpi-label">At Risk (&gt;75% of window)</div><div class="kpi-val" style="color:var(--gold-dark)">${warned.length}</div><div class="kpi-sub">Approaching SLA limit</div></div>
    <div class="kpi-card" style="border-left-color:var(--red)"><div class="kpi-label">SLA Breaches</div><div class="kpi-val" style="color:${breached.length?'var(--red)':'var(--green)'}">${breached.length}</div><div class="kpi-sub">${breached.length?'Action required':'None '}</div></div>
  </div>
  ${breached.length>0?`<div class="cap-warning over" style="margin-bottom:14px"> ${breached.length} task${breached.length>1?'s have':' has'} breached the ${CFG.slaHours}-hour SLA. Follow up immediately.</div>`:''}
  <div class="sec-head"><div class="sec-title">SLA Compliance by Partner</div></div>
  <div class="card" style="margin-bottom:18px">
    <table class="data-table">
      <thead><tr><th>Partner</th><th>Tasks Tracked</th><th>Compliant</th><th>Breached</th><th>Rate</th><th>Status</th></tr></thead>
      <tbody>
        ${vas.map(va=>{
          const vaTasks = tasks.filter(t=>t.assigneeUid===va.id);
          const vaBreach = vaTasks.filter(t=>SLA.check(t)==='breach');
