<!DOCTYPE html>
<html lang="tl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — NakNak</title>
<meta name="description" content="Ang NakNak caregiver dashboard. I-manage ang gamot, contacts, safe zone, at SOS alerts ng iyong senior — naka-sync sa totoong oras sa app.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --cream:#FEF6EB; --cream2:#F4E4C6; --cream3:#EAD2A8;
  --ink:#1E0A02; --ink2:#6B3A1F; --ink3:#A0693C;
  --red-dark:#9C2010; --red:#C4301E; --red-bright:#E04535; --red-hot:#FF5040;
  --green:#1A8C4A; --green-bright:#2ECC71;
  --gold:#C07010; --gold-bright:#F0A030;
  --void:#100906; --void2:#1E1209; --void3:#2A1A0C;
  --card-border:#E8D0AC;
  --card-bg:#FFFFFF;
  --shadow:rgba(100,50,10,0.14);
  --sidebar-w:248px;
  --font-display:'Baloo 2',sans-serif;
  --font-body:'Nunito',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  color-scheme:light;
  transition:background 0.25s ease;
}
[data-theme="dark"]{
  --cream:#100906; --cream2:#1E1209; --cream3:#2A1A0C;
  --ink:#FBEEDD; --ink2:#D3AE81; --ink3:#8A6A48;
  --card-border:#3A2410;
  --card-bg:#1C1008;
  --shadow:rgba(0,0,0,0.45);
  color-scheme:dark;
}
[data-theme="dark"] body{background:var(--cream);}
[data-theme="dark"] .quickid-preview-label,
[data-theme="dark"] .sb-code .lbl{color:var(--ink3);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-body);background:var(--cream2);color:var(--ink);-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:inherit;}
button{cursor:pointer;}
:focus-visible{outline:3px solid var(--red-hot);outline-offset:2px;}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:var(--card-border);border-radius:5px;}

#root{min-height:100vh;}

/* ── ONBOARD (no household yet) ─────────────────────────────────────── */
.onboard-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--red-dark) 0%,#3A0A04 60%,var(--void) 100%);padding:24px;}
.onboard-card{background:var(--cream);border-radius:28px;max-width:460px;width:100%;padding:40px 36px;box-shadow:0 40px 100px rgba(0,0,0,0.4);}
.ob-brand{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:700;font-size:20px;color:var(--red-dark);margin-bottom:28px;}
.ob-mark{width:24px;height:24px;position:relative;}
.ob-mark .ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--red-hot);animation:obPulse 2.4s ease-out infinite;}
.ob-mark .dot{position:absolute;inset:6px;border-radius:50%;background:var(--red);}
@keyframes obPulse{0%{transform:scale(0.55);opacity:1;}100%{transform:scale(1.5);opacity:0;}}
.ob-tabs{display:flex;gap:6px;background:var(--cream2);border-radius:16px;padding:5px;margin-bottom:26px;}
.ob-tab{flex:1;padding:11px;border:none;background:none;border-radius:12px;font-weight:800;font-size:13.5px;color:var(--ink3);transition:all 0.15s;}
.ob-tab.on{background:var(--card-bg);color:var(--red);box-shadow:0 3px 10px rgba(0,0,0,0.08);}
.ob-card h2{font-family:var(--font-display);font-size:24px;font-weight:600;margin-bottom:8px;}
.ob-card p.desc{font-size:14px;color:var(--ink2);font-weight:600;line-height:1.6;margin-bottom:24px;}
.ob-input{width:100%;height:52px;border-radius:14px;border:1.5px solid var(--card-border);background:var(--card-bg);padding:0 16px;font-size:15px;font-weight:700;color:var(--ink);outline:none;margin-bottom:14px;transition:border-color 0.15s;}
.ob-input:focus{border-color:var(--red);}
.ob-input.code{text-align:center;letter-spacing:6px;font-family:var(--font-mono);font-size:20px;text-transform:uppercase;}
.ob-btn{width:100%;height:52px;border-radius:14px;border:none;background:linear-gradient(145deg,var(--red-bright),var(--red-dark));color:#fff;font-weight:900;font-size:15px;box-shadow:0 10px 26px rgba(196,48,30,0.3);transition:transform 0.15s;}
.ob-btn:hover:not(:disabled){transform:translateY(-1px);}
.ob-btn:disabled{opacity:0.5;cursor:default;}
.ob-err{background:rgba(196,48,30,0.08);border:1px solid rgba(196,48,30,0.25);border-radius:10px;padding:10px 12px;font-size:12.5px;font-weight:700;color:var(--red);margin-bottom:14px;}
.ob-success{text-align:center;padding:8px 0;}
.ob-code-display{font-family:var(--font-mono);font-size:36px;font-weight:700;letter-spacing:8px;color:var(--red);background:var(--cream2);border-radius:16px;padding:20px;margin:18px 0;}
.ob-note{font-size:12px;color:var(--ink3);font-weight:600;text-align:center;line-height:1.6;}
.ob-config-warn{background:rgba(192,112,16,0.1);border:1px solid rgba(192,112,16,0.3);border-radius:12px;padding:14px 16px;font-size:12.5px;font-weight:700;color:var(--gold);line-height:1.6;margin-bottom:20px;}

/* ── DASHBOARD SHELL ─────────────────────────────────────────────────── */
.shell{display:flex;min-height:100vh;}
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;background:var(--void);color:#fff;
  display:flex;flex-direction:column;padding:22px 16px;position:sticky;top:0;height:100vh;
}
.sb-brand{display:flex;align-items:center;gap:9px;font-family:var(--font-display);font-weight:700;font-size:18px;padding:0 8px 22px;}
.sb-mark{width:22px;height:22px;position:relative;flex-shrink:0;}
.sb-mark .ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--red-hot);animation:obPulse 2.4s ease-out infinite;}
.sb-mark .dot{position:absolute;inset:6px;border-radius:50%;background:var(--red-hot);}
.sb-code{
  display:flex;align-items:center;gap:8px;background:var(--void2);border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;padding:9px 12px;margin-bottom:18px;
}
.sb-code .dot-live{width:7px;height:7px;border-radius:50%;background:var(--green-bright);box-shadow:0 0 0 3px rgba(46,204,113,0.25);flex-shrink:0;}
.sb-code .txt{flex:1;}
.sb-code .lbl{font-size:9.5px;font-weight:800;color:rgba(255,255,255,0.4);letter-spacing:1px;}
.sb-code .val{font-family:var(--font-mono);font-size:13px;font-weight:700;color:#fff;letter-spacing:2px;}
.sb-nav{display:flex;flex-direction:column;gap:2px;flex:1;}
.sb-link{
  display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;border:none;background:none;
  color:rgba(255,255,255,0.55);font-weight:700;font-size:13.5px;text-align:left;transition:all 0.15s;
}
.sb-link:hover{background:rgba(255,255,255,0.05);color:#fff;}
.sb-link.on{background:linear-gradient(135deg,var(--red-bright),var(--red-dark));color:#fff;box-shadow:0 6px 16px rgba(196,48,30,0.3);}
.sb-link svg{flex-shrink:0;}
.sb-footer{padding-top:14px;border-top:1px solid rgba(255,255,255,0.08);}
.sb-senior{display:flex;align-items:center;gap:11px;padding:11px 10px;margin-bottom:18px;background:var(--void2);border:1px solid rgba(255,255,255,0.08);border-radius:14px;}
.sb-senior-avatar{position:relative;width:38px;height:38px;border-radius:19px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:16px;color:#fff;flex-shrink:0;}
.sb-senior-pulse{position:absolute;bottom:-1px;right:-1px;width:11px;height:11px;border-radius:50%;border:2px solid var(--void2);animation:pulseDot 2s infinite;}
@keyframes pulseDot{0%,100%{opacity:1;}50%{opacity:0.5;}}
.sb-senior-txt{min-width:0;}
.sb-senior-txt .nm{font-size:13px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-senior-txt .st{font-size:10.5px;font-weight:700;color:rgba(255,255,255,0.45);margin-top:1px;}
.tb-sync-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green-bright);margin-right:6px;box-shadow:0 0 0 3px rgba(46,204,113,0.2);animation:pulseDot 2.2s infinite;}
.panel-enter{animation:panelIn 0.32s cubic-bezier(0.16,1,0.3,1) both;}
@keyframes panelIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.sb-disconnect{width:100%;padding:10px;border-radius:10px;background:none;border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.5);font-size:12px;font-weight:700;transition:all 0.15s;}
.sb-disconnect:hover{border-color:var(--red-hot);color:var(--red-hot);}

.main{flex:1;min-width:0;background:var(--cream2);}
.topbar{
  background:var(--cream);border-bottom:1px solid var(--card-border);
  padding:18px 32px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;
  position:sticky;top:0;z-index:10;
}
.tb-title h1{font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--ink);}
.tb-title p{font-size:12.5px;color:var(--ink3);font-weight:700;margin-top:2px;}
.senior-tabs{display:flex;gap:6px;background:var(--cream2);border-radius:14px;padding:4px;}
.senior-tab{padding:8px 16px;border:none;background:none;border-radius:10px;font-weight:800;font-size:12.5px;color:var(--ink3);white-space:nowrap;transition:all 0.15s;display:flex;align-items:center;gap:6px;}
.senior-tab.on{background:var(--card-bg);color:var(--red);box-shadow:0 3px 8px rgba(0,0,0,0.08);}
.senior-tab .st-dot{width:6px;height:6px;border-radius:50%;}
.tb-add-senior{width:34px;height:34px;border-radius:10px;background:var(--cream2);border:1.5px dashed var(--card-border);display:flex;align-items:center;justify-content:center;color:var(--ink3);transition:all 0.15s;}
.tb-add-senior:hover{border-color:var(--red);color:var(--red);}
.tb-theme-toggle{width:34px;height:34px;border-radius:10px;background:var(--cream2);border:1.5px solid var(--card-border);display:flex;align-items:center;justify-content:center;color:var(--ink2);transition:all 0.15s;}
.tb-theme-toggle:hover{border-color:var(--red);color:var(--red);transform:rotate(15deg);}

.content{padding:28px 32px 60px;max-width:1180px;}

/* ── SOS BANNER ──────────────────────────────────────────────────────── */
.sos-banner{
  background:linear-gradient(135deg,var(--red-bright),var(--red-dark));color:#fff;border-radius:20px;
  padding:18px 22px;display:flex;align-items:center;gap:16px;margin-bottom:24px;
  box-shadow:0 16px 40px rgba(196,48,30,0.35);animation:sosGlow 1.6s ease-in-out infinite;
}
@keyframes sosGlow{0%,100%{box-shadow:0 16px 40px rgba(196,48,30,0.35);}50%{box-shadow:0 16px 50px rgba(196,48,30,0.55);}}
.sos-banner .ring{width:14px;height:14px;border-radius:50%;background:#fff;flex-shrink:0;animation:sosBlink 1s infinite;}
@keyframes sosBlink{50%{opacity:0.3;}}
.sos-banner .txt{flex:1;}
.sos-banner .txt strong{display:block;font-size:16px;font-weight:900;}
.sos-banner .txt span{font-size:12.5px;font-weight:700;opacity:0.85;}
.sos-ack-btn{padding:11px 22px;border-radius:14px;background:#fff;border:none;color:var(--red-dark);font-weight:900;font-size:13.5px;white-space:nowrap;}

/* ── STAT GRID ───────────────────────────────────────────────────────── */
.hero-id-card{
  display:flex;align-items:center;gap:18px;padding:22px 26px;border-radius:24px;margin-bottom:20px;
  background:linear-gradient(135deg,var(--void) 0%,#2A1408 100%);
  box-shadow:0 16px 40px rgba(30,10,2,0.22);transition:background 0.4s;
}
.hero-id-avatar{position:relative;width:58px;height:58px;border-radius:29px;background:rgba(255,255,255,0.16);border:2px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:24px;color:#fff;flex-shrink:0;}
.hero-id-pulse{position:absolute;bottom:1px;right:1px;width:15px;height:15px;border-radius:50%;border:2.5px solid var(--void);animation:pulseDot 2s infinite;}
.hero-id-body{flex:1;min-width:0;}
.hero-id-name{font-family:var(--font-display);font-size:19px;font-weight:600;color:#fff;}
.hero-id-status{font-size:12.5px;font-weight:700;color:rgba(255,255,255,0.6);margin-top:3px;}
.hero-id-battery{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:13px;font-weight:700;color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.1);padding:7px 12px;border-radius:12px;flex-shrink:0;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat-bar{height:4px;border-radius:2px;background:var(--cream2);margin-top:10px;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:2px;transition:width 0.5s ease;}
@media (max-width:900px){ .stat-grid{grid-template-columns:1fr 1fr;} }
.stat-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:18px;padding:18px 20px;transition:background 0.25s;}
.stat-card .ic{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.stat-card .val{font-family:var(--font-mono);font-size:22px;font-weight:700;color:var(--ink);}
.stat-card .lbl{font-size:11.5px;font-weight:700;color:var(--ink3);margin-top:2px;}

/* ── PANELS ──────────────────────────────────────────────────────────── */
.panel{background:var(--card-bg);border:1px solid var(--card-border);border-radius:22px;padding:26px 26px;margin-bottom:20px;transition:background 0.25s;}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
.panel-head h2{font-family:var(--font-display);font-size:18px;font-weight:600;display:flex;align-items:center;gap:9px;}
.panel-head p{font-size:12.5px;color:var(--ink3);font-weight:600;margin-top:2px;}
.btn-add{display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:12px;background:var(--cream2);border:1.5px solid var(--card-border);font-weight:800;font-size:12.5px;color:var(--ink2);transition:all 0.15s;}
.btn-add:hover{border-color:var(--red);color:var(--red);}

.row-item{
  display:flex;align-items:center;gap:14px;padding:13px 4px;border-bottom:1px solid var(--cream2);
}
.row-item:last-child{border-bottom:none;}
.row-avatar{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.row-body{flex:1;min-width:0;}
.row-body .t1{font-size:14px;font-weight:800;color:var(--ink);}
.row-body .t2{font-size:12px;color:var(--ink3);font-weight:600;margin-top:1px;}
.row-actions{display:flex;gap:6px;flex-shrink:0;}
.icon-btn{width:32px;height:32px;border-radius:9px;background:var(--cream2);border:none;display:flex;align-items:center;justify-content:center;color:var(--ink3);transition:all 0.15s;}
.icon-btn:hover{background:var(--red);color:#fff;}
.icon-btn.ok:hover{background:var(--green);}
.pill-status{padding:4px 10px;border-radius:9px;font-size:10.5px;font-weight:800;white-space:nowrap;}

.empty-state{padding:36px 20px;text-align:center;}
.empty-state svg{margin:0 auto 12px;color:var(--card-border);}
.empty-state p{font-size:13px;color:var(--ink3);font-weight:700;}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-row.single{grid-template-columns:1fr;}
.form-field label{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:800;color:var(--ink3);margin-bottom:6px;letter-spacing:0.3px;}
.form-field input,.form-field select,.form-field textarea{
  width:100%;padding:11px 13px;border-radius:11px;border:1.5px solid var(--card-border);
  font-size:13.5px;font-weight:700;color:var(--ink);outline:none;background:var(--cream);transition:border-color 0.15s;
}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--red);}
.form-actions{display:flex;gap:10px;margin-top:16px;}
.btn-save{padding:11px 22px;border-radius:12px;background:linear-gradient(145deg,var(--red-bright),var(--red-dark));border:none;color:#fff;font-weight:800;font-size:13px;}
.btn-cancel{padding:11px 18px;border-radius:12px;background:none;border:1.5px solid var(--card-border);color:var(--ink3);font-weight:800;font-size:13px;}

.chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.chip{display:flex;align-items:center;gap:6px;background:var(--cream2);border-radius:10px;padding:6px 10px;font-size:12px;font-weight:700;color:var(--ink2);}
.chip-warn{background:rgba(196,48,30,0.09);color:var(--red-dark);}
.chip-gold{background:rgba(192,112,16,0.09);color:var(--gold);}
.chip-empty{font-size:12px;color:var(--ink3);font-weight:600;font-style:italic;padding:4px 0;}

.profile-progress-ring{position:relative;width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background 0.4s;}
.profile-progress-ring::before{content:"";position:absolute;inset:4px;background:#fff;border-radius:50%;}
.profile-progress-ring span{position:relative;z-index:1;font-family:var(--font-mono);font-size:10.5px;font-weight:700;color:var(--ink2);}

.quickid-preview{position:sticky;top:88px;}
.profile-layout{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start;}
@media (max-width:960px){
  .profile-layout{grid-template-columns:1fr;}
  .quickid-preview{position:static;}
}
.quickid-preview-label{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:800;color:var(--ink3);letter-spacing:1px;margin-bottom:10px;}
.quickid-card{background:linear-gradient(165deg,var(--void) 0%,#2A1408 100%);border-radius:22px;padding:22px;box-shadow:0 16px 40px rgba(30,10,2,0.25);}
.quickid-card-head{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.12);}
.quickid-avatar{width:42px;height:42px;border-radius:21px;background:linear-gradient(145deg,var(--red-bright),var(--red-dark));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:17px;color:#fff;flex-shrink:0;}
.quickid-name{font-family:var(--font-display);font-size:15px;font-weight:600;color:#fff;}
.quickid-sub{font-size:10.5px;color:rgba(255,255,255,0.45);font-weight:700;margin-top:1px;}
.quickid-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:12.5px;}
.quickid-row span{color:rgba(255,255,255,0.5);font-weight:700;}
.quickid-row strong{color:#fff;font-weight:800;}
.quickid-sect{font-size:10px;font-weight:800;color:rgba(255,255,255,0.4);letter-spacing:1px;margin:14px 0 8px;}
.quickid-tags{display:flex;flex-wrap:wrap;gap:6px;}
.quickid-tags span{background:rgba(255,255,255,0.1);color:#fff;font-size:11px;font-weight:700;padding:5px 10px;border-radius:8px;}
.quickid-tags em{color:rgba(255,255,255,0.35);font-size:12px;font-style:italic;}
.chip button{background:none;border:none;color:var(--ink3);display:flex;}

.vitals-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
@media (max-width:700px){ .vitals-grid{grid-template-columns:1fr;} }
.vital-tile{background:var(--cream2);border-radius:16px;padding:16px;text-align:center;}
.vital-tile .v{font-family:var(--font-mono);font-size:24px;font-weight:700;color:var(--ink);}
.vital-tile .u{font-size:11px;color:var(--ink3);font-weight:700;margin-top:2px;}

.note-item{background:var(--cream2);border-radius:14px;padding:13px 15px;margin-bottom:10px;border-left:4px solid var(--red);}
.note-item p{font-size:13.5px;font-weight:700;color:var(--ink);line-height:1.5;}
.note-item .meta{font-size:11px;color:var(--ink3);font-weight:700;margin-top:6px;}

.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--cream2);}

function timeAgo(iso){
  if(!iso) return "—";
  try{
    const s = Math.floor((Date.now() - new Date(iso).getTime())/1000);
    if(s<10) return "ngayon lang";
    if(s<60) return `${s}s ago`;
    if(s<3600) return `${Math.floor(s/60)}m ago`;
    if(s<86400) return `${Math.floor(s/3600)}h ago`;
    return `${Math.floor(s/86400)}d ago`;
  }catch(e){ return "—"; }
}

/* ── THEME: light / dark / auto — mirrors the phone app's 6PM-6AM PH logic ── */
const THEME_KEY = "naknak_dash_theme_v1";
function computeIsDark(mode){
  if(mode==="dark") return true;
  if(mode==="light") return false;
  const phHour = new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Manila"})).getHours();
  return phHour >= 18 || phHour < 6;
}
function useTheme(){
  const [mode, setModeState] = useState(()=>{ try{return localStorage.getItem(THEME_KEY)||"auto";}catch(e){return "auto";} });
  const isDark = computeIsDark(mode);
  useEffect(()=>{ document.documentElement.setAttribute("data-theme", isDark?"dark":"light"); }, [isDark]);
  useTicker(60000); // re-evaluate "auto" every minute as the clock crosses 6/18
  const setMode = (m) => { try{localStorage.setItem(THEME_KEY,m);}catch(e){} setModeState(m); };
  return { mode, isDark, setMode };
}

function saveHH(v){ try{ v?localStorage.setItem(HH_KEY,JSON.stringify(v)):localStorage.removeItem(HH_KEY);}catch(e){} }

/* ── AUTH GATE: magic-link sign in, gates everything below it ──────────── */
function AuthGate({ children }) {
  const [session, setSession] = useState(undefined); // undefined = loading, null = signed out
  const [email, setEmail] = useState("");
  const [sent, setSent] = useState(false);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");

  useEffect(() => {
    if(!supa){ setSession(null); return; }
    supa.auth.getSession().then(({data})=>setSession(data.session||null));
    const { data: sub } = supa.auth.onAuthStateChange((_evt, sess)=>setSession(sess));
    return () => sub.subscription.unsubscribe();
  }, []);

  const sendLink = async () => {
    if(!supa){ setErr("Hindi pa naka-configure ang Supabase."); return; }
    if(!email.includes("@")){ setErr("Maglagay ng tamang email address."); return; }
    setBusy(true); setErr("");
    const { error } = await supa.auth.signInWithOtp({ email, options:{ emailRedirectTo: window.location.href } });
    setBusy(false);
    if(error){ setErr(error.message); return; }
    setSent(true);
  };

  if (session === undefined) return <div className="full-loading"><div className="loading-spin"></div></div>;

  if (!session) {
    return (
      <div className="onboard-wrap">
        <div className="onboard-card">
          <div className="ob-brand"><span className="ob-mark"><span className="ring"></span><span className="dot"></span></span>NakNak Dashboard</div>
          {!supa && <div className="ob-config-warn">Hindi pa naka-configure ang Supabase credentials sa file na ito. Buksan ang dashboard.html, hanapin ang <code>const SUPA</code>, at ilagay ang iyong Project URL at anon key. Tingnan ang DEPLOY.md.</div>}
          {sent ? (
            <div className="ob-success">
              <Icon name="checkmark" size={40} color="var(--green)"/>
              <h2 style={{marginTop:14}}>Tingnan ang email mo</h2>
              <p className="desc">Nagpadala kami ng sign-in link sa <strong>{email}</strong>. I-click ito para makapasok.</p>
              <button className="ob-btn" style={{background:"none",border:"1.5px solid var(--card-border)",color:"var(--ink2)",boxShadow:"none"}} onClick={()=>setSent(false)}>Gamitin ang ibang email</button>
            </div>
          ) : (
            <>
              <h2>Mag-sign in</h2>
              <p className="desc">Ilagay ang email mo — magpapadala kami ng link, walang kailangang password.</p>
              {err && <div className="ob-err">{err}</div>}
              <input className="ob-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="ikaw@email.com" onKeyDown={e=>e.key==="Enter"&&sendLink()}/>
              <button className="ob-btn" disabled={busy} onClick={sendLink}>{busy?"Ipinapadala…":"Ipadala ang Sign-in Link"}</button>
              <p className="ob-note" style={{marginTop:18}}>Ligtas ito — walang password na naka-imbak kahit saan.</p>
            </>
          )}
        </div>
      </div>
    );
  }

  return children(session);
}

/* ── HOUSEHOLD RESOLVER: given a signed-in caregiver, find or create ────
   their Family Space. Membership lives in the DB, not localStorage —
   localStorage is only a snappy-reload cache.                          */
function HouseholdResolver({ session, children }) {
  const [state, setState] = useState("loading"); // loading | none | ready
  const [hh, setHh] = useState(null);
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  const [seniorName, setSeniorName] = useState("");

  const resolve = async () => {
    const { data: mem, error: e1 } = await supa.from("naknak_household_members").select("household_id").eq("auth_uid", session.user.id).limit(1).maybeSingle();
    if(e1){ setErr(e1.message); setState("none"); return; }
    if(!mem){ setState("none"); return; }
    const { data: hhRow, error: e2 } = await supa.from("naknak_households").select("id,pair_code").eq("id", mem.household_id).maybeSingle();
    if(e2||!hhRow){ setErr((e2&&e2.message)||"Hindi mahanap ang household."); setState("none"); return; }
    const resolved = { householdId: hhRow.id, pairCode: hhRow.pair_code };
    saveHH(resolved); setHh(resolved); setState("ready");
  };

  useEffect(() => { resolve(); }, [session.user.id]);

  const doCreate = async () => {
    setBusy(true); setErr("");
    const { data, error } = await supa.rpc("create_household", { p_senior_name: seniorName || "Nanay" });
    setBusy(false);
    if(error){ setErr(error.message); return; }
    const row = Array.isArray(data) ? data[0] : data;
    const resolved = { householdId: row.household_id, pairCode: row.pair_code };
    saveHH(resolved); setHh(resolved); setState("ready");
  };

  if (state === "loading") return <div className="full-loading"><div className="loading-spin"></div></div>;

  if (state === "none") {
    return (
      <div className="onboard-wrap">
        <div className="onboard-card">
          <div className="ob-brand"><span className="ob-mark"><span className="ring"></span><span className="dot"></span></span>NakNak Dashboard</div>
          <h2>Gumawa ng Family Space</h2>
          <p className="desc">Ito ang magiging control center mo. Pagkatapos, makakakuha ka ng code na ilalagay sa app ng senior.</p>
          {err && <div className="ob-err">{err}</div>}
          <div className="form-field" style={{marginBottom:16}}>
            <label>Palayaw ng Senior (opsyonal)</label>
            <input className="ob-input" style={{marginBottom:0}} value={seniorName} onChange={e=>setSeniorName(e.target.value)} placeholder="Nanay, Tatay, Lola…"/>
          </div>
          <button className="ob-btn" disabled={busy} onClick={doCreate}>{busy?"Ginagawa…":"Gumawa ng Family Space"}</button>
          <p className="ob-note" style={{marginTop:18}}>Naka-sign in bilang {session.user.email}. <button onClick={()=>supa.auth.signOut()} style={{background:"none",border:"none",color:"var(--red)",fontWeight:800,cursor:"pointer",padding:0}}>Mag-sign out</button></p>
        </div>
      </div>
    );
  }

  return children(hh);
}

  const [tab, setTab] = useState("create");

  const [code, setCode] = useState("");
  const [createdCode, setCreatedCode] = useState(null);
  const [seniorName, setSeniorName] = useState("");

  const doCreate = async () => {
    if(!supa){ setErr("Hindi pa naka-configure ang Supabase. Tingnan ang SUPA object sa taas ng file."); return; }
    setBusy(true); setErr("");
    const pc = genCode();
    const { data: hh, error: e1 } = await supa.from("naknak_households").insert({ pair_code: pc }).select().single();
    if(e1){ setBusy(false); setErr(e1.message); return; }
    const senior = newSenior(seniorName || "Nanay");
    const payload = { seniors:[senior], plan:"free", activeSeniorId:senior.id, alerts:[] };
    const { error: e2 } = await supa.from("naknak_state").insert({ household_id: hh.id, state: payload, rev: Date.now() });
    setBusy(false);
    if(e2){ setErr(e2.message); return; }
    setCreatedCode(pc);
    saveHH({ householdId: hh.id, pairCode: pc });
  };

  const doJoin = async () => {
    if(!supa){ setErr("Hindi pa naka-configure ang Supabase."); return; }
    setBusy(true); setErr("");
    const clean = code.trim().toUpperCase();
    const { data, error } = await supa.from("naknak_households").select("id,pair_code").eq("pair_code", clean).maybeSingle();
    setBusy(false);
    if(error){ setErr(error.message); return; }
    if(!data){ setErr("Hindi mahanap ang code na iyan. Siguraduhing tama ang pagkakasulat."); return; }
    saveHH({ householdId: data.id, pairCode: data.pair_code });
    onPaired();
  };

  if (createdCode) {
    return (
      <div className="onboard-wrap">
        <div className="onboard-card">
          <div className="ob-brand"><span className="ob-mark"><span className="ring"></span><span className="dot"></span></span>NakNak Dashboard</div>
          <div className="ob-success">
            <Icon name="checkmark" size={40} color="var(--green)"/>
            <h2 style={{marginTop:14}}>Gawa na ang Family Space!</h2>
            <p className="desc">Ilagay ang code na ito sa NakNak app (Settings → Cloud Sync) sa telepono ng senior.</p>
            <div className="ob-code-display">{createdCode}</div>
            <button className="ob-btn" onClick={onPaired}>Pumunta sa Dashboard →</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="onboard-wrap">
      <div className="onboard-card">
        <div className="ob-brand"><span className="ob-mark"><span className="ring"></span><span className="dot"></span></span>NakNak Dashboard</div>
        {!supa && <div className="ob-config-warn">Hindi pa naka-configure ang Supabase credentials sa file na ito. Buksan ang dashboard.html, hanapin ang <code>const SUPA</code>, at ilagay ang iyong Project URL at anon key. Tingnan ang DEPLOY.md.</div>}
        <div className="ob-tabs">
          <button className={"ob-tab"+(tab==="create"?" on":"")} onClick={()=>{setTab("create");setErr("");}}>Gumawa ng Bago</button>
          <button className={"ob-tab"+(tab==="join"?" on":"")} onClick={()=>{setTab("join");setErr("");}}>May Code Na</button>
        </div>
        {err && <div className="ob-err">{err}</div>}
        {tab==="create" ? (
          <>
            <h2>Gumawa ng Family Space</h2>
            <p className="desc">Ito ang magiging control center mo. Bibigyan ka ng 6-character code na ilalagay sa app ng senior.</p>
            <div className="form-field" style={{marginBottom:16}}>
              <label>Palayaw ng Senior (opsyonal)</label>
              <input className="ob-input" style={{marginBottom:0}} value={seniorName} onChange={e=>setSeniorName(e.target.value)} placeholder="Nanay, Tatay, Lola…"/>
            </div>
            <button className="ob-btn" disabled={busy} onClick={doCreate}>{busy?"Ginagawa…":"Gumawa ng Family Space"}</button>
          </>
        ) : (
          <>
            <h2>I-connect sa Family Space</h2>
            <p className="desc">Ilagay ang 6-character code mula sa taong gumawa ng Family Space.</p>
            <input className="ob-input code" value={code} onChange={e=>setCode(e.target.value.toUpperCase())} maxLength={6} placeholder="A1B2C3"/>
            <button className="ob-btn" disabled={busy||code.length<6} onClick={doJoin}>{busy?"Kumokonekta…":"I-connect"}</button>
          </>
        )}
        <p className="ob-note" style={{marginTop:18}}>Isang beses mo lang ito gagawin. Awtomatiko nang naka-sync ang lahat pagkatapos.</p>
      </div>
    </div>
  );
}

/* ── MAIN DASHBOARD ──────────────────────────────────────────────────── */
function Dashboard({ household, onDisconnect, theme, session }) {
  const [state, setState] = useState(null);
  const [activeSid, setActiveSid] = useState(null);
  const [tab, setTab] = useState("overview");
  const [lastSync, setLastSync] = useState(null);
  const revRef = useRef(0);
  const chanRef = useRef(null);
  useTicker(5000);

  const pushState = useCallback(async (next) => {
    setState(next);
    const rev = Date.now(); revRef.current = rev;
    if(!supa) return;
    await supa.from("naknak_state").upsert({ household_id: household.householdId, state: next, rev, updated_at: new Date().toISOString() });
    setLastSync(tNow());
  }, [household]);

  useEffect(() => {
    if(!supa) return;
    let mounted = true;
    (async () => {
      const { data } = await supa.from("naknak_state").select("state,rev").eq("household_id", household.householdId).maybeSingle();
      if(mounted && data){ setState(data.state); revRef.current = data.rev; setActiveSid(data.state.activeSeniorId || data.state.seniors?.[0]?.id); setLastSync(tNow()); }
    })();
    chanRef.current = supa.channel("dash_"+household.householdId)
      .on("postgres_changes", { event:"*", schema:"public", table:"naknak_state", filter:"household_id=eq."+household.householdId },
        (p) => { const row=p.new; if(row && row.rev>revRef.current){ revRef.current=row.rev; setState(row.state); setLastSync(tNow()); } })
      .subscribe();
    return () => { mounted=false; if(chanRef.current) supa.removeChannel(chanRef.current); };
  }, [household]);

  if (!state) return <div className="full-loading"><div className="loading-spin"></div></div>;

  const seniors = state.seniors || [];
  const senior = seniors.find(s=>s.id===activeSid) || seniors[0];
  const patch = (fn) => { const next = { ...state, seniors: state.seniors.map(s => s.id===senior.id ? fn({...s}) : s) }; pushState(next); };
  const addSenior = () => { const s=newSenior("Bagong Senior"); const next={...state, seniors:[...state.seniors, s]}; setActiveSid(s.id); pushState(next); };
  const ackSOS = () => patch(s => { s.status="ok"; s.eventLog=[{id:nid(),type:"checkin",icon:"checkmark",title:"SOS na-acknowledge ng caregiver",time:tNow(),detail:""},...(s.eventLog||[])]; return s; });

  const NAV = [
    ["overview","Overview","dashboard"],
    ["timeline","Timeline","clock"],
    ["meds","Gamot","pill"],
    ["contacts","Contacts","phone"],
    ["safezone","Safe Zone","map_pin"],
    ["vitals","Vitals","heart_pulse"],
    ["notes","Mga Tala","notes"],
    ["profile","Medical Profile","file_text"],
    ["idupload","ID Upload","id_card"],
    ["qr","QR Code","qr"],
    ["devices","Mga Device","phone"],
    ["settings","Settings","settings"],
  ];

  return (
    <div className="shell">
      <div className="sidebar">
        <div className="sb-brand"><span className="sb-mark"><span className="ring"></span><span className="dot"></span></span>NakNak</div>
        <div className="sb-code">
          <div className="dot-live"></div>
          <div className="txt"><div className="lbl">FAMILY CODE</div><div className="val">{household.pairCode}</div></div>
          <button className="icon-btn" style={{width:26,height:26,background:"rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.6)"}} onClick={()=>navigator.clipboard&&navigator.clipboard.writeText(household.pairCode)}><Icon name="copy" size={13}/></button>
        </div>
        <div className="sb-senior">
          <div className="sb-senior-avatar" style={{background:senior.status==="sos"?"var(--red-hot)":"var(--red-bright)"}}>
            {(senior.nickname||senior.name||"?")[0]}
            <span className="sb-senior-pulse" style={{background:senior.status==="sos"?"var(--red-hot)":"var(--green-bright)"}}></span>
          </div>
          <div className="sb-senior-txt">
            <div className="nm">{senior.nickname||senior.name}</div>
            <div className="st">{senior.status==="sos"?"SOS Active":senior.checkedIn?"Ayos · "+timeAgo(senior.lastCheckin):"Walang check-in"}</div>
          </div>
        </div>
        <div className="sb-nav">
          {NAV.map(([id,label,icon])=>(
            <button key={id} className={"sb-link"+(tab===id?" on":"")} onClick={()=>setTab(id)}>
              <Icon name={icon} size={16}/>{label}
            </button>
          ))}
        </div>
        <div className="sb-footer">
          <button className="sb-disconnect" onClick={onDisconnect}>Mag-sign out</button>
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <div className="tb-title">
            <h1>{NAV.find(n=>n[0]===tab)?.[1]}</h1>
            <p><span className="tb-sync-dot"></span>{seniors.length} {seniors.length===1?"senior":"mga senior"} · Na-sync {timeAgo(lastSync)}</p>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div className="senior-tabs">
              {seniors.map(s=>(
                <button key={s.id} className={"senior-tab"+(s.id===senior.id?" on":"")} onClick={()=>setActiveSid(s.id)}>
                  <span className="st-dot" style={{background:s.status==="sos"?"var(--red)":s.status==="ok"?"var(--green-bright)":"var(--gold-bright)"}}></span>
                  {s.nickname||s.name}
                </button>
              ))}
            </div>
            {(state.plan==="family") && <button className="tb-add-senior" onClick={addSenior} title="Magdagdag ng Senior"><Icon name="plus" size={16}/></button>}
            <button className="tb-theme-toggle" onClick={()=>theme.setMode(theme.isDark?"light":"dark")} title={theme.isDark?"Palitan sa Light":"Palitan sa Dark"}>
              <Icon name={theme.isDark?"sun":"moon"} size={16}/>
            </button>
          </div>
        </div>

        <div className="content">
          {senior.status==="sos" && (
            <div className="sos-banner">
              <div className="ring"></div>
              <div className="txt"><strong>SOS Active — {senior.name}</strong><span>Kumindat ang emergency alert. Pumindot para tanggapin.</span></div>
              <button className="sos-ack-btn" onClick={ackSOS}>Acknowledge</button>
            </div>
          )}
          {tab==="overview" && <div key="overview" className="panel-enter"><OverviewPanel senior={senior}/></div>}
          {tab==="meds" && <div key="meds" className="panel-enter"><MedsPanel senior={senior} patch={patch}/></div>}
          {tab==="contacts" && <div key="contacts" className="panel-enter"><ContactsPanel senior={senior} patch={patch}/></div>}
          {tab==="safezone" && <div key="safezone" className="panel-enter"><SafeZonePanel senior={senior} patch={patch}/></div>}
          {tab==="vitals" && <div key="vitals" className="panel-enter"><VitalsPanel senior={senior} patch={patch}/></div>}
          {tab==="notes" && <div key="notes" className="panel-enter"><NotesPanel senior={senior} patch={patch}/></div>}
          {tab==="profile" && <div key="profile" className="panel-enter"><ProfilePanel senior={senior} patch={patch}/></div>}
          {tab==="devices" && <div key="devices" className="panel-enter"><DevicesPanel household={household}/></div>}
          {tab==="timeline" && <div key="timeline" className="panel-enter"><TimelinePanel senior={senior}/></div>}
          {tab==="idupload" && <div key="idupload" className="panel-enter"><IdUploadPanel senior={senior} patch={patch}/></div>}
          {tab==="qr" && <div key="qr" className="panel-enter"><QrPanel senior={senior}/></div>}
          {tab==="settings" && <div key="settings" className="panel-enter"><SettingsPanel theme={theme} plan={state.plan} session={session} onDisconnect={onDisconnect}/></div>}
        </div>
      </div>
    </div>
  );
}

/* ── OVERVIEW ────────────────────────────────────────────────────────── */
function OverviewPanel({ senior }) {
  useTicker(15000);
  const meds = senior.medications||[];
  const done = meds.filter(m=>m.status==="done").length;
  const missed = meds.filter(m=>m.status==="missed").length;
  const medPct = meds.length ? Math.round((done/meds.length)*100) : 0;
  const isSOS = senior.status==="sos";
  const EVENT_COLOR = { checkin:"var(--green)", sos:"var(--red)", fall:"var(--red)", med_taken:"var(--green)", med_missed:"var(--red)", med_snoozed:"var(--gold)", gps:"var(--gold)", notif:"var(--ink2)" };
  const EVENT_BG = { checkin:"rgba(26,140,74,0.1)", sos:"rgba(196,48,30,0.1)", fall:"rgba(196,48,30,0.1)", med_taken:"rgba(26,140,74,0.1)", med_missed:"rgba(196,48,30,0.1)", med_snoozed:"rgba(192,112,16,0.1)", gps:"rgba(192,112,16,0.1)", notif:"var(--cream2)" };

  return (
    <>
      {/* Hero identity card — mirrors the senior's own phone, so this feels like a real person, not a database row */}
      <div className="hero-id-card" style={isSOS?{background:"linear-gradient(135deg,var(--red-bright) 0%,var(--red-dark) 100%)"}:{}}>
        <div className="hero-id-avatar">
          {(senior.nickname||senior.name||"?")[0]}
          <span className="hero-id-pulse" style={{background:isSOS?"#fff":"var(--green-bright)"}}></span>
        </div>
        <div className="hero-id-body">
          <div className="hero-id-name">{senior.name}</div>
          <div className="hero-id-status">{isSOS?"SOS Active — kailangan ng agarang tulong":senior.checkedIn?`Ayos naman · huling check-in ${timeAgo(senior.lastCheckin)}`:"Wala pang check-in ngayong araw"}</div>
        </div>
        <div className="hero-id-battery">
          <Icon name="battery" size={15} color="rgba(255,255,255,0.85)"/>{senior.battery}%
        </div>
      </div>

      <div className="stat-grid">
        <div className="stat-card">
          <div className="ic" style={{background:"rgba(26,140,74,0.09)",color:"var(--green)"}}><Icon name="checkmark" size={18}/></div>
          <div className="val">{senior.checkedIn?"Ayos":"Wala pa"}</div>
          <div className="lbl">{senior.checkedIn?timeAgo(senior.lastCheckin):"Huling Check-in"}</div>
        </div>
        <div className="stat-card">
          <div className="ic" style={{background:missed>0?"rgba(196,48,30,0.09)":"rgba(192,112,16,0.09)",color:missed>0?"var(--red)":"var(--gold)"}}><Icon name="pill" size={18}/></div>
          <div className="val">{done}/{meds.length}</div>
          <div className="lbl">Gamot Ngayon</div>
          {meds.length>0 && <div className="stat-bar"><div className="stat-bar-fill" style={{width:medPct+"%",background:missed>0?"var(--red)":"var(--green)"}}></div></div>}
        </div>
        <div className="stat-card">
          <div className="ic" style={{background:senior.battery<20?"rgba(196,48,30,0.09)":"rgba(30,10,2,0.06)",color:senior.battery<20?"var(--red)":"var(--ink2)"}}><Icon name="battery" size={18}/></div>
          <div className="val">{senior.battery}%</div>
          <div className="lbl">Baterya ng Telepono</div>
        </div>
        <div className="stat-card">
          <div className="ic" style={{background:"rgba(192,112,16,0.09)",color:"var(--gold)"}}><Icon name="phone" size={18}/></div>
          <div className="val">{(senior.contacts||[]).length}</div>
          <div className="lbl">Emergency Contacts</div>
        </div>
      </div>
      <div className="panel">
        <div className="panel-head"><h2><Icon name="activity" size={17}/>Pinakabagong Aktibidad</h2></div>
        {(senior.eventLog||[]).length===0 ? (
          <div className="empty-state"><Icon name="activity" size={36}/><p>Wala pang aktibidad.</p></div>
        ) : (senior.eventLog||[]).slice(0,8).map(ev=>(
          <div className="row-item" key={ev.id}>
            <div className="row-avatar" style={{background:EVENT_BG[ev.type]||"var(--cream2)",color:EVENT_COLOR[ev.type]||"var(--ink2)"}}><Icon name={ev.icon||"activity"} size={16}/></div>
            <div className="row-body"><div className="t1">{ev.title}</div><div className="t2">{timeAgo(ev.time)}{ev.detail?" · "+ev.detail:""}</div></div>
          </div>
        ))}
      </div>

/* ── MEDICATIONS ─────────────────────────────────────────────────────── */
function MedsPanel({ senior, patch }) {
  const [form, setForm] = useState(null);
  const meds = senior.medications||[];
  const save = () => {
    if(!form.name) return;
    patch(s=>{
      const list = s.medications||[];
      if(form.id) s.medications = list.map(m=>m.id===form.id?{...m,...form}:m);
      else s.medications = [...list, {...form, id:nid(), status:"pending"}];
      return s;
    });
    setForm(null);
  };
  const del = (id) => patch(s=>({...s, medications:(s.medications||[]).filter(m=>m.id!==id)}));
  const markDone = (id) => patch(s=>({...s, medications:(s.medications||[]).map(m=>m.id===id?{...m,status:"done",taken:true}:m)}));
  const statusColor = { done:"var(--green)", pending:"var(--gold)", upcoming:"var(--ink3)", missed:"var(--red)" };
  const statusBg = { done:"rgba(26,140,74,0.1)", pending:"rgba(192,112,16,0.1)", upcoming:"rgba(30,10,2,0.05)", missed:"rgba(196,48,30,0.1)" };
  const statusLabel = { done:"Nainom", pending:"Naghihintay", upcoming:"Mamaya", missed:"Nalaktawan" };

  return (
    <div className="panel">
      <div className="panel-head">
        <div><h2><Icon name="pill" size={17}/>Gamot ni {senior.nickname||senior.name}</h2><p>{meds.length} na gamot naka-schedule</p></div>
        <button className="btn-add" onClick={()=>setForm({name:"",dose:"",schedule:"08:00",freq:"1x"})}><Icon name="plus" size={14}/>Magdagdag</button>
      </div>
      {form && (
        <div style={{background:"var(--cream2)",borderRadius:16,padding:18,marginBottom:18}}>
          <div className="form-row">
            <div className="form-field"><label>Pangalan ng Gamot</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Amlodipine"/></div>
            <div className="form-field"><label>Dosage</label><input value={form.dose} onChange={e=>setForm({...form,dose:e.target.value})} placeholder="5mg"/></div>
          </div>
          <div className="form-row">
            <div className="form-field"><label>Oras (24h)</label><input value={form.schedule} onChange={e=>setForm({...form,schedule:e.target.value})} placeholder="08:00, 20:00"/></div>
            <div className="form-field"><label>Dalas</label><select value={form.freq} onChange={e=>setForm({...form,freq:e.target.value})}><option value="1x">1x isang araw</option><option value="2x">2x isang araw</option><option value="3x">3x isang araw</option></select></div>
          </div>
          <div className="form-actions">
            <button className="btn-save" onClick={()=>{ const sched=form.schedule.split(",").map(s=>s.trim()).filter(Boolean); save.call(null); patch(s=>{const list=s.medications||[]; const rec={...form,schedule:sched}; if(form.id) s.medications=list.map(m=>m.id===form.id?{...m,...rec}:m); else s.medications=[...list,{...rec,id:nid(),status:"pending"}]; return s;}); setForm(null); }}>I-save</button>
            <button className="btn-cancel" onClick={()=>setForm(null)}>Kanselahin</button>
          </div>
        </div>
      )}
      {meds.length===0 ? (
        <div className="empty-state"><Icon name="pill" size={36}/><p>Wala pang gamot na naka-schedule.</p></div>
      ) : meds.map(m=>(
        <div className="row-item" key={m.id}>
          <div className="row-avatar" style={{background:statusBg[m.status]||"var(--cream2)",color:statusColor[m.status]||"var(--ink3)"}}><Icon name="pill" size={16}/></div>
          <div className="row-body"><div className="t1">{m.name} <span style={{color:"var(--ink3)",fontWeight:600}}>{m.dose}</span></div><div className="t2">{(m.schedule||[]).join(" · ")}</div></div>
          <span className="pill-status" style={{background:statusBg[m.status],color:statusColor[m.status]}}>{statusLabel[m.status]||m.status}</span>
          <div className="row-actions">
            {m.status!=="done" && <button className="icon-btn ok" onClick={()=>markDone(m.id)} title="Markahan nainom"><Icon name="checkmark" size={14}/></button>}
            <button className="icon-btn" onClick={()=>setForm({...m,schedule:(m.schedule||[]).join(", ")})} title="I-edit"><Icon name="settings" size={14}/></button>
            <button className="icon-btn" onClick={()=>del(m.id)} title="Tanggalin"><Icon name="trash" size={14}/></button>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── CONTACTS ────────────────────────────────────────────────────────── */
function ContactsPanel({ senior, patch }) {
  const [form, setForm] = useState(null);
  const contacts = senior.contacts||[];
  const save = () => {
    if(!form.name||!form.num) return;
    patch(s=>{
      const list=s.contacts||[];
      if(form.id) s.contacts=list.map(c=>c.id===form.id?{...c,...form}:c);
      else s.contacts=[...list,{...form,id:nid(),priority:list.length+1}];
      return s;
    });
    setForm(null);
  };
  const del = (id) => patch(s=>({...s, contacts:(s.contacts||[]).filter(c=>c.id!==id)}));
  return (
    <div className="panel">
      <div className="panel-head">
        <div><h2><Icon name="phone" size={17}/>Emergency Contacts</h2><p>Tatawagan ayon sa priority kapag SOS</p></div>
        <button className="btn-add" onClick={()=>setForm({name:"",rel:"Anak",num:""})}><Icon name="plus" size={14}/>Magdagdag</button>
      </div>
      {form && (
        <div style={{background:"var(--cream2)",borderRadius:16,padding:18,marginBottom:18}}>
          <div className="form-row">
            <div className="form-field"><label>Pangalan</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Juan Dela Cruz"/></div>
            <div className="form-field"><label>Relasyon</label><select value={form.rel} onChange={e=>setForm({...form,rel:e.target.value})}><option>Anak</option><option>Asawa</option><option>Kapatid</option><option>Apo</option><option>Iba pa</option></select></div>
          </div>
          <div className="form-row single"><div className="form-field"><label>Numero</label><input value={form.num} onChange={e=>setForm({...form,num:e.target.value})} placeholder="+63912-345-6789"/></div></div>
          <div className="form-actions"><button className="btn-save" onClick={save}>I-save</button><button className="btn-cancel" onClick={()=>setForm(null)}>Kanselahin</button></div>
        </div>
      )}
      {contacts.length===0 ? (
        <div className="empty-state"><Icon name="phone" size={36}/><p>Wala pang naka-listang contact.</p></div>
      ) : contacts.map(c=>(
        <div className="row-item" key={c.id}>
          <div className="row-avatar" style={{background:"var(--cream2)",color:"var(--red)",fontFamily:"var(--font-display)",fontWeight:700}}>{c.name[0]}</div>
          <div className="row-body"><div className="t1">{c.name}</div><div className="t2">{c.rel} · {c.num}</div></div>

/* ── DEVICES: view paired phones, copy/regenerate the pair code ────────── */
function DevicesPanel({ household }) {
  const [devices, setDevices] = useState(null);
  const [code, setCode] = useState(household.pairCode);
  const [busy, setBusy] = useState(false);
  const [copied, setCopied] = useState(false);

  const load = async () => {
    const { data } = await supa.from("naknak_devices").select("id,device_label,paired_at,last_seen_at").eq("household_id", household.householdId).order("paired_at",{ascending:false});
    setDevices(data||[]);
  };
  useEffect(()=>{ load(); }, [household.householdId]);

  const regenerate = async () => {
    setBusy(true);
    const { data, error } = await supa.rpc("regenerate_pair_code", { p_household_id: household.householdId });
    setBusy(false);
    if(!error) setCode(data);
  };
  const copy = () => { navigator.clipboard && navigator.clipboard.writeText(code); setCopied(true); setTimeout(()=>setCopied(false),1800); };

  return (
    <>
      <div className="panel">
        <div className="panel-head"><div><h2><Icon name="phone" size={17}/>Family Code</h2><p>Ilagay ito sa NakNak app ng senior, sa Settings → Cloud Sync</p></div></div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontFamily:"var(--font-mono)",fontSize:28,fontWeight:700,letterSpacing:6,color:"var(--red)",background:"var(--cream2)",borderRadius:14,padding:"14px 22px",flex:1,textAlign:"center"}}>{code}</div>
          <button className="btn-add" onClick={copy}><Icon name="copy" size={14}/>{copied?"Nakopya!":"Kopyahin"}</button>
          <button className="btn-cancel" disabled={busy} onClick={regenerate}>{busy?"…":"Gumawa ng Bago"}</button>
        </div>
        <p style={{fontSize:11.5,color:"var(--ink3)",fontWeight:700,marginTop:12}}>Ang paggawa ng bagong code ay hindi tinatanggal ang mga device na naka-pair na — pinipigilan lang nito ang mga bagong pag-pair gamit ang lumang code.</p>
      </div>
      <div className="panel">
        <div className="panel-head"><h2><Icon name="dashboard" size={17}/>Mga Naka-pair na Device</h2></div>
        {devices===null ? <div className="empty-state"><div className="loading-spin"></div></div> :
         devices.length===0 ? <div className="empty-state"><Icon name="phone" size={36}/><p>Wala pang naka-pair na telepono.</p></div> :
         devices.map(d=>(
          <div className="row-item" key={d.id}>
            <div className="row-avatar" style={{background:"var(--cream2)",color:"var(--ink2)"}}><Icon name="phone" size={16}/></div>
            <div className="row-body"><div className="t1">{d.device_label}</div><div className="t2">Na-pair {fmtTime(d.paired_at)} · Huling online {fmtTime(d.last_seen_at)}</div></div>
          </div>
        ))}
      </div>
    </>
  );
}

/* ── ID UPLOAD: Senior Citizen ID + PWD ID, stored as base64 ─────────────── */
function IdUploadPanel({ senior, patch }) {
  const seniorIdRef = useRef(null), pwdIdRef = useRef(null);
  const readFile = (file, cb) => {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => cb(reader.result);
    reader.readAsDataURL(file);
  };
  const setSeniorId = (dataUrl) => patch(s=>({...s, seniorIdImage: dataUrl}));
  const setPwdId = (dataUrl) => patch(s=>({...s, pwdIdImage: dataUrl}));

  const Card = ({ label, hint, image, onUpload, onRemove, inputRef, icon }) => (
    <div className={"id-upload-card"+(image?" has-image":"")}>
      {image ? (
        <img className="id-upload-preview" src={image} alt={label}/>
      ) : (
        <Icon name={icon} size={40} color="var(--ink3)" strokeWidth={1.5}/>
      )}
      <h4>{label}</h4>
      <p>{hint}</p>
      <input ref={inputRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>readFile(e.target.files[0], onUpload)}/>
      <div style={{display:"flex",gap:8,justifyContent:"center"}}>
        <button className="id-upload-btn" onClick={()=>inputRef.current.click()}><Icon name="upload" size={13}/>{image?"Palitan":"Mag-upload"}</button>
        {image && <button className="id-upload-btn danger" onClick={onRemove}><Icon name="trash" size={13}/>Alisin</button>}
      </div>
    </div>
  );

  return (
    <div className="panel">
      <div className="panel-head"><div><h2><Icon name="id_card" size={17}/>ID Upload</h2><p>Naka-imbak nang ligtas, makikita sa Vault ng senior kahit offline</p></div></div>
      <div className="id-upload-grid">
        <Card label="Senior Citizen ID" hint="Larawan ng harap ng ID" image={senior.seniorIdImage} onUpload={setSeniorId} onRemove={()=>setSeniorId(null)} inputRef={seniorIdRef} icon="id_card"/>
        <Card label="PWD ID" hint="Larawan ng harap ng ID" image={senior.pwdIdImage} onUpload={setPwdId} onRemove={()=>setPwdId(null)} inputRef={pwdIdRef} icon="accessible"/>
      </div>
    </div>
  );
}

/* ── QR CODE: generates a scannable emergency-info card ─────────────────── */
function QrPanel({ senior }) {
  const qrRef = useRef(null);
  const [failed, setFailed] = useState(false);
  const p = senior.medicalProfile||{};
  const mainContact = (senior.contacts||[])[0];
  const payload = [
    `NakNak Emergency ID`, `Pangalan: ${senior.name}`,
    p.bloodType?`Blood Type: ${p.bloodType}`:null,
    (p.allergies||[]).length?`Allergies: ${p.allergies.join(", ")}`:null,
    (p.conditions||[]).length?`Conditions: ${p.conditions.join(", ")}`:null,
    p.doctorName?`Doctor: ${p.doctorName} ${p.doctorNum||""}`:null,
    mainContact?`Emergency Contact: ${mainContact.name} ${mainContact.num}`:null,
  ].filter(Boolean).join("\n");

  useEffect(() => {
    if(!qrRef.current) return;
    qrRef.current.innerHTML = "";
    if(typeof QRCode === "undefined"){ setFailed(true); return; }
    try{ new QRCode(qrRef.current, { text: payload, width: 200, height: 200, colorDark: "#1E0A02", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.M }); }
    catch(e){ setFailed(true); }
  }, [payload]);

  return (
    <div className="panel">
      <div className="panel-head"><div><h2><Icon name="qr" size={17}/>QR Code</h2><p>I-print o i-save — nasa likod ito ng Quick ID card ng senior</p></div></div>
      <div className="qr-wrap">
        {failed ? (
          <div className="empty-state"><Icon name="alert_tri" size={36}/><p>Hindi ma-load ang QR generator. Kailangan ng internet sa unang pag-load.</p></div>
        ) : (
          <div className="qr-frame"><div ref={qrRef}></div></div>
        )}
        <div className="qr-summary">
          <div className="row"><span>Pangalan</span><strong>{senior.name}</strong></div>
          <div className="row"><span>Blood Type</span><strong>{p.bloodType||"—"}</strong></div>
          <div className="row"><span>Allergies</span><strong>{(p.allergies||[]).length?p.allergies.join(", "):"—"}</strong></div>
          <div className="row"><span>Emergency Contact</span><strong>{mainContact?mainContact.name:"—"}</strong></div>
        </div>
      </div>
    </div>
  );
}

          <div className="quickid-sect">Allergies</div>
          <div className="quickid-tags">{(f.allergies||[]).length? f.allergies.map((a,i)=><span key={i}>{a}</span>) : <em>wala</em>}</div>
          <div className="quickid-sect">Kondisyon</div>
          <div className="quickid-tags">{(f.conditions||[]).length? f.conditions.map((c,i)=><span key={i}>{c}</span>) : <em>wala</em>}</div>
        </div>
      </div>
    </div>
  );
}

/* ── ROOT ────────────────────────────────────────────────────────────── */
function App() {
  const theme = useTheme();
  if (!supa) {
    // No Supabase configured at all — fall back to the legacy local-only flow
    // so the dashboard is still usable while you're wiring up credentials.
    const [hh, setHh] = useState(loadHH);
    if (!hh) return <Onboard onPaired={()=>setHh(loadHH())}/>;
    return <Dashboard household={hh} onDisconnect={()=>{ saveHH(null); setHh(null); }} theme={theme}/>;
  }
  return (
    <AuthGate>
      {(session) => (
        <HouseholdResolver session={session}>
          {(hh) => (
            <Dashboard household={hh} session={session} onDisconnect={async ()=>{ saveHH(null); await supa.auth.signOut(); }} theme={theme}/>
          )}
        </HouseholdResolver>
      )}
    </AuthGate>
  );
}

class ErrB extends React.Component{
  constructor(p){super(p);this.state={e:null};}
  static getDerivedStateFromError(e){return {e};}
  render(){ if(this.state.e) return <div style={{padding:40,fontFamily:"var(--font-body)"}}>May problema: {String(this.state.e.message||this.state.e)}</div>; return this.props.children; }
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ErrB><App/></ErrB>);
</script>
